# VEX Platform - Docker Compose Configuration
# منصة VEX للألعاب والتداول - تكوين Docker Compose
# آخر تحديث: فبراير 2026

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: vex-db
    hostname: vex-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vex_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vex_password}
      POSTGRES_DB: ${POSTGRES_DB:-vex_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    # Port NOT exposed to host — only accessible via vex-network (security best practice)
    # Uncomment below ONLY for local debugging:
    # ports:
    #   - "127.0.0.1:5432:5432"
    networks:
      - vex-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-vex_user} -d ${POSTGRES_DB:-vex_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vex-redis
    hostname: vex-redis
    restart: unless-stopped
    command:
      - /bin/sh
      - -ec
      - |
        if [ -f /data/appendonly.aof.manifest ]; then
          echo "[redis-bootstrap] validating AOF manifest"
          if ! redis-check-aof --fix /data/appendonly.aof.manifest; then
            echo "[redis-bootstrap] fallback: backing up and removing bad incremental AOF"
            if [ -f /data/appendonly.aof.1.incr.aof ]; then
              cp /data/appendonly.aof.1.incr.aof "/data/appendonly.aof.1.incr.aof.bak.$(date +%s)" || true
              rm -f /data/appendonly.aof.1.incr.aof
            fi
            redis-check-aof --fix /data/appendonly.aof.manifest || true
          fi
        fi
        exec redis-server \
          --appendonly yes \
          --maxmemory 256mb \
          --maxmemory-policy allkeys-lru \
          --requirepass "${REDIS_PASSWORD:-changeme_redis_password}"
    volumes:
      - redis_data:/data
    networks:
      - vex-network
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-changeme_redis_password}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Agent Service
  ai-agent:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: vex-ai-agent
    hostname: vex-ai-agent
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3100
      AI_AGENT_SHARED_TOKEN: ${AI_AGENT_SHARED_TOKEN:-vex-local-ai-token}
      AI_AGENT_DATA_DIR: /app/data
    volumes:
      - ai_agent_data:/app/data
    networks:
      - vex-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3100/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # VEX Commercial Agents Service (cashier/financial agents subsystem)
  # Standalone container split out of the main app for deployment isolation.
  # Shares the same Postgres DB as `app` via DATABASE_URL.
  agents-service:
    build:
      context: .
      dockerfile: services/agents-service/Dockerfile
    container_name: vex-agents-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-vex_user}:${POSTGRES_PASSWORD:-vex_password}@vex-db:5432/${POSTGRES_DB:-vex_db}
      # SECURITY: must be supplied explicitly via .env / Docker secrets in
      # production. The agents-service refuses to boot if this is unset, and
      # the proxy on the main app refuses to forward without it (the main
      # app simply falls back to in-process routes).
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      DB_POOL_MAX: ${AGENTS_DB_POOL_MAX:-10}
      DB_POOL_MIN: ${AGENTS_DB_POOL_MIN:-1}
      DB_SSL: "false"
      TZ: UTC
    networks:
      - vex-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # VEX Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vex-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-agent:
        condition: service_healthy
    labels:
      # Traefik configuration for vixo.click
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_EXTERNAL_NETWORK:-vex-traefik}"

      # HTTPS router
      - "traefik.http.routers.vex-secure.rule=Host(`vixo.click`) ||
        Host(`www.vixo.click`)"
      - "traefik.http.routers.vex-secure.entrypoints=websecure"
      - "traefik.http.routers.vex-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.vex.loadbalancer.server.port=3001"

      # HTTP → HTTPS redirect
      - "traefik.http.routers.vex.rule=Host(`vixo.click`) ||
        Host(`www.vixo.click`)"
      - "traefik.http.routers.vex.entrypoints=web"
      - "traefik.http.routers.vex.middlewares=vex-https-redirect"
      - "traefik.http.middlewares.vex-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.vex-https-redirect.redirectscheme.permanent=t\
        rue"

      # Security headers
      - "traefik.http.middlewares.vex-security.headers.stsSeconds=63072000"
      - "traefik.http.middlewares.vex-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.vex-security.headers.contentTypeNosniff=true"
      - "traefik.http.routers.vex-secure.middlewares=vex-security"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-vex_user}:${POSTGRES_PASSWORD:-vex_password}@vex-db:5432/${POSTGRES_DB:-vex_db}
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-admin@vex.local}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      ALLOW_FORCE_MIGRATIONS: ${ALLOW_FORCE_MIGRATIONS:-false}
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-false}
      MIGRATION_TIMEOUT: ${MIGRATION_TIMEOUT:-120}
      SEED_DATABASE: ${SEED_DATABASE:-false}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_password}@vex-redis:6379
      AI_AGENT_ENABLED: ${AI_AGENT_ENABLED:-true}
      AI_AGENT_BASE_URL: http://vex-ai-agent:3100
      AI_AGENT_SHARED_TOKEN: ${AI_AGENT_SHARED_TOKEN:-vex-local-ai-token}
      AI_AGENT_TIMEOUT_MS: ${AI_AGENT_TIMEOUT_MS:-900}
      # Commercial agents subsystem — routed to standalone container
      AGENTS_SERVICE_URL: http://vex-agents-service:3002
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-vex-local-internal-token}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      SMS_WEBHOOK_URL: ${SMS_WEBHOOK_URL:-}
      PUBLIC_RTC_STUN_URLS: ${PUBLIC_RTC_STUN_URLS:-stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302}
      PUBLIC_RTC_TURN_URLS: ${PUBLIC_RTC_TURN_URLS:-}
      PUBLIC_RTC_TURN_USERNAME: ${PUBLIC_RTC_TURN_USERNAME:-}
      PUBLIC_RTC_TURN_CREDENTIAL: ${PUBLIC_RTC_TURN_CREDENTIAL:-}
      PUBLIC_RTC_ICE_TRANSPORT_POLICY: ${PUBLIC_RTC_ICE_TRANSPORT_POLICY:-all}
      PRERENDER_TOKEN: ${PRERENDER_TOKEN:-}
      PRERENDER_SERVICE_URL: ${PRERENDER_SERVICE_URL:-https://service.prerender.io}
      PRERENDER_TIMEOUT_MS: ${PRERENDER_TIMEOUT_MS:-10000}
      DB_SSL: "false"
      TZ: UTC
    ports:
      - "${APP_PORT:-3001}:3001"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - vex-network
      - vex-traefik
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/api/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  vex-network:
    driver: bridge
  vex-traefik:
    external: true
    name: ${TRAEFIK_EXTERNAL_NETWORK:-vex-traefik}

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ai_agent_data:
    driver: local
