# VEX Platform - Production Docker Compose
# Uses an existing Traefik reverse-proxy via a shared external Docker network.
# Default external network name: vex-traefik (override with TRAEFIK_EXTERNAL_NETWORK).
# Domain: vixo.click
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d

services:
  # ==================== PostgreSQL Database ====================
  db:
    image: postgres:15-alpine
    container_name: vex-db
    hostname: vex-db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vex_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c work_mem=8MB
        -c maintenance_work_mem=64MB
        -c max_connections=100
        -c log_min_duration_statement=1000
        -c log_statement=none
        -c log_lock_waits=on
        -c checkpoint_completion_target=0.9
        -c wal_buffers=4MB
        -c random_page_cost=1.1
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - vex-internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-vex_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== Redis Cache ====================
  redis:
    image: redis:7-alpine
    container_name: vex-redis
    hostname: vex-redis
    restart: unless-stopped
    command:
      - /bin/sh
      - -ec
      - |
        if [ -f /data/appendonly.aof.manifest ]; then
          echo "[redis-bootstrap] validating AOF manifest"
          if ! redis-check-aof --fix /data/appendonly.aof.manifest; then
            echo "[redis-bootstrap] fallback: backing up and removing bad incremental AOF"
            if [ -f /data/appendonly.aof.1.incr.aof ]; then
              cp /data/appendonly.aof.1.incr.aof "/data/appendonly.aof.1.incr.aof.bak.$(date +%s)" || true
              rm -f /data/appendonly.aof.1.incr.aof
            fi
            redis-check-aof --fix /data/appendonly.aof.manifest || true
          fi
        fi
        exec redis-server \
          --requirepass "${REDIS_PASSWORD}" \
          --maxmemory 128mb \
          --maxmemory-policy allkeys-lru \
          --appendonly yes \
          --tcp-backlog 511 \
          --timeout 300 \
          --tcp-keepalive 60
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.15"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    volumes:
      - redis_data:/data
    networks:
      - vex-internal
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== MinIO Object Storage ====================
  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: vex-minio
    hostname: vex-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.20"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    # No host port mappings — the app reaches MinIO over the vex-internal
    # network at vex-minio:9000. Uncomment ONLY for local console access
    # from the VPS shell (and ensure ports 9010/9011 are free on the host).
    # ports:
    #   - "127.0.0.1:9011:9001"
    #   - "127.0.0.1:9010:9000"
    networks:
      - vex-internal
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==================== AI Agent Service ====================
  ai-agent:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: vex-ai-agent
    hostname: vex-ai-agent
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      NODE_ENV: production
      PORT: 3100
      AI_AGENT_SHARED_TOKEN: ${AI_AGENT_SHARED_TOKEN:-}
      AI_AGENT_DATA_DIR: /app/data
    volumes:
      - ai_agent_data:/app/data
    networks:
      - vex-internal
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3100/health" ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ==================== VEX Application ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vex-app
    hostname: vex-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ai-agent:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vex-db:5432/${POSTGRES_DB:-vex_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@vex-redis:6379
      AI_AGENT_ENABLED: ${AI_AGENT_ENABLED:-true}
      AI_AGENT_BASE_URL: http://vex-ai-agent:3100
      AI_AGENT_SHARED_TOKEN: ${AI_AGENT_SHARED_TOKEN:-}
      AI_AGENT_TIMEOUT_MS: ${AI_AGENT_TIMEOUT_MS:-900}
      MINIO_ENDPOINT: vex-minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-vex-uploads}
      MINIO_USE_SSL: "false"
      PUBLIC_RTC_ICE_TRANSPORT_POLICY: ${PUBLIC_RTC_ICE_TRANSPORT_POLICY:-all}
      PUBLIC_RTC_ICE_SERVERS_JSON: ${PUBLIC_RTC_ICE_SERVERS_JSON:-}
      PUBLIC_RTC_STUN_URLS: ${PUBLIC_RTC_STUN_URLS:-}
      PUBLIC_RTC_TURN_URLS: ${PUBLIC_RTC_TURN_URLS:-}
      PUBLIC_RTC_TURN_USERNAME: ${PUBLIC_RTC_TURN_USERNAME:-}
      PUBLIC_RTC_TURN_CREDENTIAL: ${PUBLIC_RTC_TURN_CREDENTIAL:-}
      # TURN credential issuer config — must mirror the coturn container.
      # When TURN_HOST + TURN_STATIC_SECRET are set, /api/rtc/ice-servers
      # returns a TURN entry with HMAC-SHA1 ephemeral creds. When unset,
      # only public STUN is returned and clients fall back to text-only.
      TURN_HOST: ${TURN_HOST:-}
      TURN_REALM: ${TURN_REALM:-vixo.click}
      TURN_PORT: ${TURN_PORT:-3478}
      TURN_TLS_PORT: ${TURN_TLS_PORT:-5349}
      TURN_STATIC_SECRET: ${TURN_STATIC_SECRET:-}
      TURN_TTL_SECONDS: ${TURN_TTL_SECONDS:-3600}
      STUN_URLS: ${STUN_URLS:-}
      SESSION_SECRET: ${SESSION_SECRET}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      JWT_USER_SECRET: ${JWT_SIGNING_KEY}
      JWT_ADMIN_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-admin123}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-admin@vixo.click}
      ADMIN_RESET_PASSWORD: ${ADMIN_RESET_PASSWORD:-}
      ADMIN_RESET_USERNAME: ${ADMIN_RESET_USERNAME:-}
      ADMIN_RESET_EMAIL: ${ADMIN_RESET_EMAIL:-}
      ADMIN_RECOVERY_EMAIL: ${ADMIN_RECOVERY_EMAIL:-admin@vixo.click}
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-false}
      ALLOW_FORCE_MIGRATIONS: ${ALLOW_FORCE_MIGRATIONS:-false}
      SEED_DATABASE: ${SEED_DATABASE:-true}
      DB_SSL: "false"
      DB_POOL_MAX: "30"
      DB_POOL_MIN: "5"
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@vixo.click}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM: ${SENDGRID_FROM:-noreply@vixo.click}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@vixo.click}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      SMS_WEBHOOK_URL: ${SMS_WEBHOOK_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_SCOPES: ${GOOGLE_SCOPES:-openid,email,profile}
      GOOGLE_ANDROID_CLIENT_ID: ${GOOGLE_ANDROID_CLIENT_ID:-}
      PRERENDER_TOKEN: ${PRERENDER_TOKEN:-}
      PRERENDER_SERVICE_URL: ${PRERENDER_SERVICE_URL:-https://service.prerender.io}
      PRERENDER_TIMEOUT_MS: ${PRERENDER_TIMEOUT_MS:-10000}
      GOOGLE_CLIENT_ID_ANDROID: ${GOOGLE_CLIENT_ID_ANDROID:-}
      GOOGLE_ANDROID_LOGIN_MODE: ${GOOGLE_ANDROID_LOGIN_MODE:-sdk-only}
      GOOGLE_ANDROID_ALLOW_WEB_CLIENT_FALLBACK: ${GOOGLE_ANDROID_ALLOW_WEB_CLIENT_FALLBACK:-false}
      GOOGLE_ALLOWED_AUDIENCES: ${GOOGLE_ALLOWED_AUDIENCES:-}
      GOOGLE_REQUEST_OFFLINE_ACCESS: ${GOOGLE_REQUEST_OFFLINE_ACCESS:-false}
      GOOGLE_ANDROID_PACKAGE_NAME: ${GOOGLE_ANDROID_PACKAGE_NAME:-}
      GOOGLE_ANDROID_SHA1: ${GOOGLE_ANDROID_SHA1:-}
      GOOGLE_ANDROID_SHA256: ${GOOGLE_ANDROID_SHA256:-}
      OAUTH_STATE_BINDING_STRICT: ${OAUTH_STATE_BINDING_STRICT:-true}
      OAUTH_REFRESH_TOKEN_STRATEGY: ${OAUTH_REFRESH_TOKEN_STRATEGY:-always}
      SOCIAL_ACCOUNT_LINKING_POLICY: ${SOCIAL_ACCOUNT_LINKING_POLICY:-merge-by-email}
      SOCIAL_OAUTH_DISABLED_PROVIDERS: ${SOCIAL_OAUTH_DISABLED_PROVIDERS:-}
      SOCIAL_OAUTH_FORCE_ENABLED_PROVIDERS: ${SOCIAL_OAUTH_FORCE_ENABLED_PROVIDERS:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TWITTER_API_KEY: ${TWITTER_API_KEY:-}
      TWITTER_API_SECRET: ${TWITTER_API_SECRET:-}
      TZ: UTC
    # No direct ports — Traefik handles all traffic via the vex-traefik network.
    # Uncomment the host port mapping below ONLY for local debugging from the VPS shell.
    expose:
      - "3001"
    # ports:
    #   - "127.0.0.1:3001:3001"
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
    networks:
      - vex-internal
      - vex-traefik
    labels:
      # Enable Traefik. Default ON: the live `traefik-mrnn` container reads
      # /var/run/docker.sock and routes vixo.click via these labels — there is
      # no file-provider mount in production. Keep the env knob so a fresh
      # bring-up that hasn't touched .env still routes correctly.
      - "traefik.enable=${TRAEFIK_DOCKER_PROVIDER_ENABLED:-true}"
      - "traefik.docker.network=${TRAEFIK_EXTERNAL_NETWORK:-vex-traefik}"
      # HTTPS Router
      - "traefik.http.routers.vex.rule=Host(`vixo.click`) || Host(`www.vixo.click`)"
      - "traefik.http.routers.vex.entrypoints=websecure"
      - "traefik.http.routers.vex.tls=true"
      - "traefik.http.routers.vex.tls.certresolver=letsencrypt"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.vex-http.rule=Host(`vixo.click`) || Host(`www.vixo.click`)"
      - "traefik.http.routers.vex-http.entrypoints=web"
      - "traefik.http.routers.vex-http.middlewares=vex-https-redirect"
      - "traefik.http.middlewares.vex-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.vex-https-redirect.redirectscheme.permanent=true"
      # Service port
      - "traefik.http.services.vex.loadbalancer.server.port=3001"
      - "traefik.http.services.vex.loadbalancer.server.scheme=http"
      # Security Headers
      - "traefik.http.middlewares.vex-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.vex-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.vex-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.vex-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.vex-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.vex-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.vex-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.vex-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.vex-headers.headers.customResponseHeaders.X-Robots-Tag=index, follow"
      - "traefik.http.middlewares.vex-headers.headers.customResponseHeaders.Cross-Origin-Opener-Policy=same-origin-allow-popups"
      # Gzip compression at Traefik level
      - "traefik.http.middlewares.vex-compress.compress=true"
      - "traefik.http.middlewares.vex-compress.compress.minResponseBodyBytes=1024"
      # Edge rate limit (defence-in-depth on top of the app-level limiter).
      # 200 req/s sustained per source with 400-burst tolerance — generous
      # enough for legitimate WebSocket reconnect storms but cuts off
      # credential-stuffing / scraping floods before they touch the app.
      - "traefik.http.middlewares.vex-ratelimit.ratelimit.average=200"
      - "traefik.http.middlewares.vex-ratelimit.ratelimit.burst=400"
      - "traefik.http.middlewares.vex-ratelimit.ratelimit.period=1s"
      - "traefik.http.middlewares.vex-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=1"
      # Chain middlewares (order matters: rate limit first, then headers, then compress)
      - "traefik.http.routers.vex.middlewares=vex-ratelimit,vex-headers,vex-compress"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/api/health" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # coturn — self-hosted TURN/STUN for WebRTC voice/video
  # Activated as part of the default production stack. The service is a no-op
  # (won't fail other services) until TURN_STATIC_SECRET is set in .env. See
  # deploy/coturn/README.md for the full activation runbook (DNS, firewall,
  # secret generation, config rendering, verification).
  # Uses host networking so the relay UDP port range (49152-65535) is reachable
  # without enumerating tens of thousands of port mappings.
  # ---------------------------------------------------------------------------
  coturn:
    image: coturn/coturn:latest
    container_name: vex-coturn
    restart: unless-stopped
    profiles: ["${TURN_COMPOSE_PROFILE:-coturn}"]
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.30"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      TURN_HOST: ${TURN_HOST:-}
      TURN_REALM: ${TURN_REALM:-vixo.click}
      TURN_STATIC_SECRET: ${TURN_STATIC_SECRET:-}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:-}
    volumes:
      - ./deploy/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x turnserver || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  vex-internal:
    driver: bridge
  vex-traefik:
    external: true
    name: ${TRAEFIK_EXTERNAL_NETWORK:-vex-traefik}

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  ai_agent_data:
    driver: local
