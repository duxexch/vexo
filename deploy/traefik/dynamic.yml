# File-provider configuration consumed by the running Traefik (currently the
# `traefik-mrnn` compose project on the VPS). Router and service names are
# preserved as `vex-http`, `vex-https`, `vex-service` to stay compatible with
# the live deployment.
#
# The security middlewares + compression are now wired in here too so the
# file-provider path serves the same hardened response as the Docker-label
# path in docker-compose.prod.yml — no silent downgrade if labels are off.

http:
  routers:
    vex-http:
      rule: Host(`vixo.click`) || Host(`www.vixo.click`)
      entryPoints:
        - web
      middlewares:
        - redirect-http-to-canonical
      service: vex-service

    vex-https:
      rule: Host(`vixo.click`) || Host(`www.vixo.click`)
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - redirect-www-to-canonical
        - vex-compress
        - vex-headers
      service: vex-service

  middlewares:
    redirect-http-to-canonical:
      redirectRegex:
        regex: "^http://(?:www\\.)?vixo\\.click/(.*)"
        replacement: "https://vixo.click/$1"
        permanent: true

    redirect-www-to-canonical:
      redirectRegex:
        regex: "^https://www\\.vixo\\.click/(.*)"
        replacement: "https://vixo.click/$1"
        permanent: true

    vex-compress:
      compress:
        minResponseBodyBytes: 1024

    vex-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        customFrameOptionsValue: "SAMEORIGIN"
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: strict-origin-when-cross-origin
        customResponseHeaders:
          X-Robots-Tag: "index, follow"
          Cross-Origin-Opener-Policy: "same-origin-allow-popups"

  services:
    vex-service:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: http://vex-app:3001
        healthCheck:
          path: /api/health
          interval: 30s
          timeout: 10s
