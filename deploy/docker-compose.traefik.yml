# VEX Platform - Traefik Reverse Proxy
# Production Traefik for vixo.click on Hostinger VPS (/docker/vex).
#
# Bootstrap (run once on VPS, before deploying the app stack):
#   docker network create vex-traefik 2>/dev/null || true
#   docker compose -f deploy/docker-compose.traefik.yml --env-file .env up -d
#
# Notes:
# - Uses BOTH the Docker provider (reads labels from docker-compose.prod.yml)
#   AND the file provider (reads deploy/traefik/dynamic.yml as fallback).
# - exposedByDefault=false means only containers with `traefik.enable=true`
#   are routed (security best practice).
# - Requires ACME_EMAIL in .env (used for Let's Encrypt certificate registration).

services:
  traefik:
    image: traefik:v3.1
    container_name: vex-traefik
    hostname: vex-traefik
    restart: unless-stopped
    command:
      # Providers
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${TRAEFIK_EXTERNAL_NETWORK:-vex-traefik}
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Let's Encrypt (HTTP-01 challenge)
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      # Logging
      - --accesslog=true
      - --log.level=INFO
      # Disable insecure dashboard in production
      - --api.dashboard=false
      - --api.insecure=false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - vex-traefik
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:80/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vex-traefik:
    external: true
    name: ${TRAEFIK_EXTERNAL_NETWORK:-vex-traefik}

volumes:
  traefik_letsencrypt:
    driver: local
