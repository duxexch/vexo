# Nginx Configuration for VEX Platform
# Location: /etc/nginx/sites-available/vex
# Domain: vixo.click
# NOTE: Only needed if not using Traefik (Docker setup uses Traefik instead)

# Worker connections optimization (add to /etc/nginx/nginx.conf if needed)
# worker_processes auto;
# worker_rlimit_nofile 65535;
# events { worker_connections 4096; }

# Rate limiting zones - tuned for high traffic
limit_req_zone $binary_remote_addr zone=api_limit:20m rate=30r/s;      # 30 req/sec per IP
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;     # 10 req/min for auth
limit_req_zone $binary_remote_addr zone=strict_limit:10m rate=5r/m;    # 5 req/min for sensitive
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Blocked IPs (add malicious IPs here)
# geo $blocked_ip {
#     default 0;
#     1.2.3.4 1;  # Example blocked IP
# }

# Upstream Node.js server with load balancing
# ip_hash ensures WebSocket connections from the same client always route
# to the same Node.js worker, maintaining game room state consistency.
# For cluster mode (NODE_CLUSTER_ENABLED=true), Node.js primary process
# handles ip_hash internally — Nginx ip_hash provides an extra layer.
upstream vex_backend {
    ip_hash;     # Sticky sessions for WebSocket affinity
    server 127.0.0.1:3001;
    keepalive 128;  # Keep connections alive for performance
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name vixo.click www.vixo.click;
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server - Main configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vixo.click www.vixo.click;
    
    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/vixo.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vixo.click/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/vixo.click/chain.pem;
    
    # Modern SSL configuration (A+ rating on SSL Labs)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Security headers - comprehensive protection
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Hide nginx version
    server_tokens off;
    
    # Gzip compression - optimized for performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    
    # Connection limits - per IP
    limit_conn conn_limit 30;  # 30 concurrent connections per IP
    
    # Client settings
    client_max_body_size 20M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;
    
    # Buffers
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # Logging with JSON format (for analysis)
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
    '}';
    
    access_log /var/log/nginx/vex-access.log json_combined;
    error_log /var/log/nginx/vex-error.log warn;
    
    # Static files root
    root /var/www/vex/dist/public;
    
    # Block blocked IPs
    # if ($blocked_ip) {
    #     return 403;
    # }
    
    # Auth endpoints - strict rate limiting (brute force protection)
    location ~ ^/api/(auth|admin/login|admin/bootstrap) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        
        proxy_pass http://vex_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
    
    # Sensitive operations - stricter rate limiting
    location ~ ^/api/transactions/(withdraw|transfer) {
        limit_req zone=strict_limit burst=2 nodelay;
        limit_req_status 429;
        
        proxy_pass http://vex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
    
    # API endpoints - general rate limiting
    location /api {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;
        
        proxy_pass http://vex_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        
        # Proxy buffering for better performance
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # WebSocket support - no rate limiting, long timeout
    location /ws {
        proxy_pass http://vex_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # 24 hours for persistent connections
        proxy_send_timeout 86400;
    }
    
    # Health check endpoint - no logging, no rate limit
    location /api/health {
        proxy_pass http://vex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
    
    # Service Worker — NEVER cache, must revalidate on every visit
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Service-Worker-Allowed "/";
        add_header Content-Type "application/javascript; charset=utf-8";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri @backend;
    }

    # Manifest — short cache with correct MIME type
    location = /manifest.json {
        add_header Content-Type "application/manifest+json; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri @backend;
    }

    # Robots — explicit location with backend fallback to prevent edge 404s
    location = /robots.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=1800";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri @backend;
    }

    # Static assets - aggressive caching (excludes sw.js and manifest.json above)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri @backend;
    }
    
    # SPA fallback - serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache HTML for shorter time
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
    
    # Backend fallback for missing static files
    location @backend {
        proxy_pass http://vex_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Block hidden files and sensitive paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ /\.git {
        deny all;
    }
    
    location ~ /\.env {
        deny all;
    }
    
    # Block common attack paths
    location ~ /(wp-admin|wp-login|xmlrpc|phpmyadmin|admin\.php) {
        deny all;
        access_log off;
    }
}
