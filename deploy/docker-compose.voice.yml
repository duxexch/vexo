# Voice stack for low-latency game voice: LiveKit + coturn
# Usage:
#   docker compose -f deploy/docker-compose.voice.yml --env-file .env up -d

name: vex

services:
  livekit:
    image: livekit/livekit-server:v1.9
    container_name: vex-livekit
    restart: unless-stopped
    command: --config /etc/livekit/livekit.yaml
    environment:
      LIVEKIT_KEYS: ${LIVEKIT_KEYS}
    volumes:
      - ./voice/livekit.yaml:/etc/livekit/livekit.yaml:ro
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "7882:7882/udp"
    networks:
      - vex-voice

  coturn:
    image: coturn/coturn:4.6.2
    container_name: vex-coturn
    restart: unless-stopped
    command: >
      -n --listening-ip=0.0.0.0 --external-ip=${TURN_EXTERNAL_IP}
      --listening-port=3478 --tls-listening-port=5349 --min-port=49160
      --max-port=49200 --fingerprint --lt-cred-mech --realm=${TURN_REALM}
      --user=${TURN_USERNAME}:${TURN_PASSWORD} --no-cli --no-multicast-peers
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "49160-49200:49160-49200/udp"
    networks:
      - vex-voice

networks:
  vex-voice:
    driver: bridge
