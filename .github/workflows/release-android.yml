name: Release Android (DEPRECATED — use Android Build (Manual))

# DEPRECATED — this workflow has been superseded by android-build.yml,
# which now produces both APK and AAB in a single manual run.
#
# This file is kept only as a placeholder so existing references
# (links, badges, history) do not 404. It is manual-only and exits
# immediately with an explanatory message; it cannot be triggered by
# pushes or pull requests.
#
# To produce a signed Android build go to:
#   Actions → Android Build (Manual) → Run workflow

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-android-deprecated-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify-deprecated:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Print deprecation notice and exit
        run: |
          echo "::warning::This workflow is deprecated."
          echo "::warning::Use 'Android Build (Manual)' (.github/workflows/android-build.yml) instead."
          echo "::warning::That workflow builds both APK and AAB in a single run."
          exit 0
