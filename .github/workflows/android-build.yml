name: Android Build (Manual)

# Manual-only Android build pipeline.
# Triggered from Actions → "Android Build (Manual)" → Run workflow.
#
# Required repository secrets (configured under Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of the .jks keystore
#                              (generate with: base64 -w 0 vex-release-official.jks)
#   KEYSTORE_PASSWORD          store password
#   KEY_ALIAS                  key alias inside the keystore
#   KEY_PASSWORD               password for the alias entry

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to build"
        required: true
        default: "both"
        type: choice
        options:
          - apk
          - aab
          - both

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v5
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Install npm dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Add Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore from secret (safe printf method)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          mkdir -p android/keystore
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/keystore/vex-release-official.jks

      - name: Verify keystore exists and is non-empty
        run: |
          KEYSTORE_FILE="android/keystore/vex-release-official.jks"
          if [ ! -f "$KEYSTORE_FILE" ]; then
            echo "::error::Keystore file not found at $KEYSTORE_FILE"
            exit 1
          fi
          if [ ! -s "$KEYSTORE_FILE" ]; then
            echo "::error::Keystore file is empty at $KEYSTORE_FILE"
            exit 1
          fi
          echo "Keystore verified: $(wc -c < "$KEYSTORE_FILE") bytes"

      - name: Verify KEY_ALIAS matches an alias inside the keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          KEYSTORE_FILE="android/keystore/vex-release-official.jks"
          echo "=== Aliases present inside the keystore ==="
          # Print each alias on its own line. The alias names themselves
          # are NOT GitHub secrets, so they are not masked — this is what
          # lets us tell the user what to put in KEY_ALIAS.
          keytool -list -keystore "$KEYSTORE_FILE" \
                  -storepass "$KEYSTORE_PASSWORD" 2>/dev/null \
            | awk -F',' '/PrivateKeyEntry|trustedCertEntry/ { print "  - " $1 }'
          echo ""
          # The KEY_ALIAS value itself is masked in the log, but the
          # success/failure message tells us whether it matched.
          if keytool -list -keystore "$KEYSTORE_FILE" \
                     -storepass "$KEYSTORE_PASSWORD" \
                     -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "OK: the value of the KEY_ALIAS secret matches an alias inside the keystore."
          else
            echo "::error::The value of the KEY_ALIAS secret does NOT match any alias inside the keystore."
            echo "::error::Update the KEY_ALIAS secret in GitHub Settings → Secrets and variables → Actions to one of the names listed above."
            exit 1
          fi

      - name: Verify KEY_PASSWORD can decrypt the private key
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          KEYSTORE_FILE="android/keystore/vex-release-official.jks"
          # `-certreq` requires unwrapping the private key, which exercises
          # the key password. If KEY_PASSWORD is wrong, this fails fast (in
          # ~1 second) instead of waiting ~3 minutes for the full Gradle
          # build to fail at :app:packageRelease.
          # We discard the CSR output — we only care about the exit code.
          if keytool -certreq -keystore "$KEYSTORE_FILE" \
                     -storepass "$KEYSTORE_PASSWORD" \
                     -alias "$KEY_ALIAS" \
                     -keypass "$KEY_PASSWORD" >/dev/null 2>&1; then
            echo "OK: KEY_PASSWORD successfully decrypts the private key for alias '$KEY_ALIAS' style entry."
          else
            echo "::error::KEY_PASSWORD does NOT match the password of the key inside the keystore."
            echo "::error::Update the KEY_PASSWORD secret in GitHub Settings → Secrets and variables → Actions."
            echo "::error::Hint: For PKCS12 keystores created with keytool, the key password is usually the SAME as KEYSTORE_PASSWORD."
            echo "::error::To verify locally, run:"
            echo "::error::  keytool -certreq -keystore vex-release-official.jks -alias vex_release"
            echo "::error::and enter your KEYSTORE_PASSWORD then your KEY_PASSWORD when prompted."
            exit 1
          fi

      - name: Inject Kotlin Gradle plugin classpath into root build.gradle
        run: node scripts/ci/patch-android-kotlin.mjs

      - name: Inject signing config into build.gradle
        run: node scripts/ci/patch-android-signing.mjs

      - name: Verify signing secrets are present
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$KEY_ALIAS" ]         && missing+=("KEY_ALIAS")
          [ -z "$KEYSTORE_PASSWORD" ] && missing+=("KEYSTORE_PASSWORD")
          [ -z "$KEY_PASSWORD" ]      && missing+=("KEY_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub secrets: ${missing[*]}"
            echo "::error::Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All required signing secrets are present."

      - name: Build APK and/or AAB with Gradle
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/keystore/vex-release-official.jks
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          cd android
          case "$TARGET" in
            apk)
              ./gradlew --no-daemon assembleRelease
              ;;
            aab)
              ./gradlew --no-daemon bundleRelease
              ;;
            both)
              ./gradlew --no-daemon assembleRelease bundleRelease
              ;;
            *)
              echo "::error::Unknown target: $TARGET (expected apk|aab|both)"
              exit 1
              ;;
          esac

      - name: Resolve app version from package.json
        id: version
        run: |
          # Extract semantic version from the project package.json so every
          # build artefact carries a meaningful version stamp (used in commit
          # messages, release titles, and notes).
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "::error::Could not read version from package.json"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "full_version=v${VERSION}-build${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: v${VERSION}-build${{ github.run_number }}"

      - name: Copy outputs to client/public/downloads/
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          # Stage the signed binaries under the canonical filenames that are
          # explicitly whitelisted in .gitignore (lines 54-55):
          #   !client/public/downloads/VEX-official-release.apk
          #   !client/public/downloads/VEX-official-release.aab
          # Using these exact names allows `git add` to pick them up while the
          # rest of *.apk / *.aab in that folder stays ignored. The names are
          # ALSO stable: each build overwrites the previous file at the same
          # path, so a `git pull` on the Hostinger VPS automatically replaces
          # the old binary with the newest one on every deploy.
          mkdir -p client/public/downloads
          APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
          AAB_SRC="android/app/build/outputs/bundle/release/app-release.aab"
          APK_DST="client/public/downloads/VEX-official-release.apk"
          AAB_DST="client/public/downloads/VEX-official-release.aab"

          if [ "$TARGET" = "apk" ] || [ "$TARGET" = "both" ]; then
            if [ ! -s "$APK_SRC" ]; then
              echo "::error::APK output missing or empty at $APK_SRC"
              exit 1
            fi
            cp -f "$APK_SRC" "$APK_DST"
            test -s "$APK_DST" || (echo "::error::Failed to stage APK at $APK_DST" && exit 1)
            echo "APK staged: $APK_DST ($(wc -c < "$APK_DST") bytes)"
          fi

          if [ "$TARGET" = "aab" ] || [ "$TARGET" = "both" ]; then
            if [ ! -s "$AAB_SRC" ]; then
              echo "::error::AAB output missing or empty at $AAB_SRC"
              exit 1
            fi
            cp -f "$AAB_SRC" "$AAB_DST"
            test -s "$AAB_DST" || (echo "::error::Failed to stage AAB at $AAB_DST" && exit 1)
            echo "AAB staged: $AAB_DST ($(wc -c < "$AAB_DST") bytes)"
          fi

      - name: Commit and push updated binaries to repo
        env:
          TARGET: ${{ github.event.inputs.target }}
          FULL_VERSION: ${{ steps.version.outputs.full_version }}
        run: |
          # The destination filenames (VEX-official-release.apk / .aab) are
          # explicitly whitelisted in .gitignore AND have an .gitattributes
          # override that disables LFS for them specifically — so a normal
          # `git add` stages them as raw binary blobs (not 133-byte LFS
          # pointers). This means a plain `git pull` on the Hostinger VPS
          # retrieves the actual installable APK/AAB, not a text pointer
          # the web server would serve as a broken HTML response.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Defensive: previous builds (before the .gitattributes override)
          # committed these paths as LFS pointers. Drop the LFS-pointer
          # entry from the index first so `git add` re-stages the freshly
          # built file as a raw blob under the new attribute rules.
          if [ "$TARGET" = "apk" ] || [ "$TARGET" = "both" ]; then
            git rm --cached --ignore-unmatch client/public/downloads/VEX-official-release.apk >/dev/null 2>&1 || true
            git add client/public/downloads/VEX-official-release.apk
          fi
          if [ "$TARGET" = "aab" ] || [ "$TARGET" = "both" ]; then
            git rm --cached --ignore-unmatch client/public/downloads/VEX-official-release.aab >/dev/null 2>&1 || true
            git add client/public/downloads/VEX-official-release.aab
          fi

          # Sanity check: confirm the staged blob is the real binary, not a
          # tiny LFS pointer. Pointer files start with the literal string
          # `version https://git-lfs.github.com/spec/v1` — bail loudly if we
          # ever see one entering the commit, so the bug never silently
          # ships a broken artefact again.
          for STAGED in client/public/downloads/VEX-official-release.apk \
                        client/public/downloads/VEX-official-release.aab; do
            if git ls-files --stage --error-unmatch "$STAGED" >/dev/null 2>&1; then
              SHA=$(git ls-files --stage "$STAGED" | awk '{print $2}')
              SIZE=$(git cat-file -s "$SHA")
              FIRST=$(git cat-file blob "$SHA" | head -c 50 || true)
              echo "Staged $STAGED → blob $SHA ($SIZE bytes)"
              case "$FIRST" in
                "version https://git-lfs."*)
                  echo "::error::Staged $STAGED is still an LFS pointer ($SIZE bytes). Aborting to prevent shipping a broken artefact."
                  exit 1
                  ;;
              esac
              if [ "$SIZE" -lt 1000000 ]; then
                echo "::error::Staged $STAGED is suspiciously small ($SIZE bytes < 1 MB). Aborting."
                exit 1
              fi
            fi
          done

          if git diff --cached --quiet; then
            echo "No binary changes to commit (outputs identical to current files)."
          else
            git commit -m "chore(android): publish ${FULL_VERSION} signed ${TARGET} build [skip ci]"
            # Pull-then-push to survive races with other commits on main.
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
            echo "Pushed updated ${TARGET} binary/binaries (${FULL_VERSION})."
          fi

      - name: Create or update GitHub Release (versioned + latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ github.event.inputs.target }}
          VERSION: ${{ steps.version.outputs.version }}
          FULL_VERSION: ${{ steps.version.outputs.full_version }}
        run: |
          # We publish to TWO release tags on every successful build:
          #   1) ${FULL_VERSION}   — immutable, version-stamped (history).
          #   2) latest-android    — moving pointer, always the newest build,
          #                          giving you a stable download URL like:
          #      https://github.com/<owner>/<repo>/releases/download/latest-android/VEX-official-release.apk
          NOTES="Signed Android build for VEX (${FULL_VERSION}).

          App version : ${VERSION}
          Build number: ${{ github.run_number }}
          Target      : ${TARGET}
          Commit      : ${{ github.sha }}
          Triggered by: ${{ github.actor }}"

          ASSETS=()
          if [ "$TARGET" = "apk" ] || [ "$TARGET" = "both" ]; then
            ASSETS+=("client/public/downloads/VEX-official-release.apk")
          fi
          if [ "$TARGET" = "aab" ] || [ "$TARGET" = "both" ]; then
            ASSETS+=("client/public/downloads/VEX-official-release.aab")
          fi

          publish_release() {
            local TAG="$1"
            local TITLE="$2"
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already exists — replacing assets."
              gh release upload "$TAG" "${ASSETS[@]}" --clobber
              gh release edit "$TAG" --title "$TITLE" --notes "$NOTES"
            else
              echo "Creating new release $TAG."
              gh release create "$TAG" "${ASSETS[@]}" \
                --title "$TITLE" \
                --notes "$NOTES" \
                --target "${{ github.sha }}"
            fi
          }

          # 1) Versioned, immutable release — kept forever in history.
          publish_release "${FULL_VERSION}" \
            "VEX Android ${FULL_VERSION} (${TARGET})"

          # 2) Moving pointer — always the freshest build at a stable URL.
          publish_release "latest-android" \
            "VEX Android — latest (${FULL_VERSION}, ${TARGET})"

      - name: Upload artefacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: VEX-android-${{ steps.version.outputs.full_version }}-${{ github.event.inputs.target }}
          path: |
            client/public/downloads/VEX-official-release.apk
            client/public/downloads/VEX-official-release.aab
          if-no-files-found: ignore
          retention-days: 14
