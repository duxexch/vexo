name: Android Build (Manual)

# Manual-only Android build pipeline.
# Triggered from Actions → "Android Build (Manual)" → Run workflow.
#
# Required repository secrets (configured under Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of the .jks keystore
#                              (generate with: base64 -w 0 vex-release-official.jks)
#   KEYSTORE_PASSWORD          store password
#   KEY_ALIAS                  key alias inside the keystore
#   KEY_PASSWORD               password for the alias entry

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to build"
        required: true
        default: "both"
        type: choice
        options:
          - apk
          - aab
          - both

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Install npm dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Verify web bundle is complete (size sanity check)
        # The Capacitor APK embeds the entire dist/public/ tree under
        # android/app/src/main/assets/public/. A truncated build would
        # silently produce a tiny APK (~12 MB) that loads a broken WebView
        # at runtime — exactly the "size keeps changing" symptom the user
        # reported. We refuse to proceed unless dist/public/index.html
        # exists AND the total dist/public/ tree is at least 3 MB, which
        # is the floor the real VEX bundle has hit since v1.0.0.
        run: |
          if [ ! -f "dist/public/index.html" ]; then
            echo "::error::dist/public/index.html missing — npm run build did not produce a web bundle."
            exit 1
          fi
          BYTES=$(du -sb dist/public | awk '{print $1}')
          MIN_BYTES=$((3 * 1024 * 1024))
          MB=$((BYTES / 1024 / 1024))
          if [ "$BYTES" -lt "$MIN_BYTES" ]; then
            echo "::error::dist/public is only ${MB} MB (< 3 MB minimum). The web bundle is incomplete and the resulting APK would not work offline."
            echo "::error::Investigate vite.config.ts and the build step before re-running."
            exit 1
          fi
          echo "Web bundle OK: dist/public is ${MB} MB."

      - name: Add Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Android launcher icons + splash from VEX logo
        # Replaces Capacitor's default white-square placeholder icons with
        # the real VEX brand mark across every density (mdpi → xxxhdpi),
        # plus the Android 8+ adaptive icon foreground/background and the
        # SplashScreen plugin's drawable/splash.png. Without this step the
        # installed APK shows a blank white icon on the home screen and
        # during installation, which is what the user reported.
        run: node scripts/ci/generate-android-assets.mjs

      - name: Decode keystore from secret (safe printf method)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          mkdir -p android/keystore
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/keystore/vex-release-official.jks

      - name: Verify keystore exists and is non-empty
        run: |
          KEYSTORE_FILE="android/keystore/vex-release-official.jks"
          if [ ! -f "$KEYSTORE_FILE" ]; then
            echo "::error::Keystore file not found at $KEYSTORE_FILE"
            exit 1
          fi
          if [ ! -s "$KEYSTORE_FILE" ]; then
            echo "::error::Keystore file is empty at $KEYSTORE_FILE"
            exit 1
          fi
          echo "Keystore verified: $(wc -c < "$KEYSTORE_FILE") bytes"

      - name: Verify KEY_ALIAS matches an alias inside the keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          KEYSTORE_FILE="android/keystore/vex-release-official.jks"
          echo "=== Aliases present inside the keystore ==="
          # Print each alias on its own line. The alias names themselves
          # are NOT GitHub secrets, so they are not masked — this is what
          # lets us tell the user what to put in KEY_ALIAS.
          keytool -list -keystore "$KEYSTORE_FILE" \
                  -storepass "$KEYSTORE_PASSWORD" 2>/dev/null \
            | awk -F',' '/PrivateKeyEntry|trustedCertEntry/ { print "  - " $1 }'
          echo ""
          # The KEY_ALIAS value itself is masked in the log, but the
          # success/failure message tells us whether it matched.
          if keytool -list -keystore "$KEYSTORE_FILE" \
                     -storepass "$KEYSTORE_PASSWORD" \
                     -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "OK: the value of the KEY_ALIAS secret matches an alias inside the keystore."
          else
            echo "::error::The value of the KEY_ALIAS secret does NOT match any alias inside the keystore."
            echo "::error::Update the KEY_ALIAS secret in GitHub Settings → Secrets and variables → Actions to one of the names listed above."
            exit 1
          fi

      - name: Verify KEY_PASSWORD can decrypt the private key
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          KEYSTORE_FILE="android/keystore/vex-release-official.jks"
          # `-certreq` requires unwrapping the private key, which exercises
          # the key password. If KEY_PASSWORD is wrong, this fails fast (in
          # ~1 second) instead of waiting ~3 minutes for the full Gradle
          # build to fail at :app:packageRelease.
          # We discard the CSR output — we only care about the exit code.
          if keytool -certreq -keystore "$KEYSTORE_FILE" \
                     -storepass "$KEYSTORE_PASSWORD" \
                     -alias "$KEY_ALIAS" \
                     -keypass "$KEY_PASSWORD" >/dev/null 2>&1; then
            echo "OK: KEY_PASSWORD successfully decrypts the private key for alias '$KEY_ALIAS' style entry."
          else
            echo "::error::KEY_PASSWORD does NOT match the password of the key inside the keystore."
            echo "::error::Update the KEY_PASSWORD secret in GitHub Settings → Secrets and variables → Actions."
            echo "::error::Hint: For PKCS12 keystores created with keytool, the key password is usually the SAME as KEYSTORE_PASSWORD."
            echo "::error::To verify locally, run:"
            echo "::error::  keytool -certreq -keystore vex-release-official.jks -alias vex_release"
            echo "::error::and enter your KEYSTORE_PASSWORD then your KEY_PASSWORD when prompted."
            exit 1
          fi

      - name: Inject Kotlin Gradle plugin classpath into root build.gradle
        run: node scripts/ci/patch-android-kotlin.mjs

      - name: Inject signing config into build.gradle
        run: node scripts/ci/patch-android-signing.mjs

      - name: Verify signing secrets are present
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$KEY_ALIAS" ]         && missing+=("KEY_ALIAS")
          [ -z "$KEYSTORE_PASSWORD" ] && missing+=("KEYSTORE_PASSWORD")
          [ -z "$KEY_PASSWORD" ]      && missing+=("KEY_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub secrets: ${missing[*]}"
            echo "::error::Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All required signing secrets are present."

      - name: Build APK and/or AAB with Gradle
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/keystore/vex-release-official.jks
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          cd android
          case "$TARGET" in
            apk)
              ./gradlew --no-daemon assembleRelease
              ;;
            aab)
              ./gradlew --no-daemon bundleRelease
              ;;
            both)
              ./gradlew --no-daemon assembleRelease bundleRelease
              ;;
            *)
              echo "::error::Unknown target: $TARGET (expected apk|aab|both)"
              exit 1
              ;;
          esac

      - name: Verify APK signing schemes (v1 + v2 + v3)
        # Google Play Protect surfaces "harmful app" / "unsafe app" warnings
        # when an APK is missing the modern signing schemes (v2 mandatory
        # since Android 11, v3 since Android 12) or when zipalign is not
        # applied. apksigner is the canonical Android tool that:
        #   1) confirms every required signing scheme is present,
        #   2) prints the certificate fingerprint so we can pin it across
        #      releases (a fingerprint change between builds is the single
        #      biggest reason Play Protect flags an installation).
        # Sideloaded APKs ALWAYS get a "you usually don't install apps from
        # this source" prompt — that is platform policy, not a signing bug.
        # Removing it requires shipping the AAB through the Play Store.
        if: ${{ github.event.inputs.target == 'apk' || github.event.inputs.target == 'both' }}
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -s "$APK" ]; then
            echo "::error::APK missing at $APK — earlier Gradle step must have failed."
            exit 1
          fi
          BUILD_TOOLS_DIR="$(ls -d "$ANDROID_HOME"/build-tools/* 2>/dev/null | sort -V | tail -n1)"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          if [ ! -x "$APKSIGNER" ]; then
            echo "::error::apksigner not found at $APKSIGNER — Android build-tools missing."
            exit 1
          fi
          echo "=== apksigner verify -v --print-certs ==="
          "$APKSIGNER" verify -v --print-certs "$APK" | tee /tmp/apksigner.txt
          if ! grep -q "Verified using v2 scheme (APK Signature Scheme v2): true" /tmp/apksigner.txt; then
            echo "::error::APK is NOT signed with v2 scheme — Play Protect WILL flag this APK as harmful."
            echo "::error::Inspect signingConfig in scripts/ci/patch-android-signing.mjs and confirm v2SigningEnabled."
            exit 1
          fi
          if ! grep -q "Verified using v3 scheme (APK Signature Scheme v3): true" /tmp/apksigner.txt; then
            echo "::error::APK is NOT signed with v3 scheme — required by Android 12+ for trusted installation."
            exit 1
          fi
          echo "Signing scheme check passed: APK is signed with v1 + v2 + v3."

          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          if [ -x "$ZIPALIGN" ]; then
            echo "=== zipalign -c -v 4 ==="
            if "$ZIPALIGN" -c -v 4 "$APK" >/dev/null; then
              echo "zipalign check passed."
            else
              echo "::error::APK is not 4-byte aligned — installation may fail on stricter devices."
              exit 1
            fi
          fi

      - name: Resolve app version from package.json
        id: version
        run: |
          # Extract semantic version from the project package.json so every
          # build artefact carries a meaningful version stamp (used in commit
          # messages, release titles, and notes).
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "::error::Could not read version from package.json"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "full_version=v${VERSION}-build${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: v${VERSION}-build${{ github.run_number }}"

      - name: Stage signed binaries for release upload
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          # Binaries go to a workflow-only staging directory (NOT into the
          # git tree). The next step uploads them to a GitHub Release; the
          # Hostinger VPS pulls them from the Release CDN at deploy time
          # via scripts/server/refresh-android-binaries.sh — keeping git
          # history clean and eliminating LFS / merge-conflict pain.
          mkdir -p dist/android-release
          APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
          AAB_SRC="android/app/build/outputs/bundle/release/app-release.aab"
          APK_DST="dist/android-release/VEX-official-release.apk"
          AAB_DST="dist/android-release/VEX-official-release.aab"

          if [ "$TARGET" = "apk" ] || [ "$TARGET" = "both" ]; then
            if [ ! -s "$APK_SRC" ]; then
              echo "::error::APK output missing or empty at $APK_SRC"
              exit 1
            fi
            cp -f "$APK_SRC" "$APK_DST"
            test -s "$APK_DST" || (echo "::error::Failed to stage APK at $APK_DST" && exit 1)
            echo "APK staged: $APK_DST ($(wc -c < "$APK_DST") bytes)"
          fi

          if [ "$TARGET" = "aab" ] || [ "$TARGET" = "both" ]; then
            if [ ! -s "$AAB_SRC" ]; then
              echo "::error::AAB output missing or empty at $AAB_SRC"
              exit 1
            fi
            cp -f "$AAB_SRC" "$AAB_DST"
            test -s "$AAB_DST" || (echo "::error::Failed to stage AAB at $AAB_DST" && exit 1)
            echo "AAB staged: $AAB_DST ($(wc -c < "$AAB_DST") bytes)"
          fi

      # Some `gh` operations against this repo (release create + asset upload
      # against `latest-android`, which is a moving tag) intermittently
      # returned 403 when only `GH_TOKEN` was exported. The CLI consults
      # both env vars but Actions paths that fall back to the underlying
      # `git push` (e.g. the moving-tag refresh) need git credential helper
      # wiring, which `gh auth setup-git` configures. Doing both unblocks
      # the failure mode described in the workflow logs.
      - name: Configure gh CLI git credential helper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth setup-git

      - name: Create or update GitHub Release (versioned + latest)
        env:
          # Export BOTH names — `gh` accepts either, but some Actions code
          # paths and contrib actions check specifically for GITHUB_TOKEN.
          # Keeping both removes the "wrong-name" class of 403s without
          # changing any other auth behaviour.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ github.event.inputs.target }}
          VERSION: ${{ steps.version.outputs.version }}
          FULL_VERSION: ${{ steps.version.outputs.full_version }}
        run: |
          # We publish to TWO release tags on every successful build:
          #   1) ${FULL_VERSION}   — immutable, version-stamped (history).
          #   2) latest-android    — moving pointer, always the newest build,
          #                          giving you a stable download URL like:
          #      https://github.com/<owner>/<repo>/releases/download/latest-android/VEX-official-release.apk
          NOTES="Signed Android build for VEX (${FULL_VERSION}).

          App version : ${VERSION}
          Build number: ${{ github.run_number }}
          Target      : ${TARGET}
          Commit      : ${{ github.sha }}
          Triggered by: ${{ github.actor }}"

          ASSETS=()
          if [ "$TARGET" = "apk" ] || [ "$TARGET" = "both" ]; then
            ASSETS+=("dist/android-release/VEX-official-release.apk")
          fi
          if [ "$TARGET" = "aab" ] || [ "$TARGET" = "both" ]; then
            ASSETS+=("dist/android-release/VEX-official-release.aab")
          fi

          publish_release() {
            local TAG="$1"
            local TITLE="$2"
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already exists — replacing assets."
              gh release upload "$TAG" "${ASSETS[@]}" --clobber
              gh release edit "$TAG" --title "$TITLE" --notes "$NOTES"
            else
              echo "Creating new release $TAG."
              gh release create "$TAG" "${ASSETS[@]}" \
                --title "$TITLE" \
                --notes "$NOTES" \
                --target "${{ github.sha }}"
            fi
          }

          # 1) Versioned, immutable release — kept forever in history.
          publish_release "${FULL_VERSION}" \
            "VEX Android ${FULL_VERSION} (${TARGET})"

          # 2) Moving pointer — always the freshest build at a stable URL.
          publish_release "latest-android" \
            "VEX Android — latest (${FULL_VERSION}, ${TARGET})"

      - name: Upload artefacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: VEX-android-${{ steps.version.outputs.full_version }}-${{ github.event.inputs.target }}
          path: |
            dist/android-release/VEX-official-release.apk
            dist/android-release/VEX-official-release.aab
          if-no-files-found: ignore
          retention-days: 14

      - name: Print deploy instructions
        env:
          FULL_VERSION: ${{ steps.version.outputs.full_version }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          REPO="${{ github.repository }}"
          echo "=========================================================="
          echo "  ✅ Android build ${FULL_VERSION} (${TARGET}) published"
          echo "=========================================================="
          echo ""
          echo "Stable download URLs (always point to the newest build):"
          echo "  APK: https://github.com/${REPO}/releases/download/latest-android/VEX-official-release.apk"
          echo "  AAB: https://github.com/${REPO}/releases/download/latest-android/VEX-official-release.aab"
          echo ""
          echo "Versioned URLs (immutable, kept forever):"
          echo "  APK: https://github.com/${REPO}/releases/download/${FULL_VERSION}/VEX-official-release.apk"
          echo "  AAB: https://github.com/${REPO}/releases/download/${FULL_VERSION}/VEX-official-release.aab"
          echo ""
          echo "To deploy to the Hostinger VPS, SSH in and run:"
          echo "  bash scripts/server/refresh-android-binaries.sh"
          echo ""
          echo "(That script downloads the binaries from the latest-android"
          echo " release straight into client/public/downloads/, with size +"
          echo " content-type sanity checks to prevent shipping broken files.)"
          echo "=========================================================="
