name: Android Build (Manual)

# Manual-only Android build pipeline.
# Triggered from Actions → "Android Build (Manual)" → Run workflow.
#
# Required repository secrets:
#   ANDROID_KEYSTORE_BASE64    base64 of the .jks keystore
#                              (generate with: base64 -w 0 vex-release-official.jks)
#   ANDROID_KEYSTORE_PASSWORD  store password
#   ANDROID_KEY_ALIAS          key alias inside the keystore
#   ANDROID_KEY_PASSWORD       password for the alias entry

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to build"
        required: true
        default: "both"
        type: choice
        options:
          - apk
          - aab
          - both

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Install npm dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Add Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore from secret (safe printf method)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          mkdir -p android/keystore
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/keystore/vex-release-official.jks

      - name: Verify keystore exists and is non-empty
        run: |
          KEYSTORE_FILE="android/keystore/vex-release-official.jks"
          if [ ! -f "$KEYSTORE_FILE" ]; then
            echo "::error::Keystore file not found at $KEYSTORE_FILE"
            exit 1
          fi
          if [ ! -s "$KEYSTORE_FILE" ]; then
            echo "::error::Keystore file is empty at $KEYSTORE_FILE"
            exit 1
          fi
          echo "Keystore verified: $(wc -c < "$KEYSTORE_FILE") bytes"

      - name: Inject signing config into build.gradle
        run: node scripts/ci/patch-android-signing.mjs

      - name: Build APK and/or AAB with Gradle
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/keystore/vex-release-official.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          cd android
          case "$TARGET" in
            apk)
              ./gradlew --no-daemon assembleRelease
              ;;
            aab)
              ./gradlew --no-daemon bundleRelease
              ;;
            both)
              ./gradlew --no-daemon assembleRelease bundleRelease
              ;;
            *)
              echo "::error::Unknown target: $TARGET (expected apk|aab|both)"
              exit 1
              ;;
          esac

      - name: Copy outputs to client/public/downloads/
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          mkdir -p client/public/downloads
          APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
          AAB_SRC="android/app/build/outputs/bundle/release/app-release.aab"
          APK_DST="client/public/downloads/app.apk"
          AAB_DST="client/public/downloads/app.aab"

          if [ "$TARGET" = "apk" ] || [ "$TARGET" = "both" ]; then
            if [ ! -s "$APK_SRC" ]; then
              echo "::error::APK output missing or empty at $APK_SRC"
              exit 1
            fi
            cp -f "$APK_SRC" "$APK_DST"
            test -s "$APK_DST" || (echo "::error::Failed to stage APK at $APK_DST" && exit 1)
            echo "APK staged: $(wc -c < "$APK_DST") bytes"
          fi

          if [ "$TARGET" = "aab" ] || [ "$TARGET" = "both" ]; then
            if [ ! -s "$AAB_SRC" ]; then
              echo "::error::AAB output missing or empty at $AAB_SRC"
              exit 1
            fi
            cp -f "$AAB_SRC" "$AAB_DST"
            test -s "$AAB_DST" || (echo "::error::Failed to stage AAB at $AAB_DST" && exit 1)
            echo "AAB staged: $(wc -c < "$AAB_DST") bytes"
          fi

      - name: Commit and push updated binaries
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage explicit files only — never wildcards.
          if [ "$TARGET" = "apk" ] || [ "$TARGET" = "both" ]; then
            git add client/public/downloads/app.apk
          fi
          if [ "$TARGET" = "aab" ] || [ "$TARGET" = "both" ]; then
            git add client/public/downloads/app.aab
          fi

          if git diff --cached --quiet; then
            echo "No binary changes to commit (outputs identical to current files)."
          else
            git commit -m "chore(android): update signed ${TARGET} build [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          TAG="android-build-${{ github.run_number }}"
          TITLE="VEX Android build #${{ github.run_number }} (${TARGET})"
          NOTES="Manual signed Android build.

          Commit: ${{ github.sha }}
          Target: ${TARGET}
          Triggered by: ${{ github.actor }}"

          # Collect artefact list to attach.
          ASSETS=()
          if [ "$TARGET" = "apk" ] || [ "$TARGET" = "both" ]; then
            ASSETS+=("client/public/downloads/app.apk")
          fi
          if [ "$TARGET" = "aab" ] || [ "$TARGET" = "both" ]; then
            ASSETS+=("client/public/downloads/app.aab")
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading/replacing assets."
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES"
          else
            echo "Creating new release $TAG."
            gh release create "$TAG" "${ASSETS[@]}" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --target "${{ github.sha }}"
          fi

      - name: Upload artefacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_number }}-${{ github.event.inputs.target }}
          path: |
            client/public/downloads/app.apk
            client/public/downloads/app.aab
          if-no-files-found: ignore
          retention-days: 14
