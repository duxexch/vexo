<!DOCTYPE html>
  <html lang="ar" dir="rtl">
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX — ضربة المعلم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0f1419;
      font-family: 'Tajawal', 'Inter', system-ui, sans-serif;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .ad {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.05) contrast(1.05);
    }
    .top-tint {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 28vh;
      background: linear-gradient(to bottom, rgba(15,20,25,0.65) 0%, rgba(15,20,25,0.0) 100%);
      pointer-events: none;
    }
    .bottom-tint {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 64vh;
      background: linear-gradient(to top, rgba(8,12,17,0.96) 0%, rgba(8,12,17,0.78) 38%, rgba(8,12,17,0.0) 100%);
      pointer-events: none;
    }
    .logo-wrap {
      position: absolute;
      top: 4.5vh;
      inset-inline-start: 5.5vw;
      display: flex;
      align-items: center;
      gap: 1.4vh;
    }
    .logo-wrap img {
      height: 6.8vh;
      width: auto;
      display: block;
      filter: drop-shadow(0 2px 12px rgba(0,0,0,0.55));
    }
    .logo-wrap .wordmark {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 4.2vh;
      letter-spacing: 0.02em;
      color: #ffffff;
      text-shadow: 0 2px 18px rgba(0,0,0,0.55);
    }
    .badge {
      position: absolute;
      top: 5.8vh;
      inset-inline-end: 5.5vw;
      background: rgba(0, 200, 83, 0.18);
      border: 1px solid rgba(0, 200, 83, 0.55);
      color: #69f0a8;
      padding: 1.1vh 2.2vh;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1.8vh;
      letter-spacing: 0.02em;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }
    .content {
      position: absolute;
      bottom: 6.5vh;
      inset-inline-start: 5.5vw;
      inset-inline-end: 5.5vw;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.8vh;
    }
    .brand-eyebrow {
      display: flex;
      align-items: center;
      gap: 1.2vh;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 2.2vh;
      letter-spacing: 0.32em;
      color: #00c853;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(0,200,83,0.5);
    }
    .brand-eyebrow .bar {
      width: 5vh;
      height: 0.4vh;
      background: #00c853;
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(0,200,83,0.7);
    }
    .headline {
      font-family: 'Tajawal', sans-serif;
      font-weight: 900;
      font-size: 8.4vh;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: #ffffff;
      text-shadow: 0 4px 22px rgba(0,0,0,0.6);
      max-width: 95%;
    }
    .subtitle {
      font-family: 'Tajawal', sans-serif;
      font-weight: 500;
      font-size: 2.6vh;
      line-height: 1.4;
      color: rgba(255,255,255,0.86);
      text-shadow: 0 2px 12px rgba(0,0,0,0.55);
    }
    .footer {
      margin-top: 0.4vh;
      display: flex;
      align-items: center;
      gap: 1.2vh;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 2.1vh;
      color: #ffffff;
      letter-spacing: 0.02em;
    }
    .footer .dot {
      width: 0.7vh;
      height: 0.7vh;
      background: #00c853;
      border-radius: 50%;
      box-shadow: 0 0 10px #00c853;
      display: inline-block;
    }
    /* Landscape ratios */
    @media (min-aspect-ratio: 16/9) {
      .headline { font-size: 11vh; }
      .subtitle { font-size: 3.2vh; }
      .content { bottom: 7vh; gap: 1.4vh; }
      .logo-wrap img { height: 9vh; }
      .logo-wrap .wordmark { font-size: 5.5vh; }
      .badge { top: 6.5vh; font-size: 2.4vh; padding: 1.4vh 2.8vh; }
      .brand-eyebrow { font-size: 2.6vh; }
    }
    /* Story / portrait ratios */
    @media (max-aspect-ratio: 9/16) {
      .headline { font-size: 7.4vh; }
      .content { bottom: 8vh; }
    }
  </style>
  </head>
  <body>
    <div class="ad">
      <img class="hero-img" src="/__mockup/images/ad-chess.png" alt="" />
      <div class="top-tint"></div>
      <div class="bottom-tint"></div>

      <div class="logo-wrap">
        <img src="/__mockup/images/vex-logo.png" alt="VEX" />
        <span class="wordmark">VEX</span>
      </div>

      <div class="badge">شطرنج</div>

      <div class="content">
        <div class="brand-eyebrow"><span class="bar"></span><span>VEX</span></div>
        <div class="headline">ضربة المعلم</div>
        <div class="subtitle">شطرنج بمستوى عالمي</div>
        <div class="footer"><span class="dot"></span> vixo.click</div>
      </div>
    </div>
  </body>
  </html>
