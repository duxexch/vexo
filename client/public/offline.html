<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEX - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a1d23 100%);
      color: #e4e6ea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      color: #fff;
    }
    p {
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #0f1419;
      border: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.9; }
    .logo {
      margin-bottom: 2rem;
    }
    .logo img {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="/icons/vex-gaming-logo-192x192.png" alt="VEX" /></div>
    <div class="icon">📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>You are currently offline. Please check your internet connection and try again.</p>
    <p>تحقق من اتصالك بالإنترنت وحاول مرة أخرى.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      إعادة المحاولة / Retry
    </button>
  </div>
</body>
</html>
