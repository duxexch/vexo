<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b14">
<title>VEX Color Match</title>
<link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>
  .word-card {
    width: 100%;
    aspect-ratio: 1.4;
    border-radius: 18px;
    background: linear-gradient(135deg, #0c1424, #060a14);
    border: 1px solid var(--vex-border);
    display: grid;
    place-items: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .word-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15), transparent 65%);
    pointer-events: none;
  }
  .word {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.05em;
    font-size: clamp(3.5rem, 16vw, 5.5rem);
    text-transform: uppercase;
    line-height: 1;
    text-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
    transition: transform 0.18s ease;
  }
  .word.bump { transform: scale(1.08); }
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
  }
  .ans-btn {
    padding: 18px 12px;
    border-radius: 14px;
    border: 1px solid var(--vex-border);
    background: var(--vex-surface);
    color: var(--vex-text);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.06em;
    font-size: 1.6rem;
    cursor: pointer;
    transition: all 0.15s ease;
    text-transform: uppercase;
  }
  .ans-btn:hover { background: var(--vex-surface-hover); }
  .ans-btn:active { transform: scale(0.97); }
  .ans-btn.correct { background: linear-gradient(135deg, #22c55e, #14532d); color: white; border-color: transparent; box-shadow: 0 0 24px -4px #22c55e; }
  .ans-btn.wrong { background: linear-gradient(135deg, #ef4444, #7f1d1d); color: white; border-color: transparent; box-shadow: 0 0 24px -4px #ef4444; }
</style>
</head>
<body class="vex-game">
<div class="vex-shell">
  <div class="vex-header">
    <div class="vex-title">
      <div class="vex-title-badge" style="background:linear-gradient(135deg,#a855f7,#5b21b6);box-shadow:0 0 30px -5px #a855f7;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M12 2L2 12"/><path d="M12 22L22 12"/></svg>
      </div>
      <span id="title">تطابق الألوان</span>
    </div>
    <button class="vex-btn" id="resetBtn"><span id="resetBtnLabel">إعادة</span></button>
  </div>

  <div class="vex-stats">
    <div class="vex-stat"><div class="vex-stat-label" id="lblScore">النقاط</div><div class="vex-stat-value" id="score">0</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblStreak">المتتالية</div><div class="vex-stat-value blue" id="streak">0</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblTime">الوقت</div><div class="vex-stat-value emerald" id="time">30.0</div></div>
  </div>

  <div class="vex-progress"><div class="vex-progress-fill gold" id="progress" style="width:100%;"></div></div>

  <div class="vex-board" style="padding:12px;">
    <div class="word-card"><div class="word" id="word">START</div></div>
    <div class="answers">
      <button class="ans-btn" id="btnYes">تطابق</button>
      <button class="ans-btn" id="btnNo">لا تطابق</button>
    </div>
  </div>

  <div class="vex-hint" id="hint">هل لون الكلمة يطابق معناها؟ كن سريعاً!</div>
</div>

<div class="vex-overlay show" id="startOverlay">
  <div class="vex-overlay-card">
    <div class="vex-overlay-icon" style="background:linear-gradient(135deg,#a855f7,#5b21b6);box-shadow:0 0 30px -5px #a855f7;">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
    </div>
    <div class="vex-overlay-title" id="startTitle">تطابق الألوان</div>
    <div class="vex-overlay-subtitle" id="startSubtitle">انظر إلى الكلمة. هل لونها يطابق معناها؟ قرر بسرعة! لديك 30 ثانية.</div>
    <button class="vex-btn vex-btn-primary" id="startBtn" style="width:100%;background:linear-gradient(135deg,#a855f7,#5b21b6);box-shadow:0 0 30px -5px #a855f7;">ابدأ اللعب</button>
  </div>
</div>

<div class="vex-overlay" id="endOverlay">
  <div class="vex-overlay-card">
    <div class="vex-overlay-icon gold">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
    </div>
    <div class="vex-overlay-title" id="endTitle">انتهى الوقت!</div>
    <div class="vex-overlay-subtitle" id="endSubtitle">إليك نتيجتك:</div>
    <div class="vex-overlay-stats">
      <div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFinalScore">النقاط</div><div class="vex-overlay-stat-value" id="finalScore">0</div></div>
      <div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFinalStreak">أعلى متتالية</div><div class="vex-overlay-stat-value" id="finalStreak">0</div></div>
    </div>
    <div class="vex-btn-row">
      <button class="vex-btn vex-btn-primary" id="endRestart" style="flex:1;background:linear-gradient(135deg,#a855f7,#5b21b6);">حاول مجدداً</button>
    </div>
  </div>
</div>

<script src="/games/vex-sdk.js"></script>
<script src="/games/_shared/vex-game.js"></script>
<script>
(function(){
  'use strict';
  const STRINGS = {
    ar: { title:'تطابق الألوان', score:'النقاط', streak:'المتتالية', time:'الوقت', reset:'إعادة',
      yes:'تطابق', no:'لا تطابق', start:'ابدأ اللعب', restart:'حاول مجدداً',
      sub:'انظر إلى الكلمة. هل لونها يطابق معناها؟ قرر بسرعة! لديك 30 ثانية.',
      end:'انتهى الوقت!', endSub:'إليك نتيجتك:', finalStreak:'أعلى متتالية',
      hint:'هل لون الكلمة يطابق معناها؟ كن سريعاً!',
      colors: { red:'أحمر', blue:'أزرق', green:'أخضر', gold:'ذهبي', purple:'بنفسجي', cyan:'سماوي' } },
    en: { title:'Color Match', score:'Score', streak:'Streak', time:'Time', reset:'Reset',
      yes:'MATCH', no:"NO MATCH", start:'Start', restart:'Try again',
      sub:'Look at the word. Does its color match its meaning? Decide fast! You have 30s.',
      end:"Time's up!", endSub:'Your result:', finalStreak:'Best streak',
      hint:'Does the word color match its meaning? Be fast!',
      colors: { red:'RED', blue:'BLUE', green:'GREEN', gold:'GOLD', purple:'PURPLE', cyan:'CYAN' } },
  };
  let lang = 'ar';

  const COLORS = [
    { key:'red',    css:'#ef4444' },
    { key:'blue',   css:'#1e88ff' },
    { key:'green',  css:'#22c55e' },
    { key:'gold',   css:'#ffb627' },
    { key:'purple', css:'#a855f7' },
    { key:'cyan',   css:'#22d3ee' },
  ];
  const DURATION = 30000;

  const wordEl = document.getElementById('word');
  const btnYes = document.getElementById('btnYes'), btnNo = document.getElementById('btnNo');
  const titleEl = document.getElementById('title'), scoreEl = document.getElementById('score'),
        streakEl = document.getElementById('streak'), timeEl = document.getElementById('time');
  const progress = document.getElementById('progress');
  const startOverlay = document.getElementById('startOverlay'), startBtn = document.getElementById('startBtn');
  const endOverlay = document.getElementById('endOverlay'), endRestart = document.getElementById('endRestart');
  const finalScore = document.getElementById('finalScore'), finalStreak = document.getElementById('finalStreak');
  const lblScore=document.getElementById('lblScore'), lblStreak=document.getElementById('lblStreak'),
        lblTime=document.getElementById('lblTime'), lblFinalScore=document.getElementById('lblFinalScore'),
        lblFinalStreak=document.getElementById('lblFinalStreak'), startTitle=document.getElementById('startTitle'),
        startSubtitle=document.getElementById('startSubtitle'), endTitle=document.getElementById('endTitle'),
        endSubtitle=document.getElementById('endSubtitle'), hint=document.getElementById('hint'),
        resetBtn=document.getElementById('resetBtn'), resetBtnLabel=document.getElementById('resetBtnLabel');

  let phase = 'idle', score = 0, streak = 0, bestStreak = 0, current = null;
  let startTs = 0, raf = null;

  function applyLang() {
    const s = STRINGS[lang];
    document.documentElement.lang = lang; document.documentElement.dir = lang==='ar'?'rtl':'ltr';
    titleEl.textContent = s.title; lblScore.textContent = s.score; lblStreak.textContent = s.streak; lblTime.textContent = s.time;
    btnYes.textContent = s.yes; btnNo.textContent = s.no; resetBtnLabel.textContent = s.reset; hint.textContent = s.hint;
    startTitle.textContent = s.title; startSubtitle.textContent = s.sub; startBtn.textContent = s.start;
    endTitle.textContent = s.end; endSubtitle.textContent = s.endSub; endRestart.textContent = s.restart;
    lblFinalScore.textContent = s.score; lblFinalStreak.textContent = s.finalStreak;
    if (current) drawWord();
  }

  function drawWord() {
    const s = STRINGS[lang];
    wordEl.textContent = s.colors[current.wordKey];
    wordEl.style.color = current.color.css;
    wordEl.classList.remove('bump'); void wordEl.offsetWidth; wordEl.classList.add('bump');
  }

  function next() {
    const matches = Math.random() < 0.5;
    const wordIdx = Math.floor(Math.random() * COLORS.length);
    let colorIdx = wordIdx;
    if (!matches) {
      colorIdx = Math.floor(Math.random() * (COLORS.length - 1));
      if (colorIdx >= wordIdx) colorIdx++;
    }
    current = { wordKey: COLORS[wordIdx].key, color: COLORS[colorIdx], matches: matches };
    drawWord();
  }

  function start() {
    phase = 'playing';
    score = 0; streak = 0; bestStreak = 0;
    scoreEl.textContent = 0; streakEl.textContent = 0;
    startTs = performance.now();
    next();
    tick();
  }

  function tick() {
    const elapsed = performance.now() - startTs;
    const remain = Math.max(0, DURATION - elapsed);
    timeEl.textContent = (remain/1000).toFixed(1);
    progress.style.width = (remain/DURATION*100) + '%';
    if (remain <= 0) { finish(); return; }
    raf = requestAnimationFrame(tick);
  }

  function answer(yes) {
    if (phase !== 'playing' || !current) return;
    const correct = (yes === current.matches);
    if (correct) {
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      const bonus = 10 + Math.min(20, Math.floor(streak / 3) * 5);
      score += bonus;
      scoreEl.textContent = score;
      streakEl.textContent = streak;
      const btn = yes ? btnYes : btnNo;
      btn.classList.add('correct');
      setTimeout(() => btn.classList.remove('correct'), 240);
      if (typeof VexGame !== 'undefined') {
        const r = wordEl.getBoundingClientRect();
        VexGame.popScore(document.body, bonus, r.left + r.width/2 + 'px', r.top + 'px');
      }
      next();
    } else {
      streak = 0;
      streakEl.textContent = 0;
      score = Math.max(0, score - 15);
      scoreEl.textContent = score;
      const btn = yes ? btnYes : btnNo;
      btn.classList.add('wrong');
      setTimeout(() => btn.classList.remove('wrong'), 320);
      next();
    }
  }

  function finish() {
    phase = 'finished';
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    finalScore.textContent = score;
    finalStreak.textContent = bestStreak;
    endOverlay.classList.add('show');
    if (typeof VexGame !== 'undefined') {
      VexGame.setBest(score);
      if (bestStreak >= 12) VexGame.confetti(1800);
      VexGame.endSession({
        score: score, result: 'win',
        metadata: { bestStreak: bestStreak, durationMs: DURATION },
      });
    }
  }

  function reset() {
    phase = 'idle';
    score = 0; streak = 0; bestStreak = 0;
    scoreEl.textContent = 0; streakEl.textContent = 0;
    timeEl.textContent = (DURATION/1000).toFixed(1); progress.style.width = '100%';
    endOverlay.classList.remove('show');
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    startOverlay.classList.add('show');
  }

  btnYes.addEventListener('click', () => answer(true));
  btnNo.addEventListener('click', () => answer(false));
  resetBtn.addEventListener('click', reset);
  endRestart.addEventListener('click', () => { endOverlay.classList.remove('show'); start(); });
  startBtn.addEventListener('click', () => { startOverlay.classList.remove('show'); start(); });
  document.addEventListener('keydown', (e) => {
    if (phase !== 'playing') return;
    if (e.key === 'ArrowLeft' || e.key === 'a') answer(true);
    if (e.key === 'ArrowRight' || e.key === 'd') answer(false);
  });

  if (typeof VexGame !== 'undefined') {
    VexGame.boot({
      slug: 'color-match',
      onReady: function (player) {
        if (player && player.language) { lang = player.language === 'en' ? 'en' : 'ar'; VexGame.setLang(lang); }
        applyLang();
      },
    });
  }
  applyLang();
})();
</script>
</body>
</html>
