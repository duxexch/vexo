<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b14">
<title>VEX 2048</title>
<link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>
  .board-2048 {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    padding: 8px;
    aspect-ratio: 1;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    position: relative;
    touch-action: none;
  }
  .grid-2048 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    height: 100%;
  }
  .cell-2048 {
    background: rgba(255, 255, 255, 0.04);
    border-radius: 8px;
  }
  .tiles-2048 {
    position: absolute;
    inset: 8px;
    pointer-events: none;
  }
  .tile-2048 {
    position: absolute;
    width: calc((100% - 24px) / 4);
    height: calc((100% - 24px) / 4);
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.04em;
    font-weight: 700;
    transition: transform 0.13s ease-out, opacity 0.13s ease-out;
    will-change: transform;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .tile-2048.new { animation: tileSpawn 0.18s ease-out; }
  .tile-2048.merged { animation: tileMerge 0.22s ease-out; z-index: 2; }
  @keyframes tileSpawn { 0%{transform:scale(0)}100%{transform:scale(1)} }
  @keyframes tileMerge {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  /* Number tile colors — Stadium gradient ramp */
  .v-2     { background: linear-gradient(135deg,#1e293b,#0f172a); color:#e2e8f0; font-size:1.6rem; }
  .v-4     { background: linear-gradient(135deg,#334155,#1e293b); color:#e2e8f0; font-size:1.6rem; }
  .v-8     { background: linear-gradient(135deg,#1e88ff,#0a4d9c); color:#fff; font-size:1.6rem; }
  .v-16    { background: linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff; font-size:1.6rem; }
  .v-32    { background: linear-gradient(135deg,#7c3aed,#5b21b6); color:#fff; font-size:1.5rem; }
  .v-64    { background: linear-gradient(135deg,#a855f7,#7c3aed); color:#fff; font-size:1.5rem; }
  .v-128   { background: linear-gradient(135deg,#ec4899,#be185d); color:#fff; font-size:1.3rem; }
  .v-256   { background: linear-gradient(135deg,#f97316,#c2410c); color:#fff; font-size:1.3rem; }
  .v-512   { background: linear-gradient(135deg,#ef4444,#991b1b); color:#fff; font-size:1.2rem; }
  .v-1024  { background: linear-gradient(135deg,#ffb627,#a86b00); color:#000; font-size:1.05rem; box-shadow:0 0 24px -2px #ffb627; }
  .v-2048  { background: linear-gradient(135deg,#fde047,#ca8a04); color:#000; font-size:1.05rem; box-shadow:0 0 30px -1px #ffd700; }
  .v-4096  { background: linear-gradient(135deg,#22c55e,#14532d); color:#fff; font-size:1rem; box-shadow:0 0 30px #22c55e; }
  .v-big   { background: linear-gradient(135deg,#22d3ee,#0891b2); color:#fff; font-size:0.85rem; }

  @media (max-width: 380px) {
    .v-2,.v-4,.v-8,.v-16 { font-size: 1.3rem; }
    .v-32,.v-64 { font-size: 1.2rem; }
    .v-128,.v-256 { font-size: 1.05rem; }
    .v-512,.v-1024,.v-2048 { font-size: 0.95rem; }
  }
</style>
</head>
<body class="vex-game">
<div class="vex-shell">
  <div class="vex-header">
    <div class="vex-title">
      <div class="vex-title-badge gold">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <span>2048</span>
    </div>
    <button class="vex-btn" id="newBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> <span id="newBtnLabel">جديدة</span></button>
  </div>

  <div class="vex-stats">
    <div class="vex-stat"><div class="vex-stat-label" id="lblScore">النقاط</div><div class="vex-stat-value" id="score">0</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblBest">الأفضل</div><div class="vex-stat-value blue" id="best">0</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblMoves">الحركات</div><div class="vex-stat-value emerald" id="moves">0</div></div>
  </div>

  <div class="vex-board" style="padding:6px;">
    <div class="board-2048" id="board">
      <div class="grid-2048" id="cells"></div>
      <div class="tiles-2048" id="tiles"></div>
    </div>
  </div>

  <div class="vex-hint" id="hint">اسحب أو استخدم الأسهم لدمج الأرقام. الهدف: 2048</div>
</div>

<!-- Start overlay -->
<div class="vex-overlay show" id="startOverlay">
  <div class="vex-overlay-card">
    <div class="vex-overlay-icon gold">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    <div class="vex-overlay-title" id="startTitle">2048</div>
    <div class="vex-overlay-subtitle" id="startSubtitle">ادمج الأرقام المتشابهة. اوصل إلى 2048 لتنتصر!</div>
    <button class="vex-btn vex-btn-gold" id="startBtn" style="width:100%;">ابدأ اللعب</button>
  </div>
</div>

<!-- End overlay -->
<div class="vex-overlay" id="endOverlay">
  <div class="vex-overlay-card">
    <div class="vex-overlay-icon" id="endIcon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    <div class="vex-overlay-title" id="endTitle">انتهت اللعبة!</div>
    <div class="vex-overlay-subtitle" id="endSubtitle">شكراً للعب</div>
    <div class="vex-overlay-stats">
      <div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFinalScore">النقاط</div><div class="vex-overlay-stat-value" id="finalScore">0</div></div>
      <div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFinalBest">الأفضل</div><div class="vex-overlay-stat-value" id="finalBest">0</div></div>
    </div>
    <div class="vex-btn-row">
      <button class="vex-btn vex-btn-gold" id="endRestart" style="flex:1;">العب مجدداً</button>
    </div>
  </div>
</div>

<script src="/games/vex-sdk.js"></script>
<script src="/games/_shared/vex-game.js"></script>
<script>
(function () {
  'use strict';

  const SIZE = 4;
  const board = document.getElementById('board');
  const cellsEl = document.getElementById('cells');
  const tilesEl = document.getElementById('tiles');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const movesEl = document.getElementById('moves');
  const startOverlay = document.getElementById('startOverlay');
  const endOverlay = document.getElementById('endOverlay');
  const finalScore = document.getElementById('finalScore');
  const finalBest = document.getElementById('finalBest');
  const endTitle = document.getElementById('endTitle');
  const endSubtitle = document.getElementById('endSubtitle');
  const endIcon = document.getElementById('endIcon');
  const newBtn = document.getElementById('newBtn');
  const startBtn = document.getElementById('startBtn');
  const endRestart = document.getElementById('endRestart');
  const hint = document.getElementById('hint');
  const newBtnLabel = document.getElementById('newBtnLabel');
  const lblScore = document.getElementById('lblScore');
  const lblBest = document.getElementById('lblBest');
  const lblMoves = document.getElementById('lblMoves');
  const lblFinalScore = document.getElementById('lblFinalScore');
  const lblFinalBest = document.getElementById('lblFinalBest');
  const startTitle = document.getElementById('startTitle');
  const startSubtitle = document.getElementById('startSubtitle');

  // i18n
  const STRINGS = {
    ar: { score:'النقاط', best:'الأفضل', moves:'الحركات', new:'جديدة', start:'ابدأ اللعب', restart:'العب مجدداً',
      hint:'اسحب أو استخدم الأسهم لدمج الأرقام. الهدف: 2048',
      title:'2048', sub:'ادمج الأرقام المتشابهة. اوصل إلى 2048 لتنتصر!',
      win:'مبروك! وصلت إلى 2048!', lose:'انتهت اللعبة!', winSub:'لقد فزت بأسطورة الألغاز!', loseSub:'لا توجد حركات متاحة. حاول مجدداً!' },
    en: { score:'Score', best:'Best', moves:'Moves', new:'New', start:'Start', restart:'Play again',
      hint:'Swipe or use arrows to merge tiles. Target: 2048',
      title:'2048', sub:'Merge equal tiles. Reach 2048 to win!',
      win:'Congrats! You hit 2048!', lose:'Game Over', winSub:'You crushed the legend!', loseSub:'No moves left. Try again!' },
  };
  let lang = 'ar';
  function applyLang() {
    const s = STRINGS[lang];
    document.documentElement.lang = lang; document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    lblScore.textContent = s.score; lblBest.textContent = s.best; lblMoves.textContent = s.moves;
    newBtnLabel.textContent = s.new; startBtn.textContent = s.start; endRestart.textContent = s.restart;
    hint.textContent = s.hint; startTitle.textContent = s.title; startSubtitle.textContent = s.sub;
    lblFinalScore.textContent = s.score; lblFinalBest.textContent = s.best;
  }

  // State
  let grid;
  let score = 0;
  let best = 0;
  let moves = 0;
  let nextId = 1;
  let busy = false;
  let won = false;

  // Build static cells once
  for (let i = 0; i < SIZE * SIZE; i++) {
    const c = document.createElement('div');
    c.className = 'cell-2048';
    cellsEl.appendChild(c);
  }

  function emptyGrid() {
    return Array.from({ length: SIZE }, () => Array.from({ length: SIZE }, () => null));
  }

  function reset() {
    grid = emptyGrid();
    score = 0; moves = 0; nextId = 1; won = false;
    spawn(); spawn();
    render(true);
  }

  function spawn() {
    const empties = [];
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (!grid[r][c]) empties.push([r, c]);
    if (!empties.length) return null;
    const [r, c] = empties[Math.floor(Math.random() * empties.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    const tile = { id: nextId++, value, r, c, isNew: true, merged: false };
    grid[r][c] = tile;
    return tile;
  }

  function classFor(v) {
    if (v <= 2048) return 'v-' + v;
    if (v === 4096) return 'v-4096';
    return 'v-big';
  }

  function render(initial) {
    tilesEl.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const t = grid[r][c];
        if (!t) continue;
        const el = document.createElement('div');
        el.className = 'tile-2048 ' + classFor(t.value);
        if (t.isNew) el.classList.add('new');
        if (t.merged) el.classList.add('merged');
        const cellSize = 'calc((100% - 24px) / 4 + 8px)';
        el.style.transform = `translate(calc(${c} * ${cellSize}), calc(${r} * ${cellSize}))`;
        el.textContent = t.value;
        tilesEl.appendChild(el);
        t.isNew = false; t.merged = false;
      }
    }
    scoreEl.textContent = score;
    bestEl.textContent = best;
    movesEl.textContent = moves;
  }

  function move(dir) {
    if (busy) return false;
    // dir: 'up' 'down' 'left' 'right'
    const before = JSON.stringify(snapshotValues());
    const lines = [];
    for (let i = 0; i < SIZE; i++) lines.push(getLine(dir, i));
    let gained = 0;
    let moved = false;
    lines.forEach((line, i) => {
      const result = collapse(line);
      gained += result.gained;
      if (result.moved) moved = true;
      setLine(dir, i, result.line);
    });
    if (!moved) return false;
    score += gained;
    moves++;
    busy = true;
    render(false);
    setTimeout(() => {
      spawn();
      render(false);
      busy = false;
      // Check win
      if (!won && hasReached(2048)) {
        won = true;
        if (typeof VexGame !== 'undefined') VexGame.toast(STRINGS[lang].win, 'success');
      }
      // Check loss
      if (!hasMoves()) endGame(false);
    }, 130);
    if (gained > 0 && typeof VexGame !== 'undefined') {
      const rect = board.getBoundingClientRect();
      VexGame.popScore(document.body, gained, rect.left + rect.width / 2 + 'px', rect.top + 30 + 'px');
    }
    return true;
  }

  function snapshotValues() {
    return grid.map(row => row.map(t => t ? t.value : 0));
  }

  function getLine(dir, i) {
    const line = [];
    for (let j = 0; j < SIZE; j++) {
      let r, c;
      if (dir === 'left')  { r = i; c = j; }
      if (dir === 'right') { r = i; c = SIZE - 1 - j; }
      if (dir === 'up')    { r = j; c = i; }
      if (dir === 'down')  { r = SIZE - 1 - j; c = i; }
      line.push(grid[r][c]);
    }
    return line;
  }
  function setLine(dir, i, line) {
    for (let j = 0; j < SIZE; j++) {
      let r, c;
      if (dir === 'left')  { r = i; c = j; }
      if (dir === 'right') { r = i; c = SIZE - 1 - j; }
      if (dir === 'up')    { r = j; c = i; }
      if (dir === 'down')  { r = SIZE - 1 - j; c = i; }
      grid[r][c] = line[j];
      if (line[j]) { line[j].r = r; line[j].c = c; }
    }
  }

  function collapse(line) {
    const filled = line.filter(Boolean);
    const out = [];
    let gained = 0;
    let i = 0;
    while (i < filled.length) {
      const cur = filled[i];
      if (i + 1 < filled.length && filled[i + 1].value === cur.value) {
        const merged = { id: nextId++, value: cur.value * 2, r: cur.r, c: cur.c, isNew: false, merged: true };
        out.push(merged);
        gained += merged.value;
        i += 2;
      } else {
        out.push(cur);
        i++;
      }
    }
    while (out.length < SIZE) out.push(null);
    // Detect movement
    let moved = false;
    for (let k = 0; k < SIZE; k++) {
      if ((line[k] && !out[k]) || (!line[k] && out[k]) || (line[k] && out[k] && line[k].id !== out[k].id && !out[k].merged)) {
        moved = true; break;
      }
      if (line[k] && out[k] && line[k].id !== out[k].id) { moved = true; break; }
    }
    return { line: out, gained, moved };
  }

  function hasReached(v) {
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (grid[r][c] && grid[r][c].value >= v) return true;
    return false;
  }

  function hasMoves() {
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c]) return true;
      const v = grid[r][c].value;
      if (c + 1 < SIZE && grid[r][c + 1] && grid[r][c + 1].value === v) return true;
      if (r + 1 < SIZE && grid[r + 1][c] && grid[r + 1][c].value === v) return true;
    }
    return false;
  }

  function maxValue() {
    let m = 0;
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (grid[r][c] && grid[r][c].value > m) m = grid[r][c].value;
    return m;
  }

  function endGame(isWin) {
    const s = STRINGS[lang];
    endTitle.textContent = isWin ? s.win : s.lose;
    endSubtitle.textContent = isWin ? s.winSub : s.loseSub;
    endIcon.className = 'vex-overlay-icon ' + (isWin ? 'gold' : 'rose');
    finalScore.textContent = score;
    if (typeof VexGame !== 'undefined') {
      VexGame.setBest(score);
      best = VexGame.getBest();
    }
    finalBest.textContent = best;
    endOverlay.classList.add('show');
    if (typeof VexGame !== 'undefined') {
      if (isWin) VexGame.confetti(2200);
      VexGame.endSession({
        score: score,
        result: isWin ? 'win' : 'loss',
        metadata: { moves: moves, maxTile: maxValue() },
      });
    }
  }

  // Input
  function attachInput() {
    let startX = 0, startY = 0, swiping = false;
    board.addEventListener('touchstart', (e) => {
      const t = e.changedTouches[0];
      startX = t.clientX; startY = t.clientY; swiping = true;
    }, { passive: true });
    board.addEventListener('touchend', (e) => {
      if (!swiping) return;
      swiping = false;
      const t = e.changedTouches[0];
      handleSwipe(t.clientX - startX, t.clientY - startY);
    }, { passive: true });
    let mDown = false, mx = 0, my = 0;
    board.addEventListener('mousedown', (e) => { mDown = true; mx = e.clientX; my = e.clientY; });
    window.addEventListener('mouseup', (e) => {
      if (!mDown) return; mDown = false;
      handleSwipe(e.clientX - mx, e.clientY - my);
    });
    window.addEventListener('keydown', (e) => {
      if (endOverlay.classList.contains('show') || startOverlay.classList.contains('show')) return;
      let dir = null;
      if (e.key === 'ArrowLeft') dir = 'left';
      else if (e.key === 'ArrowRight') dir = 'right';
      else if (e.key === 'ArrowUp') dir = 'up';
      else if (e.key === 'ArrowDown') dir = 'down';
      if (dir) { e.preventDefault(); move(dir); }
    });
  }

  function handleSwipe(dx, dy) {
    const min = 24;
    if (Math.abs(dx) < min && Math.abs(dy) < min) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
  }

  function newGame() {
    endOverlay.classList.remove('show');
    reset();
  }

  newBtn.addEventListener('click', newGame);
  startBtn.addEventListener('click', () => { startOverlay.classList.remove('show'); reset(); });
  endRestart.addEventListener('click', newGame);

  // Boot
  attachInput();
  if (typeof VexGame !== 'undefined') {
    VexGame.boot({
      slug: '2048',
      onReady: function (player) {
        if (player && player.language) { lang = player.language === 'en' ? 'en' : 'ar'; VexGame.setLang(lang); applyLang(); }
        best = VexGame.getBest();
        bestEl.textContent = best;
      },
    });
  } else {
    best = parseInt(localStorage.getItem('vex:best:2048') || '0', 10);
    bestEl.textContent = best;
  }
  applyLang();
})();
</script>
</body>
</html>
