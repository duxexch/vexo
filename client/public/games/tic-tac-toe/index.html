<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b14">
<title>VEX Tic Tac Toe</title>
<link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>
  .ttt-board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 320px;
    aspect-ratio: 1;
    margin: 0 auto;
    padding: 8px;
  }
  .ttt-cell {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .ttt-cell:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,182,39,0.35); }
  .ttt-cell.disabled { cursor: not-allowed; }
  .ttt-mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    line-height: 1;
    animation: ttt-pop 0.25s ease-out;
  }
  @keyframes ttt-pop { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .ttt-mark.x { color: #ffb627; text-shadow: 0 0 16px rgba(255,182,39,0.55); }
  .ttt-mark.o { color: #1e88ff; text-shadow: 0 0 16px rgba(30,136,255,0.55); }
  .ttt-cell.win { background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.5); animation: ttt-flash 0.6s ease-in-out infinite alternate; }
  @keyframes ttt-flash { from{box-shadow:0 0 0 rgba(34,197,94,0)} to{box-shadow:0 0 24px rgba(34,197,94,0.55)} }
  .turn-indicator {
    display:flex; gap:8px; justify-content:center; margin-bottom:10px;
  }
  .turn-pill {
    padding: 6px 14px; border-radius: 99px; font-size:0.85rem; font-weight:600;
    background: var(--vex-surface); border: 1px solid var(--vex-border);
    transition: all 0.25s ease; opacity:0.55;
  }
  .turn-pill.active { opacity:1; transform:scale(1.05); }
  .turn-pill.x.active { background: linear-gradient(135deg,#ffb627,#a86b00); color:#000; border-color:transparent; box-shadow: 0 0 18px -3px #ffb627; }
  .turn-pill.o.active { background: linear-gradient(135deg,#1e88ff,#0a4d9c); color:#fff; border-color:transparent; box-shadow: 0 0 18px -3px #1e88ff; }
  .mode-tabs { display:flex; gap:6px; justify-content:center; margin-bottom:10px; }
  .mode-tab {
    padding:8px 16px; border-radius:99px; font-size:0.78rem; font-weight:600;
    background: var(--vex-surface); border:1px solid var(--vex-border); color:var(--vex-text-dim);
    cursor:pointer; transition: all 0.18s ease;
  }
  .mode-tab.active { background: linear-gradient(135deg,#ffb627,#a86b00); color:#000; border-color:transparent; }
</style>
</head>
<body class="vex-game">
<div class="vex-shell">
  <div class="vex-header">
    <div class="vex-title">
      <div class="vex-title-badge gold">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      </div>
      <span id="title">إكس أو</span>
    </div>
    <button class="vex-btn" id="resetBtn"><span id="resetBtnLabel">إعادة</span></button>
  </div>

  <div class="vex-stats">
    <div class="vex-stat"><div class="vex-stat-label" id="lblP1">اللاعب X</div><div class="vex-stat-value" id="scoreX">0</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblDraw">تعادل</div><div class="vex-stat-value" id="scoreDraw" style="color:var(--vex-text-dim)">0</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblP2">اللاعب O</div><div class="vex-stat-value blue" id="scoreO">0</div></div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="ai" id="modeAi"><span id="modeAiLabel">ضد الذكاء</span></button>
    <button class="mode-tab" data-mode="2p" id="mode2p"><span id="mode2pLabel">لاعبان</span></button>
  </div>

  <div class="turn-indicator">
    <div class="turn-pill x active" id="turnX"><span id="turnXLbl">X</span></div>
    <div class="turn-pill o" id="turnO"><span id="turnOLbl">O</span></div>
  </div>

  <div class="vex-board" style="padding:10px;">
    <div class="ttt-board" id="board"></div>
  </div>

  <div class="vex-hint" id="hint">انقر مربعاً لوضع علامتك. الفائز يحصل على نقطة.</div>
</div>

<div class="vex-overlay" id="endOverlay">
  <div class="vex-overlay-card">
    <div class="vex-overlay-icon gold" id="endIcon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.2H22l-6 4.4 2.4 7.2L12 16.4l-6.4 4.4 2.4-7.2L2 9.2h7.6z"/></svg>
    </div>
    <div class="vex-overlay-title" id="endTitle">جولة جديدة!</div>
    <div class="vex-overlay-subtitle" id="endSubtitle">من سيفوز هذه المرة؟</div>
    <div class="vex-btn-row">
      <button class="vex-btn vex-btn-gold" id="endRestart" style="flex:1">جولة جديدة</button>
    </div>
  </div>
</div>

<script src="/games/vex-sdk.js"></script>
<script src="/games/_shared/vex-game.js"></script>
<script>
(function(){
  'use strict';
  const STRINGS = {
    ar: { title:'إكس أو', p1:'اللاعب X', p2:'اللاعب O', draw:'تعادل', reset:'إعادة',
      modeAi:'ضد الذكاء', mode2p:'لاعبان', x:'X', o:'O',
      newRound:'جولة جديدة', play:'العب', winX:'X يفوز!', winO:'O يفوز!',
      tie:'تعادل!', winAI:'الذكاء يفوز!', winYou:'فوز!',
      yourTurn:'دورك', aiTurn:'الذكاء يفكر…',
      hint:'انقر مربعاً لوضع علامتك. الفائز يحصل على نقطة.',
    },
    en: { title:'Tic Tac Toe', p1:'Player X', p2:'Player O', draw:'Draws', reset:'Reset',
      modeAi:'vs AI', mode2p:'2 Players', x:'X', o:'O',
      newRound:'New Round', play:'Play', winX:'X wins!', winO:'O wins!',
      tie:"It's a tie!", winAI:'AI wins!', winYou:'You win!',
      yourTurn:'Your turn', aiTurn:'AI thinking…',
      hint:'Tap a square to place your mark. Winner gets a point.',
    },
  };
  let lang = 'ar';
  let mode = 'ai';
  let board, turn, gameOver, scoreX=0, scoreO=0, scoreDraw=0, busy=false, aiTimer=null;

  const $ = (id) => document.getElementById(id);
  const boardEl = $('board'), endOverlay = $('endOverlay'), endTitle = $('endTitle'),
        endSubtitle = $('endSubtitle'), endRestart = $('endRestart');

  function applyLang(){
    const s = STRINGS[lang];
    document.documentElement.lang = lang; document.documentElement.dir = lang==='ar'?'rtl':'ltr';
    $('title').textContent = s.title; $('lblP1').textContent = s.p1; $('lblP2').textContent = s.p2;
    $('lblDraw').textContent = s.draw; $('resetBtnLabel').textContent = s.reset;
    $('modeAiLabel').textContent = s.modeAi; $('mode2pLabel').textContent = s.mode2p;
    $('turnXLbl').textContent = s.x; $('turnOLbl').textContent = s.o;
    $('hint').textContent = s.hint;
    $('endRestart').textContent = s.newRound;
  }

  function reset(){
    if (aiTimer){ clearTimeout(aiTimer); aiTimer = null; }
    board = Array(9).fill(null);
    turn = 'X'; gameOver = false; busy = false;
    render();
    updateTurn();
    endOverlay.classList.remove('show');
  }

  function render(){
    boardEl.innerHTML = '';
    for (let i=0; i<9; i++){
      const c = document.createElement('div');
      c.className = 'ttt-cell' + (gameOver || board[i] ? ' disabled' : '');
      c.dataset.idx = i;
      if (board[i]){
        const m = document.createElement('div');
        m.className = 'ttt-mark ' + board[i].toLowerCase();
        m.textContent = board[i];
        c.appendChild(m);
      }
      c.addEventListener('click', onCellClick);
      boardEl.appendChild(c);
    }
  }

  function onCellClick(e){
    if (busy || gameOver) return;
    const idx = +e.currentTarget.dataset.idx;
    if (board[idx] !== null) return;
    if (mode === 'ai' && turn === 'O') return;
    place(idx, turn);
  }

  function place(idx, player){
    board[idx] = player;
    render();
    const winLine = checkWin(board, player);
    if (winLine){ return endRound(player, winLine); }
    if (board.every(v => v !== null)){ return endRound('tie', null); }
    turn = (turn === 'X') ? 'O' : 'X';
    updateTurn();
    if (mode === 'ai' && turn === 'O' && !gameOver){
      busy = true;
      if (aiTimer) clearTimeout(aiTimer);
      aiTimer = setTimeout(() => {
        aiTimer = null;
        if (gameOver || turn !== 'O') { busy = false; return; }
        const move = pickAI(board);
        place(move, 'O');
        busy = false;
      }, 320 + Math.random()*240);
    }
  }

  function checkWin(b, p){
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (const ln of lines){
      if (b[ln[0]]===p && b[ln[1]]===p && b[ln[2]]===p) return ln;
    }
    return null;
  }

  // Minimax AI for O. With small board we can solve fully.
  function pickAI(b){
    // 1. Win if possible.
    for (let i=0; i<9; i++){
      if (b[i]===null){ b[i]='O'; if (checkWin(b,'O')){ b[i]=null; return i; } b[i]=null; }
    }
    // 2. Block opponent.
    for (let i=0; i<9; i++){
      if (b[i]===null){ b[i]='X'; if (checkWin(b,'X')){ b[i]=null; return i; } b[i]=null; }
    }
    // 3. Use minimax for optimal move.
    let bestScore = -Infinity, bestMove = -1;
    for (let i=0; i<9; i++){
      if (b[i]===null){
        b[i] = 'O';
        const sc = minimax(b, false);
        b[i] = null;
        if (sc > bestScore){ bestScore = sc; bestMove = i; }
      }
    }
    return bestMove >= 0 ? bestMove : b.findIndex(v => v===null);
  }
  function minimax(b, isMax){
    if (checkWin(b,'O')) return 1;
    if (checkWin(b,'X')) return -1;
    if (b.every(v=>v!==null)) return 0;
    if (isMax){
      let best = -Infinity;
      for (let i=0; i<9; i++) if (b[i]===null){ b[i]='O'; best = Math.max(best, minimax(b,false)); b[i]=null; }
      return best;
    } else {
      let best = Infinity;
      for (let i=0; i<9; i++) if (b[i]===null){ b[i]='X'; best = Math.min(best, minimax(b,true)); b[i]=null; }
      return best;
    }
  }

  function updateTurn(){
    $('turnX').classList.toggle('active', turn==='X');
    $('turnO').classList.toggle('active', turn==='O');
  }

  function endRound(winner, winLine){
    gameOver = true;
    if (winLine){
      winLine.forEach(i => boardEl.children[i].classList.add('win'));
    }
    const s = STRINGS[lang];
    if (winner === 'tie'){
      scoreDraw++; $('scoreDraw').textContent = scoreDraw;
      endTitle.textContent = s.tie; endSubtitle.textContent = '';
    } else if (winner === 'X'){
      scoreX++; $('scoreX').textContent = scoreX;
      endTitle.textContent = (mode==='ai') ? s.winYou : s.winX;
      endSubtitle.textContent = '';
      if (typeof VexGame !== 'undefined') VexGame.confetti(900);
    } else {
      scoreO++; $('scoreO').textContent = scoreO;
      endTitle.textContent = (mode==='ai') ? s.winAI : s.winO;
      endSubtitle.textContent = '';
      if (mode !== 'ai' && typeof VexGame !== 'undefined') VexGame.confetti(900);
    }
    setTimeout(() => endOverlay.classList.add('show'), 800);

    if (typeof VexGame !== 'undefined'){
      VexGame.setBest(scoreX);
      VexGame.endSession({
        score: scoreX,
        result: winner==='X' ? 'win' : (winner==='tie' ? 'draw' : 'loss'),
        metadata: { mode: mode, x: scoreX, o: scoreO, draws: scoreDraw },
      });
    }
  }

  $('resetBtn').addEventListener('click', () => { scoreX=scoreO=scoreDraw=0;
    $('scoreX').textContent='0'; $('scoreO').textContent='0'; $('scoreDraw').textContent='0';
    reset();
  });
  endRestart.addEventListener('click', reset);

  document.querySelectorAll('.mode-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.mode-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      mode = t.dataset.mode;
      scoreX=scoreO=scoreDraw=0;
      $('scoreX').textContent='0'; $('scoreO').textContent='0'; $('scoreDraw').textContent='0';
      reset();
    });
  });

  if (typeof VexGame !== 'undefined'){
    VexGame.boot({
      slug: 'tic-tac-toe',
      onReady: function(player){
        if (player && player.language){ lang = player.language === 'en' ? 'en' : 'ar'; VexGame.setLang(lang); }
        applyLang();
      },
    });
  }
  applyLang();
  reset();
})();
</script>
</body>
</html>
