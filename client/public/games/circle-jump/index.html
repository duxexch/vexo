<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="theme-color" content="#070b14">
<title>VEX Circle Jump</title><link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>.cj-board{position:relative;width:100%;max-width:360px;margin:0 auto;aspect-ratio:1;
background:radial-gradient(circle at 50% 50%,rgba(168,85,247,.20),transparent 65%),linear-gradient(180deg,#1a0f2e,#070b14);
border:1px solid rgba(168,85,247,.35);border-radius:18px;overflow:hidden}
.cj-canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:pointer}</style></head>
<body class="vex-game">
<div class="vex-shell">
<div class="vex-header"><div class="vex-title"><div class="vex-title-badge" style="background:linear-gradient(135deg,#a855f7,#4c1d95)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="5" r="2" fill="currentColor"/></svg></div><span id="title">قفز الدوائر</span></div><button class="vex-btn" id="resetBtn"><span id="resetLabel">إعادة</span></button></div>
<div class="vex-stats"><div class="vex-stat"><div class="vex-stat-label" id="lblScore">القفزات</div><div class="vex-stat-value" id="score">0</div></div><div class="vex-stat"><div class="vex-stat-label" id="lblBest">الأفضل</div><div class="vex-stat-value emerald" id="best">0</div></div><div class="vex-stat"><div class="vex-stat-label" id="lblLevel">المستوى</div><div class="vex-stat-value blue" id="level">1</div></div></div>
<div class="cj-board"><canvas class="cj-canvas" id="cv" width="360" height="360"></canvas></div>
<div class="vex-hint" id="hint">اضغط في اللحظة المناسبة لتقفز إلى الدائرة التالية. تجنب الأشواك الحمراء.</div></div>
<div class="vex-overlay" id="endOverlay"><div class="vex-overlay-card"><div class="vex-overlay-icon rose"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><path d="M9 9l6 6M15 9l-6 6"/></svg></div><div class="vex-overlay-title" id="endTitle">صدمت شوكة!</div><div class="vex-overlay-subtitle" id="endSub">حاول مجدداً.</div><div class="vex-overlay-stats"><div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFS">القفزات</div><div class="vex-overlay-stat-value" id="finalScore">0</div></div><div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFB">الأفضل</div><div class="vex-overlay-stat-value" id="finalBest">0</div></div></div><div class="vex-btn-row"><button class="vex-btn vex-btn-primary" id="endRestart" style="flex:1">جولة جديدة</button></div></div></div>
<script src="/games/vex-sdk.js"></script><script src="/games/_shared/vex-game.js"></script>
<script>(function(){'use strict';
const S={ar:{title:'قفز الدوائر',reset:'إعادة',score:'القفزات',best:'الأفضل',level:'المستوى',end:'صدمت شوكة!',endSub:'حاول مجدداً.',newRound:'جولة جديدة',hint:'اضغط في اللحظة المناسبة لتقفز.'},
en:{title:'Circle Jump',reset:'Reset',score:'Jumps',best:'Best',level:'Level',end:'Hit a spike!',endSub:'Try again.',newRound:'New game',hint:'Tap at the right moment to jump.'}};
let lang='ar';const $=id=>document.getElementById(id);const cv=$('cv'),ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
let player,circles,score,best,alive,raf;
function applyLang(){const s=S[lang];document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';
['title','resetLabel','score','best','level','endTitle','endSub','newRound','hint','lblFS','lblFB','lblScore','lblBest','lblLevel'].forEach(()=>{});
$('title').textContent=s.title;$('resetLabel').textContent=s.reset;$('lblScore').textContent=s.score;$('lblBest').textContent=s.best;$('lblLevel').textContent=s.level;
$('hint').textContent=s.hint;$('endTitle').textContent=s.end;$('endSub').textContent=s.endSub;$('endRestart').textContent=s.newRound;$('lblFS').textContent=s.score;$('lblFB').textContent=s.best;}
function makeCircle(idx){const spikes=Math.min(4,1+Math.floor(idx/3));const angles=[];while(angles.length<spikes){const a=Math.random()*Math.PI*2;if(angles.every(b=>Math.abs(((a-b+Math.PI*3)%(Math.PI*2))-Math.PI)>.7))angles.push(a);}
return{r:90,spd:0.025+idx*0.004,rot:0,spikes:angles};}
function reset(){player={cur:0,onCircle:true,angle:-Math.PI/2,r:8};circles=[makeCircle(0),makeCircle(1)];score=0;alive=true;
best=parseInt(localStorage.getItem('vex.best.circle-jump')||'0',10);$('score').textContent=0;$('best').textContent=best;$('level').textContent=1;
$('endOverlay').classList.remove('show');cancelAnimationFrame(raf);loop();}
function jump(){if(!alive)return;if(!player.onCircle)return;player.onCircle=false;}
function step(){const c=circles[0];c.rot+=c.spd;if(player.onCircle)player.angle+=c.spd;
const cx=W/2,cy=H/2;
if(player.onCircle){for(const a of c.spikes){const sa=a+c.rot;if(Math.abs(((player.angle-sa+Math.PI*3)%(Math.PI*2))-Math.PI)<.18)return die();}}
else{const next=circles[1];const tx=W/2,ty=H/2-next.r;const px=cx+Math.cos(player.angle)*c.r,py=cy+Math.sin(player.angle)*c.r;
const nx=px+(tx-px)*0.18,ny=py+(ty-py)*0.18;player._px=nx;player._py=ny;
if(Math.hypot(nx-tx,ny-ty)<14){circles.shift();circles.push(makeCircle(score+2));player.cur++;player.angle=-Math.PI/2;player.onCircle=true;score++;
$('score').textContent=score;$('level').textContent=Math.floor(score/5)+1;
if(typeof VexGame!=='undefined'){VexGame.popScore(document.body,'+1',cv.getBoundingClientRect().left+W/2+'px',cv.getBoundingClientRect().top+H/2+'px','blue');}}}}
function draw(){ctx.clearRect(0,0,W,H);const cx=W/2,cy=H/2;const c=circles[0];
ctx.strokeStyle='rgba(168,85,247,0.45)';ctx.lineWidth=10;ctx.beginPath();ctx.arc(cx,cy,c.r,0,Math.PI*2);ctx.stroke();
ctx.strokeStyle='rgba(255,255,255,0.10)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,c.r,0,Math.PI*2);ctx.stroke();
for(const a of c.spikes){const sa=a+c.rot;const sx=cx+Math.cos(sa)*c.r,sy=cy+Math.sin(sa)*c.r;
const tx=cx+Math.cos(sa)*(c.r+18),ty=cy+Math.sin(sa)*(c.r+18);
ctx.fillStyle='#dc2626';ctx.beginPath();ctx.moveTo(sx+Math.cos(sa+Math.PI/2)*5,sy+Math.sin(sa+Math.PI/2)*5);ctx.lineTo(tx,ty);ctx.lineTo(sx-Math.cos(sa+Math.PI/2)*5,sy-Math.sin(sa+Math.PI/2)*5);ctx.fill();}
const next=circles[1];ctx.globalAlpha=0.4;ctx.strokeStyle='rgba(34,197,94,0.5)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(cx,cy-100,next.r*0.4,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
let px,py;if(player.onCircle){px=cx+Math.cos(player.angle)*c.r;py=cy+Math.sin(player.angle)*c.r;}else{px=player._px||cx;py=player._py||cy;}
const g=ctx.createRadialGradient(px-2,py-2,1,px,py,player.r);g.addColorStop(0,'#fde047');g.addColorStop(1,'#b45309');
ctx.fillStyle=g;ctx.beginPath();ctx.arc(px,py,player.r,0,Math.PI*2);ctx.fill();}
function loop(){if(!alive)return;step();draw();raf=requestAnimationFrame(loop);}
function die(){alive=false;if(score>best){best=score;localStorage.setItem('vex.best.circle-jump',best);}
$('best').textContent=best;$('finalScore').textContent=score;$('finalBest').textContent=best;
setTimeout(()=>$('endOverlay').classList.add('show'),300);
if(typeof VexGame!=='undefined'){VexGame.setBest(best);VexGame.endSession({score,result:'loss'});}}
cv.addEventListener('mousedown',jump);cv.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}});
$('resetBtn').addEventListener('click',reset);$('endRestart').addEventListener('click',reset);
if(typeof VexGame!=='undefined'){VexGame.boot({slug:'circle-jump',onReady:p=>{if(p&&p.language){lang=p.language==='en'?'en':'ar';VexGame.setLang(lang);}applyLang();}});}
applyLang();reset();})();</script></body></html>
