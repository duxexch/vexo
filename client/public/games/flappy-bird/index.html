<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b14">
<title>VEX Flappy</title>
<link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>
.fb-board{position:relative;width:100%;max-width:360px;margin:0 auto;aspect-ratio:9/14;
 background:radial-gradient(ellipse 70% 50% at 50% 100%,rgba(34,197,94,.25),transparent 60%),
  linear-gradient(180deg,#0c1f3d 0%,#06112a 100%);
 border:1px solid rgba(56,189,248,.30);border-radius:18px;overflow:hidden;
 box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 14px 28px -10px rgba(0,0,0,.7);}
.fb-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:pointer}
</style>
</head>
<body class="vex-game">
<div class="vex-shell">
  <div class="vex-header">
    <div class="vex-title">
      <div class="vex-title-badge gold">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 12c4-4 8 4 12 0s6 0 6 0v6H3z"/></svg>
      </div>
      <span id="title">طائر فلابي</span>
    </div>
    <button class="vex-btn" id="resetBtn"><span id="resetLabel">إعادة</span></button>
  </div>
  <div class="vex-stats">
    <div class="vex-stat"><div class="vex-stat-label" id="lblScore">النتيجة</div><div class="vex-stat-value" id="score">0</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblBest">الأفضل</div><div class="vex-stat-value emerald" id="best">0</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblTime">الزمن</div><div class="vex-stat-value blue" id="time">0</div></div>
  </div>
  <div class="fb-board"><canvas class="fb-canvas" id="cv" width="324" height="504"></canvas></div>
  <div class="vex-hint" id="hint">انقر/اضغط مسطرة للقفز. تجنب الأنابيب.</div>
</div>
<div class="vex-overlay" id="endOverlay"><div class="vex-overlay-card">
  <div class="vex-overlay-icon rose"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><path d="M9 9l6 6M15 9l-6 6"/></svg></div>
  <div class="vex-overlay-title" id="endTitle">انتهت اللعبة!</div>
  <div class="vex-overlay-subtitle" id="endSub">حاول مجدداً.</div>
  <div class="vex-overlay-stats">
    <div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFS">النتيجة</div><div class="vex-overlay-stat-value" id="finalScore">0</div></div>
    <div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFB">الأفضل</div><div class="vex-overlay-stat-value" id="finalBest">0</div></div>
  </div>
  <div class="vex-btn-row"><button class="vex-btn vex-btn-gold" id="endRestart" style="flex:1">جولة جديدة</button></div>
</div></div>
<script src="/games/vex-sdk.js"></script>
<script src="/games/_shared/vex-game.js"></script>
<script>(function(){'use strict';
const S={ar:{title:'طائر فلابي',reset:'إعادة',score:'النتيجة',best:'الأفضل',time:'الزمن',end:'انتهت اللعبة!',endSub:'حاول مجدداً.',newRound:'جولة جديدة',hint:'انقر/اضغط مسطرة للقفز. تجنب الأنابيب.'},
en:{title:'Flappy Bird',reset:'Reset',score:'Score',best:'Best',time:'Time',end:'Game over!',endSub:'Try again.',newRound:'New game',hint:'Tap or press space to flap. Avoid pipes.'}};
let lang='ar';const $=id=>document.getElementById(id);
const cv=$('cv'),ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
const G=0.45,JUMP=-7.4,PIPE_GAP=130,PIPE_W=54,PIPE_SPACING=170,SPEED=2.0;
let bird,pipes,score,best,alive,startedAt,timer,raf;
function applyLang(){const s=S[lang];document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';
$('title').textContent=s.title;$('resetLabel').textContent=s.reset;$('lblScore').textContent=s.score;$('lblBest').textContent=s.best;$('lblTime').textContent=s.time;
$('hint').textContent=s.hint;$('endTitle').textContent=s.end;$('endSub').textContent=s.endSub;$('endRestart').textContent=s.newRound;
$('lblFS').textContent=s.score;$('lblFB').textContent=s.best;}
function reset(){bird={x:90,y:H/2,vy:0,r:14};pipes=[];for(let i=0;i<3;i++)addPipe(W+i*PIPE_SPACING);
score=0;alive=true;startedAt=Date.now();best=parseInt(localStorage.getItem('vex.best.flappy-bird')||'0',10);
$('score').textContent=0;$('best').textContent=best;$('time').textContent=0;$('endOverlay').classList.remove('show');
clearInterval(timer);timer=setInterval(()=>{if(alive)$('time').textContent=((Date.now()-startedAt)/1000).toFixed(1)},100);
cancelAnimationFrame(raf);loop();}
function addPipe(x){const margin=80;const top=margin+Math.random()*(H-2*margin-PIPE_GAP);pipes.push({x,top,passed:false});}
function jump(){if(!alive)return;bird.vy=JUMP;}
function step(){bird.vy+=G;bird.y+=bird.vy;
for(const p of pipes){p.x-=SPEED;
  if(!p.passed&&p.x+PIPE_W<bird.x){p.passed=true;score++;$('score').textContent=score;
    if(typeof VexGame!=='undefined'){const r=cv.getBoundingClientRect();VexGame.popScore(document.body,'+1',r.left+r.width/2+'px',r.top+30+'px','blue');}}
  if(p.x+PIPE_W>=bird.x-bird.r&&p.x<=bird.x+bird.r){if(bird.y-bird.r<p.top||bird.y+bird.r>p.top+PIPE_GAP)return die();}}
if(pipes.length&&pipes[0].x<-PIPE_W){pipes.shift();addPipe(pipes[pipes.length-1].x+PIPE_SPACING);}
if(bird.y+bird.r>=H||bird.y-bird.r<=0)return die();}
function draw(){ctx.fillStyle='rgba(7,17,40,0.15)';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#0a3a78';ctx.fillRect(0,H-30,W,30);
for(const p of pipes){const grd=ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);grd.addColorStop(0,'#16a34a');grd.addColorStop(.5,'#22c55e');grd.addColorStop(1,'#14532d');
  ctx.fillStyle=grd;ctx.fillRect(p.x,0,PIPE_W,p.top);ctx.fillRect(p.x,p.top+PIPE_GAP,PIPE_W,H-p.top-PIPE_GAP-30);
  ctx.fillStyle='#15803d';ctx.fillRect(p.x-3,p.top-14,PIPE_W+6,14);ctx.fillRect(p.x-3,p.top+PIPE_GAP,PIPE_W+6,14);}
ctx.save();ctx.translate(bird.x,bird.y);ctx.rotate(Math.max(-.5,Math.min(1,bird.vy/12)));
const bg=ctx.createRadialGradient(-3,-3,2,0,0,bird.r);bg.addColorStop(0,'#fde047');bg.addColorStop(1,'#b45309');
ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,bird.r,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(5,-3,4,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.arc(6,-3,2,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#dc2626';ctx.beginPath();ctx.moveTo(bird.r-2,2);ctx.lineTo(bird.r+8,4);ctx.lineTo(bird.r-2,7);ctx.fill();
ctx.restore();}
function loop(){if(!alive)return;step();draw();raf=requestAnimationFrame(loop);}
function die(){alive=false;clearInterval(timer);if(score>best){best=score;localStorage.setItem('vex.best.flappy-bird',best);}
$('best').textContent=best;$('finalScore').textContent=score;$('finalBest').textContent=best;
setTimeout(()=>$('endOverlay').classList.add('show'),300);
if(typeof VexGame!=='undefined'){VexGame.setBest(best);VexGame.endSession({score,result:'loss',metadata:{seconds:((Date.now()-startedAt)/1000).toFixed(1)}});}}
cv.addEventListener('mousedown',jump);cv.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
window.addEventListener('keydown',e=>{if(e.code==='Space'||e.key===' '){e.preventDefault();jump();}});
$('resetBtn').addEventListener('click',reset);$('endRestart').addEventListener('click',reset);
if(typeof VexGame!=='undefined'){VexGame.boot({slug:'flappy-bird',onReady:p=>{if(p&&p.language){lang=p.language==='en'?'en':'ar';VexGame.setLang(lang);}applyLang();}});}
applyLang();reset();})();</script></body></html>
