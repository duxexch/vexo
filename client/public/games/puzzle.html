<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>VEX Puzzle Challenge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07060f;--surface:#0f0e1a;--surface2:#161528;--border:rgba(99,102,241,.12);--pri:#6366f1;--pri-l:#818cf8;--acc:#a78bfa;--gold:#fbbf24;--ok:#22c55e;--danger:#ef4444;--tx:#e2e8f0;--txd:#94a3b8;--glow:rgba(99,102,241,.35)}
html,body{height:100%;font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;-webkit-user-select:none;user-select:none}

/* Background Effects */
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-fx .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.18;animation:orbFloat 16s ease-in-out infinite alternate}
.bg-fx .orb:nth-child(1){width:400px;height:400px;background:#6366f1;top:-100px;right:-100px;animation-duration:14s}
.bg-fx .orb:nth-child(2){width:300px;height:300px;background:#a855f7;bottom:-80px;left:-80px;animation-duration:18s}
.bg-fx .orb:nth-child(3){width:200px;height:200px;background:#22d3ee;top:50%;left:30%;animation-duration:20s;opacity:.1}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.1)}100%{transform:translate(-20px,20px) scale(.92)}}

/* Layout */
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(15,14,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#6366f1,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{display:flex;gap:12px;font-size:.78rem}
.stat{background:rgba(99,102,241,.06);border:1px solid var(--border);border-radius:10px;padding:5px 10px;display:flex;align-items:center;gap:5px}
.stat .lbl{color:var(--txd)}
.stat .val{font-weight:700;color:var(--gold)}

/* Controls */
.toolbar{padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;background:rgba(15,14,26,.7);border-bottom:1px solid var(--border);flex-shrink:0}
.btn{padding:8px 14px;border:1px solid rgba(99,102,241,.2);border-radius:10px;background:rgba(99,102,241,.08);color:var(--tx);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover{background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.35)}
.btn:active{transform:scale(.96)}
.btn-pri{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;box-shadow:0 3px 15px var(--glow)}
.btn-pri:hover{box-shadow:0 5px 25px var(--glow);transform:translateY(-1px)}
.btn-danger{border-color:rgba(239,68,68,.3);color:#f87171}
.btn-danger:hover{background:rgba(239,68,68,.12)}
select.sel{padding:8px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--tx);font-size:.8rem;cursor:pointer;font-family:inherit}

/* Board */
.board-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;position:relative;overflow:hidden;min-height:0}
.board{position:relative;width:min(85vw,600px);aspect-ratio:4/3;background:var(--surface);border:2px solid var(--border);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.03);overflow:hidden}

/* Puzzle Pieces */
.tile{position:absolute;background-size:cover;background-repeat:no-repeat;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.5);cursor:grab;touch-action:none;transition:box-shadow .2s;border:1px solid rgba(255,255,255,.06)}
.tile:active{cursor:grabbing;z-index:999!important}
.tile.placed{box-shadow:0 1px 6px rgba(0,0,0,.3);border-color:rgba(34,197,94,.4);cursor:default;animation:tileSnap .4s ease-out}
.tile.hint-glow{animation:hintPulse .8s ease-in-out}
@keyframes tileSnap{0%{transform:scale(1.08)}50%{transform:scale(.97)}100%{transform:scale(1)}}
@keyframes hintPulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.5)}50%{box-shadow:0 0 20px 8px rgba(99,102,241,.4)}}

/* Grid overlay */
.grid-lines{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s}
.grid-lines.on{opacity:.2}

/* Preview overlay */
.preview-img{position:absolute;inset:0;pointer-events:none;background-size:cover;opacity:0;transition:opacity .2s;border-radius:14px}
.preview-img.on{opacity:.5}

/* Confetti */
.confetti{position:absolute;inset:0;pointer-events:none}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(7,6,15,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:100}
.overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:min(90vw,420px);text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal h2{font-size:1.5rem;margin-bottom:8px;background:linear-gradient(135deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal p{color:var(--txd);margin-bottom:16px}
.modal .result{display:flex;justify-content:center;gap:20px;margin:16px 0}
.modal .result div{text-align:center}
.modal .result .r-val{font-size:1.6rem;font-weight:800;color:var(--gold)}
.modal .result .r-lbl{font-size:.7rem;color:var(--txd);margin-top:2px}

/* Gallery */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0;max-height:50vh;overflow-y:auto}
.gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.gallery img:hover{border-color:var(--pri);transform:scale(1.03)}

/* Responsive */
@media(max-width:500px){
  .stats{gap:6px}.stat{padding:4px 7px;font-size:.7rem}
  .toolbar{gap:5px}.btn{padding:6px 10px;font-size:.72rem}
  .board{width:95vw}
}
</style>
</head>
<body>
<div class="bg-fx"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">VEX Puzzle</div>
    <div class="stats">
      <div class="stat"><span class="lbl">الوقت</span><span class="val" id="timer">00:00</span></div>
      <div class="stat"><span class="lbl">حركات</span><span class="val" id="moves">0</span></div>
      <div class="stat"><span class="lbl">نقاط</span><span class="val" id="score">0</span></div>
      <div class="stat"><span class="lbl">أفضل</span><span class="val" id="best">—</span></div>
      <div class="stat"><span class="lbl">تقدم</span><span class="val" id="progress">0/0</span></div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <select class="sel" id="diffSel">
      <option value="3">سهل 3×3</option>
      <option value="4" selected>متوسط 4×4</option>
      <option value="5">صعب 5×5</option>
      <option value="7">خبير 7×7</option>
    </select>
    <button class="btn btn-pri" id="btnNew">لعبة جديدة</button>
    <button class="btn" id="btnShuffle">خلط</button>
    <button class="btn" id="btnHint">💡 تلميح</button>
    <button class="btn" id="btnPreview">👁 معاينة</button>
    <button class="btn" id="btnPause">⏸ إيقاف</button>
    <button class="btn" id="btnGallery">🖼 معرض</button>
    <button class="btn btn-danger" id="btnReset">↺ إعادة</button>
    <label style="display:flex;align-items:center;gap:4px;font-size:.78rem;color:var(--txd);cursor:pointer">
      <input type="checkbox" id="rotChk"> دوران
    </label>
    <label style="display:flex;align-items:center;gap:4px;font-size:.78rem;color:var(--txd);cursor:pointer">
      <input type="checkbox" id="gridChk"> شبكة
    </label>
    <label style="display:flex;align-items:center;gap:4px;font-size:.78rem;color:var(--txd);cursor:pointer">
      <input type="checkbox" id="soundChk" checked> صوت
    </label>
  </div>

  <!-- Board -->
  <div class="board-wrap">
    <div class="board" id="board">
      <div class="grid-lines" id="gridOverlay"></div>
      <div class="preview-img" id="previewImg"></div>
      <canvas class="confetti" id="confettiCv"></canvas>
    </div>
  </div>
</div>

<!-- Win Modal -->
<div class="overlay" id="winOverlay">
  <div class="modal">
    <h2>🎉 أحسنت!</h2>
    <p>أكملت اللغز بنجاح</p>
    <div class="result">
      <div><div class="r-val" id="wTime">00:00</div><div class="r-lbl">الوقت</div></div>
      <div><div class="r-val" id="wMoves">0</div><div class="r-lbl">حركات</div></div>
      <div><div class="r-val" id="wScore">0</div><div class="r-lbl">نقاط</div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-pri" id="wNew">لعبة جديدة</button>
      <button class="btn" id="wShare">مشاركة</button>
    </div>
  </div>
</div>

<!-- Pause Modal -->
<div class="overlay" id="pauseOverlay">
  <div class="modal">
    <h2>⏸ متوقفة</h2>
    <p>خذ استراحة — تقدمك محفوظ</p>
    <button class="btn btn-pri" id="btnResume">▶ استئناف</button>
  </div>
</div>

<!-- Gallery Modal -->
<div class="overlay" id="galleryOverlay">
  <div class="modal" style="max-width:550px">
    <h2>🖼 اختر صورة</h2>
    <div class="gallery" id="galleryGrid"></div>
    <div style="margin-top:12px">
      <label class="btn" style="cursor:pointer">📁 رفع صورة <input type="file" accept="image/*" id="imgUpload" style="display:none"></label>
    </div>
    <button class="btn" style="margin-top:10px" id="galleryClose">إغلاق</button>
  </div>
</div>

<script>
(()=>{
'use strict';

// ═══ STATE ═══
const S={
  cols:4,rows:4,rotate:false,imgURL:'',
  tiles:[],boardRect:null,
  t0:0,elapsed:0,tInterval:null,
  moveCount:0,score:0,paused:false,
  placed:0,total:0,soundOn:true
};

// ═══ DOM ═══
const $=id=>document.getElementById(id);
const board=$('board'),gridOv=$('gridOverlay'),previewImg=$('previewImg'),confCv=$('confettiCv');
const timerEl=$('timer'),movesEl=$('moves'),scoreEl=$('score'),bestEl=$('best'),progEl=$('progress');

// ═══ UTILS ═══
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const fmt=ms=>{const s=Math.floor(ms/1000),m=Math.floor(s/60);return`${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`};

// ═══ AUDIO ═══
let actx=null;
function initAudio(){if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)}catch{}}
function beep(freq,dur,type='triangle',vol=.03){
  if(!S.soundOn||!actx)return;
  if(actx.state==='suspended')actx.resume();
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(actx.destination);o.start();
  setTimeout(()=>{o.stop();o.disconnect();g.disconnect()},dur);
}
function sfxPlace(){beep(880,80,'triangle',.04)}
function sfxWin(){beep(660,120);setTimeout(()=>beep(990,140),160)}

// ═══ IMAGES ═══
const GALLERY=[
  'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&q=80',
  'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=800&q=80',
  'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=800&q=80',
  'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=80',
  'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80',
  'https://images.unsplash.com/photo-1518173946687-a0547e8b85de?w=800&q=80',
  'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80',
  'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=800&q=80',
  'https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=800&q=80'
];
function randomImg(){return GALLERY[Math.floor(Math.random()*GALLERY.length)]}

// ═══ TIMER ═══
function tickTimer(){
  const now=performance.now();
  const e=S.t0?(S.elapsed+(now-S.t0)):S.elapsed;
  timerEl.textContent=fmt(e);
}
function startTimer(){if(S.tInterval)clearInterval(S.tInterval);S.t0=performance.now();S.tInterval=setInterval(tickTimer,250)}
function pauseTimer(){if(!S.t0)return;S.elapsed+=performance.now()-S.t0;S.t0=0;clearInterval(S.tInterval);S.tInterval=null}
function resetTimer(){clearInterval(S.tInterval);S.tInterval=null;S.t0=0;S.elapsed=0;tickTimer()}

// ═══ SCORE ═══
function calcScore(){
  const ratio=S.total?S.placed/S.total:0;
  const tPen=Math.floor((S.elapsed+(S.t0?performance.now()-S.t0:0))/1000);
  const mPen=Math.max(0,S.moveCount-S.total);
  S.score=clamp(Math.floor(ratio*1000)-tPen-mPen,0,1000);
  scoreEl.textContent=S.score;
}
function bestKey(){return`vex-pz-best-${S.cols}x${S.rows}${S.rotate?'-r':''}`}
function loadBest(){try{const d=JSON.parse(localStorage.getItem(bestKey()));return d?.ms||null}catch{return null}}
function saveBest(ms){try{localStorage.setItem(bestKey(),JSON.stringify({ms}))}catch{}}
function showBest(){const b=loadBest();bestEl.textContent=b?fmt(b):'—'}

// ═══ UPDATE UI ═══
function updProgress(){progEl.textContent=`${S.placed}/${S.total}`}
function updMoves(n){S.moveCount=n;movesEl.textContent=n}

// ═══ BOARD ═══
function clearBoard(){S.tiles=[];board.querySelectorAll('.tile').forEach(e=>e.remove());S.placed=0;updProgress()}

function sizeTiles(){
  const r=board.getBoundingClientRect();
  const tw=r.width/S.cols,th=r.height/S.rows;
  gridOv.style.backgroundImage=`linear-gradient(to right,rgba(255,255,255,.15) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,.15) 1px,transparent 1px)`;
  gridOv.style.backgroundSize=`${tw}px ${th}px`;
  for(const t of S.tiles){
    t.el.style.width=tw+'px';t.el.style.height=th+'px';
    t.el.style.backgroundSize=r.width+'px '+r.height+'px';
    t.el.style.backgroundPosition=`-${t.col*tw}px -${t.row*th}px`;
    if(t.locked){t.el.style.left=t.col*tw+'px';t.el.style.top=t.row*th+'px'}
  }
}

function makeTile(row,col,url){
  const el=document.createElement('div');
  el.className='tile';el.style.backgroundImage=`url('${url}')`;
  const tile={row,col,el,locked:false,rot:0};
  board.appendChild(el);S.tiles.push(tile);
  return tile;
}

function buildTiles(url){
  clearBoard();
  for(let r=0;r<S.rows;r++)for(let c=0;c<S.cols;c++)makeTile(r,c,url);
  S.total=S.tiles.length;sizeTiles();scatter();updProgress();
}

function scatter(){
  const r=board.getBoundingClientRect();
  const tw=r.width/S.cols,th=r.height/S.rows;
  for(const t of S.tiles){
    if(t.locked)continue;
    const x=Math.random()*(r.width-tw),y=Math.random()*(r.height-th);
    t.el.style.left=x+'px';t.el.style.top=y+'px';
    t.el.classList.remove('placed');
    t.locked=false;
    if(S.rotate){
      t.rot=[0,90,180,270][Math.floor(Math.random()*4)];
      t.el.style.transform=`rotate(${t.rot}deg)`;
    }else{t.rot=0;t.el.style.transform=''}
    attachDrag(t);
  }
}

// ═══ SNAP CHECK ═══
function snapPos(t){
  const r=board.getBoundingClientRect();
  return{x:t.col*(r.width/S.cols),y:t.row*(r.height/S.rows),tw:r.width/S.cols,th:r.height/S.rows};
}

function trySnap(t){
  const{x,y,tw,th}=snapPos(t);
  const dx=Math.abs(parseFloat(t.el.style.left)-x);
  const dy=Math.abs(parseFloat(t.el.style.top)-y);
  const near=dx<Math.max(14,tw*.1)&&dy<Math.max(14,th*.1);
  const rotOk=!S.rotate||(t.rot%360===0);
  if(near&&rotOk){
    t.el.style.left=x+'px';t.el.style.top=y+'px';
    if(S.rotate){t.rot=0;t.el.style.transform='rotate(0deg)'}
    t.locked=true;t.el.classList.add('placed');
    S.placed=S.tiles.filter(p=>p.locked).length;
    updProgress();calcScore();sfxPlace();
    if(S.placed===S.total)onWin();
    return true;
  }
  return false;
}

// ═══ DRAG ═══
function attachDrag(t){
  const el=t.el;let dragging=false,ox=0,oy=0;
  function down(e){
    if(t.locked||S.paused)return;
    dragging=true;initAudio();
    const pt=e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};
    const rect=el.getBoundingClientRect();
    ox=pt.x-rect.left;oy=pt.y-rect.top;
    el.style.zIndex=String(500+(Date.now()%500));
    e.preventDefault();
  }
  function move(e){
    if(!dragging)return;
    const pt=e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};
    const br=board.getBoundingClientRect();
    const tw=br.width/S.cols,th=br.height/S.rows;
    const nx=clamp(pt.x-br.left-ox,0,br.width-tw);
    const ny=clamp(pt.y-br.top-oy,0,br.height-th);
    el.style.left=nx+'px';el.style.top=ny+'px';
  }
  function up(){if(!dragging)return;dragging=false;updMoves(S.moveCount+1);if(!trySnap(t))calcScore()}

  function wheel(e){if(!S.rotate||t.locked||S.paused)return;e.preventDefault();t.rot=(t.rot+(e.deltaY>0?90:-90))%360;el.style.transform=`rotate(${t.rot}deg)`;trySnap(t)}
  function dbl(){if(!S.rotate||t.locked||S.paused)return;t.rot=(t.rot+90)%360;el.style.transform=`rotate(${t.rot}deg)`;trySnap(t)}

  el.addEventListener('mousedown',down);
  el.addEventListener('touchstart',down,{passive:false});
  window.addEventListener('mousemove',move);
  window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',up);
  window.addEventListener('touchend',up);
  el.addEventListener('wheel',wheel,{passive:false});
  el.addEventListener('dblclick',dbl);
}

// ═══ WIN ═══
function onWin(){
  pauseTimer();tickTimer();calcScore();
  const ms=S.elapsed;const b=loadBest();
  if(!b||ms<b){saveBest(ms);showBest()}
  $('wTime').textContent=fmt(ms);
  $('wMoves').textContent=S.moveCount;
  $('wScore').textContent=S.score;
  $('winOverlay').classList.add('show');
  sfxWin();fireConfetti();
}

// ═══ CONFETTI ═══
function fireConfetti(){
  const cv=confCv,ctx=cv.getContext('2d');
  const rect=cv.parentElement.getBoundingClientRect();
  cv.width=rect.width;cv.height=rect.height;
  const P=Array.from({length:100},()=>({
    x:Math.random()*cv.width,y:-10-Math.random()*30,
    vx:(Math.random()-.5)*2.5,vy:2+Math.random()*3,
    sz:2+Math.random()*4,
    color:`hsl(${Math.floor(Math.random()*360)},80%,60%)`,
    life:160+Math.random()*100
  }));
  let f=0;
  (function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.03;p.life--;ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.sz,p.sz)});
    if(++f<200)requestAnimationFrame(tick);else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

// ═══ GAME ACTIONS ═══
async function newGame(url){
  S.imgURL=url||randomImg();
  await new Promise((res,rej)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=res;i.onerror=rej;i.src=S.imgURL});
  previewImg.style.backgroundImage=`url('${S.imgURL}')`;
  buildTiles(S.imgURL);resetTimer();startTimer();updMoves(0);showBest();calcScore();
}
function doShuffle(){scatter();updMoves(0);S.placed=S.tiles.filter(t=>t.locked).length;updProgress();calcScore()}
function doReset(){resetTimer();buildTiles(S.imgURL);startTimer();updMoves(0);calcScore();updProgress()}
function doHint(){
  const cands=S.tiles.filter(t=>!t.locked);if(!cands.length)return;
  const t=cands[Math.floor(Math.random()*cands.length)];
  t.el.classList.add('hint-glow');setTimeout(()=>t.el.classList.remove('hint-glow'),900);
}
function togglePause(){
  S.paused=!S.paused;
  if(S.paused){pauseTimer();$('pauseOverlay').classList.add('show')}
  else{startTimer();$('pauseOverlay').classList.remove('show')}
}

// ═══ GALLERY ═══
function openGallery(){
  const g=$('galleryGrid');g.innerHTML='';
  GALLERY.forEach(url=>{
    const img=document.createElement('img');img.src=url;img.alt='صورة';
    img.onclick=()=>{$('galleryOverlay').classList.remove('show');newGame(url)};
    g.appendChild(img);
  });
  $('galleryOverlay').classList.add('show');
}

// ═══ EVENTS ═══
$('diffSel').onchange=e=>{const v=+e.target.value;S.cols=v;S.rows=v;newGame()};
$('btnNew').onclick=()=>newGame();
$('btnShuffle').onclick=doShuffle;
$('btnReset').onclick=doReset;
$('btnHint').onclick=doHint;
$('btnPause').onclick=togglePause;
$('btnGallery').onclick=openGallery;
$('btnPreview').onmousedown=()=>previewImg.classList.add('on');
$('btnPreview').ontouchstart=()=>previewImg.classList.add('on');
window.addEventListener('mouseup',()=>previewImg.classList.remove('on'));
window.addEventListener('touchend',()=>previewImg.classList.remove('on'));
$('rotChk').onchange=e=>{S.rotate=e.target.checked;doShuffle()};
$('gridChk').onchange=e=>gridOv.classList.toggle('on',e.target.checked);
$('soundChk').onchange=e=>S.soundOn=e.target.checked;
$('btnResume').onclick=()=>{$('pauseOverlay').classList.remove('show');S.paused=false;startTimer()};
$('wNew').onclick=()=>{$('winOverlay').classList.remove('show');newGame()};
$('wShare').onclick=async()=>{
  const txt=`حليت لغز VEX (${S.cols}×${S.rows}) في ${fmt(S.elapsed)} بـ ${S.moveCount} حركة! 🧩`;
  if(navigator.share)try{await navigator.share({text:txt,title:'VEX Puzzle'})}catch{}
  else try{await navigator.clipboard.writeText(txt);alert('تم النسخ!')}catch{alert(txt)}
};
$('galleryClose').onclick=()=>$('galleryOverlay').classList.remove('show');
$('imgUpload').onchange=e=>{
  const f=e.target.files?.[0];if(!f)return;
  const url=URL.createObjectURL(f);
  $('galleryOverlay').classList.remove('show');
  newGame(url).then(()=>setTimeout(()=>URL.revokeObjectURL(url),3000));
};
window.addEventListener('resize',sizeTiles);

// Keyboard shortcuts
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='p')togglePause();
  if(k==='h')doHint();
  if(k==='n')newGame();
  if(k===' '){previewImg.classList.add('on');e.preventDefault()}
});
window.addEventListener('keyup',e=>{if(e.key===' ')previewImg.classList.remove('on')});

// ═══ INIT ═══
newGame().catch(()=>newGame(randomImg()));
})();
</script>
</body>
</html>
