<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="theme-color" content="#070b14">
<title>VEX Maze</title><link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>.mz-board{position:relative;width:100%;max-width:360px;margin:0 auto;aspect-ratio:1;background:linear-gradient(180deg,#0c1530,#040912);border:1px solid rgba(30,136,255,.30);border-radius:18px;overflow:hidden;padding:8px}
.mz-canvas{width:100%;height:100%;display:block;touch-action:none}
.pad{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:8px;max-width:240px;margin:14px auto 0}
.pad-btn{aspect-ratio:1;background:linear-gradient(180deg,#2a3550,#131b30);border:1px solid rgba(255,255,255,.06);border-radius:14px;color:#dbeafe;display:grid;place-items:center;font-size:1.4rem;font-weight:700;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),inset 0 -2px 0 rgba(0,0,0,.45),0 4px 0 #050912}
.pad-btn:active{transform:translateY(3px);box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 1px 0 #050912}
.pad-btn.empty{visibility:hidden}</style></head>
<body class="vex-game">
<div class="vex-shell">
<div class="vex-header"><div class="vex-title"><div class="vex-title-badge"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 3h18v18H3z"/><path d="M7 3v8M11 7v14M15 3v8M15 13v8M19 7v10M3 11h8M11 15h8M3 19h8"/></svg></div><span id="title">هروب من المتاهة</span></div><button class="vex-btn" id="resetBtn"><span id="resetLabel">جديدة</span></button></div>
<div class="vex-stats"><div class="vex-stat"><div class="vex-stat-label" id="lblTime">الزمن</div><div class="vex-stat-value" id="time">0</div></div><div class="vex-stat"><div class="vex-stat-label" id="lblBest">الأفضل</div><div class="vex-stat-value emerald" id="best">—</div></div><div class="vex-stat"><div class="vex-stat-label" id="lblLevel">المستوى</div><div class="vex-stat-value blue" id="level">1</div></div></div>
<div class="mz-board"><canvas class="mz-canvas" id="cv" width="340" height="340"></canvas></div>
<div class="pad"><div class="pad-btn empty"></div><button class="pad-btn" data-d="up">▲</button><div class="pad-btn empty"></div><button class="pad-btn" data-d="left">◀</button><div class="pad-btn empty"></div><button class="pad-btn" data-d="right">▶</button><div class="pad-btn empty"></div><button class="pad-btn" data-d="down">▼</button><div class="pad-btn empty"></div></div>
<div class="vex-hint" id="hint">اوصل من الزرقاء (البداية) إلى الذهبية (النهاية).</div></div>
<div class="vex-overlay" id="endOverlay"><div class="vex-overlay-card"><div class="vex-overlay-icon gold"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 13l4 4L19 7"/></svg></div><div class="vex-overlay-title" id="endTitle">هربت!</div><div class="vex-overlay-subtitle" id="endSub">المتاهة التالية أصعب.</div><div class="vex-overlay-stats"><div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFT">الزمن</div><div class="vex-overlay-stat-value" id="finalT">0</div></div><div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFB">الأفضل</div><div class="vex-overlay-stat-value" id="finalB">0</div></div></div><div class="vex-btn-row"><button class="vex-btn vex-btn-primary" id="endNext" style="flex:1">المستوى التالي</button></div></div></div>
<script src="/games/vex-sdk.js"></script><script src="/games/_shared/vex-game.js"></script>
<script>(function(){'use strict';
const S={ar:{title:'هروب من المتاهة',reset:'جديدة',time:'الزمن',best:'الأفضل',level:'المستوى',end:'هربت!',endSub:'المتاهة التالية أصعب.',next:'المستوى التالي',hint:'اوصل من الزرقاء إلى الذهبية.'},
en:{title:'Maze Escape',reset:'New',time:'Time',best:'Best',level:'Level',end:'Escaped!',endSub:'Next maze is harder.',next:'Next level',hint:'Reach the gold from the blue.'}};
let lang='ar';const $=id=>document.getElementById(id);const cv=$('cv'),ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
let cols,rows,cell,grid,px,py,ex,ey,startedAt,timer,level=1;
function applyLang(){const s=S[lang];document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';
$('title').textContent=s.title;$('resetLabel').textContent=s.reset;$('lblTime').textContent=s.time;$('lblBest').textContent=s.best;$('lblLevel').textContent=s.level;
$('hint').textContent=s.hint;$('endTitle').textContent=s.end;$('endSub').textContent=s.endSub;$('endNext').textContent=s.next;$('lblFT').textContent=s.time;$('lblFB').textContent=s.best;}
function genMaze(n){cols=rows=n;cell=Math.floor(W/n);
grid=Array.from({length:rows},()=>Array.from({length:cols},()=>({n:1,e:1,s:1,w:1,v:0})));
function carve(x,y){grid[y][x].v=1;const dirs=[[0,-1,'n','s'],[1,0,'e','w'],[0,1,'s','n'],[-1,0,'w','e']].sort(()=>Math.random()-.5);
for(const[dx,dy,a,b]of dirs){const nx=x+dx,ny=y+dy;if(nx<0||ny<0||nx>=cols||ny>=rows||grid[ny][nx].v)continue;
grid[y][x][a]=0;grid[ny][nx][b]=0;carve(nx,ny);}}
carve(0,0);px=0;py=0;ex=cols-1;ey=rows-1;}
function newLevel(){const n=Math.min(15,5+level);genMaze(n);startedAt=Date.now();$('time').textContent=0;$('level').textContent=level;
const bk='vex.best.maze-escape.l'+level;const b=parseInt(localStorage.getItem(bk)||'0',10);$('best').textContent=b?b.toFixed(1):'—';
$('endOverlay').classList.remove('show');clearInterval(timer);timer=setInterval(()=>{$('time').textContent=((Date.now()-startedAt)/1000).toFixed(1)},100);draw();}
function move(dx,dy){const c=grid[py][px];const dir=dx===-1?'w':dx===1?'e':dy===-1?'n':'s';
if(c[dir]===0){px+=dx;py+=dy;draw();if(px===ex&&py===ey)win();}}
function win(){clearInterval(timer);const t=(Date.now()-startedAt)/1000;
const bk='vex.best.maze-escape.l'+level;const b=parseFloat(localStorage.getItem(bk)||'0');
if(!b||t<b)localStorage.setItem(bk,t.toFixed(1));
$('finalT').textContent=t.toFixed(1);$('finalB').textContent=parseFloat(localStorage.getItem(bk)).toFixed(1);
setTimeout(()=>$('endOverlay').classList.add('show'),200);
if(typeof VexGame!=='undefined'){const score=Math.max(1,Math.floor(2000-t*10*level));VexGame.endSession({score,result:'win',metadata:{level,seconds:t}});}}
function draw(){ctx.fillStyle='#0a1020';ctx.fillRect(0,0,W,H);
ctx.strokeStyle='rgba(56,189,248,0.85)';ctx.lineWidth=2;
for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){const c=grid[y][x];const X=x*cell,Y=y*cell;
ctx.beginPath();if(c.n){ctx.moveTo(X,Y);ctx.lineTo(X+cell,Y);}if(c.e){ctx.moveTo(X+cell,Y);ctx.lineTo(X+cell,Y+cell);}
if(c.s){ctx.moveTo(X,Y+cell);ctx.lineTo(X+cell,Y+cell);}if(c.w){ctx.moveTo(X,Y);ctx.lineTo(X,Y+cell);}ctx.stroke();}
ctx.fillStyle='rgba(255,182,39,0.25)';ctx.fillRect(ex*cell+2,ey*cell+2,cell-4,cell-4);
ctx.fillStyle='#ffb627';ctx.beginPath();ctx.arc(ex*cell+cell/2,ey*cell+cell/2,cell*0.3,0,Math.PI*2);ctx.fill();
const g=ctx.createRadialGradient(px*cell+cell/2-2,py*cell+cell/2-2,1,px*cell+cell/2,py*cell+cell/2,cell*0.35);
g.addColorStop(0,'#67e8f9');g.addColorStop(1,'#0e7490');ctx.fillStyle=g;ctx.beginPath();ctx.arc(px*cell+cell/2,py*cell+cell/2,cell*0.32,0,Math.PI*2);ctx.fill();}
document.querySelectorAll('.pad-btn[data-d]').forEach(b=>b.addEventListener('click',()=>{const d=b.dataset.d;
if(d==='up')move(0,-1);if(d==='down')move(0,1);if(d==='left')move(-1,0);if(d==='right')move(1,0);}));
window.addEventListener('keydown',e=>{const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};if(m[e.key]){e.preventDefault();move(...m[e.key]);}});
let ts=null;cv.addEventListener('touchstart',e=>{if(e.touches.length)ts={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
cv.addEventListener('touchend',e=>{if(!ts||!e.changedTouches.length)return;const t=e.changedTouches[0];const dx=t.clientX-ts.x,dy=t.clientY-ts.y;
if(Math.abs(dx)<20&&Math.abs(dy)<20)return;if(Math.abs(dx)>Math.abs(dy))move(dx>0?1:-1,0);else move(0,dy>0?1:-1);ts=null;},{passive:true});
$('resetBtn').addEventListener('click',()=>{level=1;newLevel();});
$('endNext').addEventListener('click',()=>{level++;newLevel();});
if(typeof VexGame!=='undefined'){VexGame.boot({slug:'maze-escape',onReady:p=>{if(p&&p.language){lang=p.language==='en'?'en':'ar';VexGame.setLang(lang);}applyLang();}});}
applyLang();newLevel();})();</script></body></html>
