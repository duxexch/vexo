<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b14">
<title>VEX Snake</title>
<link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>
  .sn-board {
    width: 100%; max-width: 360px; margin: 0 auto;
    aspect-ratio: 1;
    background:
      radial-gradient(ellipse 70% 100% at 50% 0%, rgba(34,197,94,0.18), transparent 60%),
      linear-gradient(180deg,#08160f 0%,#040a06 100%);
    border: 1px solid rgba(34,197,94,0.30);
    border-radius: 18px; padding: 8px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.06),
      inset 0 -2px 0 rgba(0,0,0,0.55),
      inset 0 0 30px rgba(34,197,94,0.18),
      0 14px 28px -10px rgba(0,0,0,0.7),
      0 4px 10px rgba(0,0,0,0.45);
    position: relative; overflow: hidden;
  }
  .sn-board::before {
    content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(34,197,94,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,197,94,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse 80% 90% at 50% 60%, #000 0%, transparent 85%);
    -webkit-mask-image: radial-gradient(ellipse 80% 90% at 50% 60%, #000 0%, transparent 85%);
    animation: vexFloorScroll 7s linear infinite;
    will-change: background-position;
  }
  .sn-board::after {
    content:""; position:absolute; inset:-8% -8%; pointer-events:none; z-index:2;
    background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.05) 50%, transparent 65%);
    animation: vexBeamSweep 8s ease-in-out infinite;
    animation-delay: 1s;
    will-change: transform, opacity;
  }
  .sn-canvas { position:relative; z-index:1; width: 100%; height: 100%; display: block; touch-action: none; }
  .pad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 8px; max-width: 240px; margin: 16px auto 0;
  }
  .pad-btn {
    aspect-ratio: 1;
    background: linear-gradient(180deg, #2a3550 0%, #131b30 100%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    color: #d1fae5; display: grid; place-items: center;
    font-size: 1.4rem; font-weight: 700; cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -2px 0 rgba(0,0,0,0.45),
      0 4px 0 #050912,
      0 6px 14px rgba(0,0,0,0.45);
    transition: transform 0.08s ease, box-shadow 0.08s ease, color 0.18s;
  }
  .pad-btn:active {
    transform: translateY(3px);
    color: #86efac;
    background: linear-gradient(180deg, #1c5436 0%, #0c2418 100%);
    box-shadow:
      inset 0 1px 0 rgba(134,239,172,0.30),
      inset 0 -1px 0 rgba(0,0,0,0.45),
      0 1px 0 #050912,
      0 2px 6px rgba(34,197,94,0.40);
  }
  .pad-btn.empty { visibility: hidden; }
</style>
</head>
<body class="vex-game">
<div class="vex-shell">
  <div class="vex-header">
    <div class="vex-title">
      <div class="vex-title-badge emerald">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12c2 0 2-3 4-3s2 3 4 3 2-3 4-3 2 3 4 3"/></svg>
      </div>
      <span id="title">الثعبان</span>
    </div>
    <button class="vex-btn" id="resetBtn"><span id="resetBtnLabel">إعادة</span></button>
  </div>

  <div class="vex-stats">
    <div class="vex-stat"><div class="vex-stat-label" id="lblScore">النتيجة</div><div class="vex-stat-value emerald" id="score">0</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblBest">الأفضل</div><div class="vex-stat-value" id="best">0</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblLen">الطول</div><div class="vex-stat-value" id="len">3</div></div>
  </div>

  <div class="sn-board"><canvas class="sn-canvas" id="cv" width="400" height="400"></canvas></div>

  <div class="pad">
    <div class="pad-btn empty"></div>
    <button class="pad-btn" data-dir="up">▲</button>
    <div class="pad-btn empty"></div>
    <button class="pad-btn" data-dir="left">◀</button>
    <div class="pad-btn empty"></div>
    <button class="pad-btn" data-dir="right">▶</button>
    <div class="pad-btn empty"></div>
    <button class="pad-btn" data-dir="down">▼</button>
    <div class="pad-btn empty"></div>
  </div>

  <div class="vex-hint" id="hint">حرّك الثعبان واجمع التفاحات. لا تصطدم بالجدار أو بنفسك.</div>
</div>

<div class="vex-overlay" id="endOverlay">
  <div class="vex-overlay-card">
    <div class="vex-overlay-icon emerald">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
    </div>
    <div class="vex-overlay-title" id="endTitle">انتهت اللعبة!</div>
    <div class="vex-overlay-subtitle" id="endSub">حاول مجدداً.</div>
    <div class="vex-overlay-stats">
      <div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFinalScore">النتيجة</div><div class="vex-overlay-stat-value" id="finalScore">0</div></div>
      <div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFinalBest">الأفضل</div><div class="vex-overlay-stat-value" id="finalBest">0</div></div>
    </div>
    <div class="vex-btn-row">
      <button class="vex-btn vex-btn-primary" id="endRestart" style="flex:1;background:linear-gradient(135deg,#22c55e,#14532d);box-shadow:0 0 18px -3px #22c55e;">جولة جديدة</button>
    </div>
  </div>
</div>

<script src="/games/vex-sdk.js"></script>
<script src="/games/_shared/vex-game.js"></script>
<script>
(function(){
  'use strict';
  const STRINGS = {
    ar:{ title:'الثعبان', reset:'إعادة', score:'النتيجة', best:'الأفضل', len:'الطول',
      end:'انتهت اللعبة!', endSub:'حاول مجدداً.', newRound:'جولة جديدة',
      hint:'حرّك الثعبان واجمع التفاحات. لا تصطدم بالجدار أو بنفسك.', },
    en:{ title:'Snake', reset:'Reset', score:'Score', best:'Best', len:'Length',
      end:'Game over!', endSub:'Try again.', newRound:'New game',
      hint:'Move the snake, eat apples. Don\'t hit the wall or yourself.', },
  };
  let lang = 'ar';
  const $ = id => document.getElementById(id);
  const cv = $('cv'), ctx = cv.getContext('2d');
  const COLS = 20, ROWS = 20;
  const CELL = cv.width / COLS;
  let snake, dir, queuedDir, food, score, best, alive, tickMs, timer;

  function applyLang(){
    const s = STRINGS[lang];
    document.documentElement.lang = lang; document.documentElement.dir = lang==='ar'?'rtl':'ltr';
    $('title').textContent = s.title; $('resetBtnLabel').textContent = s.reset;
    $('lblScore').textContent = s.score; $('lblBest').textContent = s.best; $('lblLen').textContent = s.len;
    $('hint').textContent = s.hint;
    $('endTitle').textContent = s.end; $('endSub').textContent = s.endSub;
    $('endRestart').textContent = s.newRound;
    $('lblFinalScore').textContent = s.score; $('lblFinalBest').textContent = s.best;
  }

  function rand(n){ return Math.floor(Math.random()*n); }
  function placeFood(){
    while (true){
      const f = { x: rand(COLS), y: rand(ROWS) };
      if (!snake.some(s => s.x===f.x && s.y===f.y)){ food = f; return; }
    }
  }

  function reset(){
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1,y:0}; queuedDir = dir;
    score = 0; alive = true; tickMs = 140;
    best = parseInt(localStorage.getItem('vex.best.snake') || '0', 10);
    placeFood();
    $('score').textContent = '0'; $('best').textContent = best; $('len').textContent = snake.length;
    $('endOverlay').classList.remove('show');
    if (timer) clearInterval(timer);
    timer = setInterval(tick, tickMs);
    draw();
  }

  function setDir(nx, ny){
    if (!alive) return;
    // prevent reverse
    if (dir.x === -nx && dir.y === -ny) return;
    queuedDir = { x: nx, y: ny };
  }

  function tick(){
    if (!alive) return;
    dir = queuedDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x<0 || head.x>=COLS || head.y<0 || head.y>=ROWS) return die();
    if (snake.some(s => s.x===head.x && s.y===head.y)) return die();
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y){
      score++;
      $('score').textContent = score;
      $('len').textContent = snake.length;
      if (typeof VexGame !== 'undefined'){
        const rect = cv.getBoundingClientRect();
        VexGame.popScore(document.body, '+1', rect.left + (food.x+0.5)*(rect.width/COLS) + 'px',
          rect.top + (food.y+0.5)*(rect.height/ROWS) + 'px', '');
      }
      placeFood();
      // speed up slightly
      if (score % 5 === 0 && tickMs > 70){
        tickMs -= 6;
        clearInterval(timer); timer = setInterval(tick, tickMs);
      }
    } else {
      snake.pop();
    }
    draw();
  }

  // Cached gradients (built once, reused every frame for perf)
  let bodyGrad = null, headGrad = null, foodGrad = null;
  function buildGrads(){
    bodyGrad = ctx.createLinearGradient(0, 0, 0, CELL);
    bodyGrad.addColorStop(0, '#34d57c'); bodyGrad.addColorStop(0.5, '#1aa455'); bodyGrad.addColorStop(1, '#0a6431');
    headGrad = ctx.createLinearGradient(0, 0, 0, CELL);
    headGrad.addColorStop(0, '#bbf7d0'); headGrad.addColorStop(0.45, '#4ade80'); headGrad.addColorStop(1, '#15803d');
    foodGrad = ctx.createRadialGradient(CELL*0.35, CELL*0.30, 1, CELL*0.5, CELL*0.5, CELL*0.55);
    foodGrad.addColorStop(0, '#fff5f5'); foodGrad.addColorStop(0.25, '#fca5a5');
    foodGrad.addColorStop(0.75, '#dc2626'); foodGrad.addColorStop(1, '#5b0a0a');
  }

  function draw(){
    if (!bodyGrad) buildGrads();
    // dark base — let CSS background show through subtly
    ctx.fillStyle = 'rgba(4,10,6,0.65)';
    ctx.fillRect(0,0,cv.width,cv.height);
    // food (apple) — 3D sphere using cached radial; translate gradient to position
    const fx = food.x*CELL, fy = food.y*CELL;
    ctx.save();
    ctx.translate(fx, fy);
    ctx.fillStyle = foodGrad;
    ctx.beginPath(); ctx.arc(CELL/2, CELL/2, CELL*0.42, 0, Math.PI*2); ctx.fill();
    // glossy highlight
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.ellipse(CELL*0.38, CELL*0.30, CELL*0.10, CELL*0.05, -0.4, 0, Math.PI*2); ctx.fill();
    // tiny stem
    ctx.fillStyle = '#15803d';
    ctx.fillRect(CELL*0.48, CELL*0.06, CELL*0.05, CELL*0.10);
    ctx.restore();
    // snake — 3D segments with vertical gradient + rim highlight
    snake.forEach((s, i) => {
      const x = s.x*CELL + 1, y = s.y*CELL + 1, w = CELL - 2;
      const isHead = i === 0;
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = isHead ? headGrad : bodyGrad;
      const r = isHead ? 7 : 4;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(0, 0, w, w, r); else ctx.rect(0, 0, w, w);
      ctx.fill();
      // top edge highlight
      ctx.fillStyle = isHead ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.22)';
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(2, 1.5, w-4, 2, 1); else ctx.rect(2, 1.5, w-4, 2);
      ctx.fill();
      // bottom shadow line
      ctx.fillStyle = 'rgba(0,0,0,0.30)';
      ctx.fillRect(2, w-3, w-4, 2);
      // head: eyes
      if (isHead){
        ctx.fillStyle = '#0a0a0a';
        const ex = dir.x === 0 ? [w*0.3, w*0.7] : (dir.x > 0 ? [w*0.62, w*0.62] : [w*0.32, w*0.32]);
        const ey = dir.y === 0 ? [w*0.35, w*0.35] : (dir.y > 0 ? [w*0.58, w*0.58] : [w*0.30, w*0.30]);
        const ex2 = dir.x === 0 ? [w*0.3, w*0.7] : (dir.x > 0 ? [w*0.62, w*0.62] : [w*0.32, w*0.32]);
        const ey2 = dir.y === 0 ? [w*0.62, w*0.62] : (dir.y > 0 ? [w*0.58, w*0.58] : [w*0.30, w*0.30]);
        ctx.beginPath(); ctx.arc(ex[0], ey[0], 1.6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2[1], ey2[1], 1.6, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });
  }

  function die(){
    alive = false;
    clearInterval(timer); timer = null;
    if (score > best){ best = score; localStorage.setItem('vex.best.snake', best); $('best').textContent = best; }
    $('finalScore').textContent = score; $('finalBest').textContent = best;
    setTimeout(() => $('endOverlay').classList.add('show'), 500);
    if (typeof VexGame !== 'undefined'){
      VexGame.setBest(best);
      VexGame.endSession({ score, result: 'loss', metadata: { length: snake.length } });
    }
  }

  // Pad controls
  document.querySelectorAll('.pad-btn[data-dir]').forEach(b => {
    b.addEventListener('click', () => {
      const d = b.dataset.dir;
      if (d==='up') setDir(0,-1);
      if (d==='down') setDir(0,1);
      if (d==='left') setDir(-1,0);
      if (d==='right') setDir(1,0);
    });
  });
  // Keyboard
  window.addEventListener('keydown', (e) => {
    if (e.key==='ArrowUp'||e.key==='w') setDir(0,-1);
    if (e.key==='ArrowDown'||e.key==='s') setDir(0,1);
    if (e.key==='ArrowLeft'||e.key==='a') setDir(-1,0);
    if (e.key==='ArrowRight'||e.key==='d') setDir(1,0);
  });
  // Swipe
  let touchStart = null;
  cv.addEventListener('touchstart', (e) => {
    if (e.touches.length){ touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }
  }, {passive:true});
  cv.addEventListener('touchend', (e) => {
    if (!touchStart || !e.changedTouches.length) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x, dy = t.clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx>0?1:-1, 0); else setDir(0, dy>0?1:-1);
    touchStart = null;
  }, {passive:true});

  $('resetBtn').addEventListener('click', reset);
  $('endRestart').addEventListener('click', reset);

  if (typeof VexGame !== 'undefined'){
    VexGame.boot({
      slug: 'snake',
      onReady: function(player){
        if (player && player.language){ lang = player.language === 'en' ? 'en' : 'ar'; VexGame.setLang(lang); }
        applyLang();
      },
    });
  }
  applyLang();
  reset();
})();
</script>
</body>
</html>
