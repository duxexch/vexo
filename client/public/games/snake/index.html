<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#070b14">
  <title>VEX Snake</title>
  <link rel="stylesheet" href="/games/_shared/vex-game.css">
  <style>
    :root {
      --snake-green: #22c55e;
      --snake-green-dark: #14532d;
      --snake-gold: #fbbf24;
      --snake-red: #ef4444;
      --panel: rgba(9, 14, 24, 0.82);
    }

    body.vex-game {
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.14), transparent 40%),
        linear-gradient(180deg, #050812 0%, #070b14 42%, #04060c 100%);
    }

    .sn-shell {
      display: grid;
      gap: 14px;
      max-width: 560px;
      margin: 0 auto;
    }

    .sn-board {
      width: 100%;
      aspect-ratio: 1;
      background:
        radial-gradient(ellipse 70% 100% at 50% 0%, rgba(34, 197, 94, 0.18), transparent 60%),
        linear-gradient(180deg, #08160f 0%, #040a06 100%);
      border: 1px solid rgba(34, 197, 94, 0.30);
      border-radius: 18px;
      padding: 8px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 -2px 0 rgba(0, 0, 0, 0.55),
        inset 0 0 30px rgba(34, 197, 94, 0.18),
        0 14px 28px -10px rgba(0, 0, 0, 0.7),
        0 4px 10px rgba(0, 0, 0, 0.45);
      position: relative;
      overflow: hidden;
    }

    .sn-board::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(34, 197, 94, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 197, 94, 0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse 80% 90% at 50% 60%, #000 0%, transparent 85%);
      -webkit-mask-image: radial-gradient(ellipse 80% 90% at 50% 60%, #000 0%, transparent 85%);
      animation: vexFloorScroll 7s linear infinite;
      will-change: background-position;
    }

    .sn-board::after {
      content: "";
      position: absolute;
      inset: -8% -8%;
      pointer-events: none;
      z-index: 2;
      background: linear-gradient(105deg, transparent 35%, rgba(255, 255, 255, 0.05) 50%, transparent 65%);
      animation: vexBeamSweep 8s ease-in-out infinite;
      animation-delay: 1s;
      will-change: transform, opacity;
    }

    .sn-canvas {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .sn-top {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .sn-stat {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 10px 12px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .sn-stat-label {
      font-size: 0.72rem;
      color: rgba(226, 232, 240, 0.74);
      margin-bottom: 4px;
    }

    .sn-stat-value {
      font-size: 1.05rem;
      font-weight: 800;
      color: #f8fafc;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .sn-stat-value.emerald {
      color: #86efac;
    }

    .sn-stat-value.gold {
      color: #fcd34d;
    }

    .sn-stat-value.red {
      color: #fda4af;
    }

    .sn-substats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .sn-chip {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .sn-chip strong {
      color: #fff;
    }

    .pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      max-width: 240px;
      margin: 2px auto 0;
    }

    .pad-btn {
      aspect-ratio: 1;
      background: linear-gradient(180deg, #2a3550 0%, #131b30 100%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      color: #d1fae5;
      display: grid;
      place-items: center;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 -2px 0 rgba(0, 0, 0, 0.45),
        0 4px 0 #050912,
        0 6px 14px rgba(0, 0, 0, 0.45);
      transition: transform 0.08s ease, box-shadow 0.08s ease, color 0.18s;
      min-height: 44px;
      min-width: 44px;
    }

    .pad-btn:active {
      transform: translateY(3px);
      color: #86efac;
      background: linear-gradient(180deg, #1c5436 0%, #0c2418 100%);
      box-shadow:
        inset 0 1px 0 rgba(134, 239, 172, 0.30),
        inset 0 -1px 0 rgba(0, 0, 0, 0.45),
        0 1px 0 #050912,
        0 2px 6px rgba(34, 197, 94, 0.40);
    }

    .pad-btn.empty {
      visibility: hidden;
    }

    .sn-footer {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .sn-badge {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.18);
      color: #bbf7d0;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 0.78rem;
    }
  </style>
</head>

<body class="vex-game">
  <div class="vex-shell">
    <div class="vex-header">
      <div class="vex-title">
        <div class="vex-title-badge emerald">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12c2 0 2-3 4-3s2 3 4 3 2-3 4-3 2 3 4 3" />
          </svg>
        </div>
        <span id="title">الثعبان</span>
      </div>
      <button class="vex-btn" id="pauseBtn"><span id="pauseBtnLabel">إيقاف</span></button>
      <button class="vex-btn" id="resetBtn"><span id="resetBtnLabel">إعادة</span></button>
    </div>

    <div class="sn-shell">
      <div class="sn-top">
        <div class="sn-stat">
          <div class="sn-stat-label" id="lblScore">النتيجة</div>
          <div class="sn-stat-value emerald" id="score">0</div>
        </div>
        <div class="sn-stat">
          <div class="sn-stat-label" id="lblBest">الأفضل</div>
          <div class="sn-stat-value gold" id="best">0</div>
        </div>
        <div class="sn-stat">
          <div class="sn-stat-label" id="lblLen">الطول</div>
          <div class="sn-stat-value" id="len">3</div>
        </div>
        <div class="sn-stat">
          <div class="sn-stat-label" id="lblLevel">المستوى</div>
          <div class="sn-stat-value red" id="level">1</div>
        </div>
      </div>

      <div class="sn-substats">
        <div class="sn-chip" id="chipSpeed">⚡ <span id="lblSpeed">السرعة</span> <strong id="speedValue">1x</strong>
        </div>
        <div class="sn-chip" id="chipCombo">🔥 <span id="lblCombo">الكومبو</span> <strong id="comboValue">x0</strong>
        </div>
        <div class="sn-chip" id="chipBoost">🧲 <span id="lblBoost">المكافأة</span> <strong id="boostValue">—</strong>
        </div>
        <div class="sn-chip" id="chipBestRun">🏆 <span id="lblRun">أفضل سلسلة</span> <strong
            id="bestRunValue">0</strong></div>
      </div>

      <div class="sn-board"><canvas class="sn-canvas" id="cv" width="400" height="400"></canvas></div>

      <div class="pad">
        <div class="pad-btn empty"></div>
        <button class="pad-btn" data-dir="up">▲</button>
        <div class="pad-btn empty"></div>
        <button class="pad-btn" data-dir="left">◀</button>
        <div class="pad-btn empty"></div>
        <button class="pad-btn" data-dir="right">▶</button>
        <div class="pad-btn empty"></div>
        <button class="pad-btn" data-dir="down">▼</button>
        <div class="pad-btn empty"></div>
      </div>

      <div class="sn-footer">
        <div class="sn-badge" id="hint">حرّك الثعبان واجمع التفاحات. لا تصطدم بالجدار أو بنفسك.</div>
        <div class="sn-badge" id="boostHint">💡 اجمع التفاحة الذهبية لوقت إضافي ونقاط مضاعفة.</div>
      </div>
    </div>
  </div>

  <div class="vex-overlay" id="endOverlay">
    <div class="vex-overlay-card">
      <div class="vex-overlay-icon emerald">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="9" y1="9" x2="15" y2="15" />
          <line x1="15" y1="9" x2="9" y2="15" />
        </svg>
      </div>
      <div class="vex-overlay-title" id="endTitle">انتهت اللعبة!</div>
      <div class="vex-overlay-subtitle" id="endSub">حاول مجدداً.</div>
      <div class="vex-overlay-stats">
        <div class="vex-overlay-stat">
          <div class="vex-overlay-stat-label" id="lblFinalScore">النتيجة</div>
          <div class="vex-overlay-stat-value" id="finalScore">0</div>
        </div>
        <div class="vex-overlay-stat">
          <div class="vex-overlay-stat-label" id="lblFinalBest">الأفضل</div>
          <div class="vex-overlay-stat-value" id="finalBest">0</div>
        </div>
      </div>
      <div class="vex-overlay-stats">
        <div class="vex-overlay-stat">
          <div class="vex-overlay-stat-label">VEX</div>
          <div class="vex-overlay-stat-value" id="finalVex">0</div>
        </div>
        <div class="vex-overlay-stat">
          <div class="vex-overlay-stat-label" id="lblFinalLevel">المستوى</div>
          <div class="vex-overlay-stat-value" id="finalLevel">1</div>
        </div>
      </div>
      <div class="vex-btn-row">
        <button class="vex-btn vex-btn-primary" id="endRestart"
          style="flex:1;background:linear-gradient(135deg,#22c55e,#14532d);box-shadow:0 0 18px -3px #22c55e;">جولة
          جديدة</button>
      </div>
    </div>
  </div>

  <script src="/games/vex-sdk.js"></script>
  <script src="/games/_shared/vex-game.js"></script>
  <script>
    (function () {
      'use strict';
      const STRINGS = {
        ar: {
          title: 'الثعبان', reset: 'إعادة', pause: 'إيقاف', resume: 'متابعة', score: 'النتيجة', best: 'الأفضل', len: 'الطول', level: 'المستوى',
          speed: 'السرعة', combo: 'الكومبو', boost: 'المكافأة', run: 'أفضل سلسلة',
          end: 'انتهت اللعبة!', endSub: 'حاول مجدداً.', newRound: 'جولة جديدة',
          hint: 'حرّك الثعبان واجمع التفاحات. لا تصطدم بالجدار أو بنفسك.', boostHint: '💡 اجمع التفاحة الذهبية لوقت إضافي ونقاط مضاعفة.'
        },
        en: {
          title: 'Snake', reset: 'Reset', pause: 'Pause', resume: 'Resume', score: 'Score', best: 'Best', len: 'Length', level: 'Level',
          speed: 'Speed', combo: 'Combo', boost: 'Boost', run: 'Best run',
          end: 'Game over!', endSub: 'Try again.', newRound: 'New game',
          hint: 'Move the snake, eat apples. Don\'t hit the wall or yourself.', boostHint: '💡 Grab the golden apple for more time and multiplier points.'
        },
      };
      let lang = 'ar';
      const $ = id => document.getElementById(id);
      const cv = $('cv'), ctx = cv.getContext('2d');
      const COLS = 20, ROWS = 20, CELL = cv.width / COLS;
      let snake, dir, queuedDir, food, score, best, alive, tickMs, timer, paused, level, combo, bestRun, boostType, boostUntil, boostScore, spawnedObstacles, lastGrowAt;

      function applyLang() {
        const s = STRINGS[lang];
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        $('title').textContent = s.title;
        $('resetBtnLabel').textContent = s.reset;
        $('pauseBtnLabel').textContent = paused ? s.resume : s.pause;
        $('lblScore').textContent = s.score;
        $('lblBest').textContent = s.best;
        $('lblLen').textContent = s.len;
        $('lblLevel').textContent = s.level;
        $('lblSpeed').textContent = s.speed;
        $('lblCombo').textContent = s.combo;
        $('lblBoost').textContent = s.boost;
        $('lblRun').textContent = s.run;
        $('hint').textContent = s.hint;
        $('boostHint').textContent = s.boostHint;
        $('endTitle').textContent = s.end;
        $('endSub').textContent = s.endSub;
        $('endRestart').textContent = s.newRound;
        $('lblFinalScore').textContent = s.score;
        $('lblFinalBest').textContent = s.best;
        $('lblFinalLevel').textContent = s.level;
      }

      function rand(n) { return Math.floor(Math.random() * n); }
      function isSnakeCell(x, y) { return snake.some(s => s.x === x && s.y === y); }
      function isObstacleCell(x, y) { return spawnedObstacles.some(o => o.x === x && o.y === y); }

      function spawnObstacles() {
        spawnedObstacles = [];
        const count = Math.min(4, Math.max(0, level - 2));
        for (let i = 0; i < count; i++) {
          let tries = 0;
          while (tries < 120) {
            const c = { x: rand(COLS), y: rand(ROWS) };
            const nearCenter = Math.abs(c.x - 10) <= 2 && Math.abs(c.y - 10) <= 2;
            if (!nearCenter && !isSnakeCell(c.x, c.y) && !isObstacleCell(c.x, c.y)) {
              spawnedObstacles.push(c);
              break;
            }
            tries++;
          }
        }
      }

      function placeFood() {
        let tries = 0;
        while (tries < 200) {
          const f = { x: rand(COLS), y: rand(ROWS), type: Math.random() < 0.18 ? 'gold' : 'normal' };
          if (!isSnakeCell(f.x, f.y) && !isObstacleCell(f.x, f.y)) { food = f; return; }
          tries++;
        }
        food = { x: 1, y: 1, type: 'normal' };
      }

      function updateHud() {
        $('score').textContent = score;
        $('best').textContent = best;
        $('len').textContent = snake.length;
        $('level').textContent = level;
        $('speedValue').textContent = `${Math.max(1, Math.round(180 / tickMs))}x`;
        $('comboValue').textContent = `x${combo}`;
        $('boostValue').textContent = boostType
          ? (lang === 'ar' ? (boostType === 'gold' ? 'ذهبي' : 'ثبات') : (boostType === 'gold' ? 'Golden' : 'Shield'))
          : '—';
        $('bestRunValue').textContent = bestRun;
        $('pauseBtnLabel').textContent = paused ? STRINGS[lang].resume : STRINGS[lang].pause;
      }

      function reset() {
        snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
        dir = { x: 1, y: 0 };
        queuedDir = dir;
        score = 0;
        alive = true;
        paused = false;
        level = 1;
        combo = 0;
        bestRun = 0;
        tickMs = 140;
        boostType = null;
        boostUntil = 0;
        boostScore = 0;
        spawnedObstacles = [];
        lastGrowAt = Date.now();
        best = parseInt(localStorage.getItem('vex.best.snake') || '0', 10);
        placeFood();
        $('endOverlay').classList.remove('show');
        clearInterval(timer);
        timer = setInterval(tick, tickMs);
        updateHud();
        draw();
      }

      function setDir(nx, ny) {
        if (!alive || paused) return;
        if (dir.x === -nx && dir.y === -ny) return;
        queuedDir = { x: nx, y: ny };
      }

      function refreshTimer() {
        clearInterval(timer);
        timer = setInterval(tick, tickMs);
        updateHud();
      }

      function tick() {
        if (!alive || paused) return;
        const now = Date.now();
        if (boostType && now > boostUntil) boostType = null;
        dir = queuedDir;
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return die('wall');
        if (isObstacleCell(head.x, head.y)) return die('obstacle');
        if (snake.some(s => s.x === head.x && s.y === head.y)) return die('self');
        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          const isGold = food.type === 'gold';
          const points = isGold ? 3 : 1;
          score += points * (combo + 1);
          combo = isGold ? combo + 2 : combo + 1;
          bestRun = Math.max(bestRun, combo);
          boostScore = points * (combo + 1);

          if (score > best) {
            best = score;
            localStorage.setItem('vex.best.snake', String(best));
          }

          if (isGold) {
            boostType = 'gold';
            boostUntil = now + 4500;
            tickMs = Math.max(70, tickMs - 10);
          }

          if (score % 6 === 0) {
            level++;
            tickMs = Math.max(68, tickMs - 8);
            spawnObstacles();
            refreshTimer();
          }

          if (typeof VexGame !== 'undefined') {
            const rect = cv.getBoundingClientRect();
            const x = rect.left + (food.x + 0.5) * (rect.width / COLS);
            const y = rect.top + (food.y + 0.5) * (rect.height / ROWS);
            VexGame.popScore(document.body, isGold ? '+3' : '+1', x, y, '');
            if (isGold && typeof VexGame.confetti === 'function') VexGame.confetti(500);
          }

          placeFood();
          lastGrowAt = now;
        } else {
          snake.pop();
          combo = 0;
        }

        updateHud();
        draw();
      }

      let bodyGrad = null, headGrad = null, foodGrad = null, goldGrad = null, wallGrad = null;
      function buildGrads() {
        bodyGrad = ctx.createLinearGradient(0, 0, 0, CELL);
        bodyGrad.addColorStop(0, '#34d57c');
        bodyGrad.addColorStop(0.5, '#1aa455');
        bodyGrad.addColorStop(1, '#0a6431');

        headGrad = ctx.createLinearGradient(0, 0, 0, CELL);
        headGrad.addColorStop(0, '#bbf7d0');
        headGrad.addColorStop(0.45, '#4ade80');
        headGrad.addColorStop(1, '#15803d');

        foodGrad = ctx.createRadialGradient(CELL * 0.35, CELL * 0.30, 1, CELL * 0.5, CELL * 0.5, CELL * 0.55);
        foodGrad.addColorStop(0, '#fff5f5');
        foodGrad.addColorStop(0.25, '#fca5a5');
        foodGrad.addColorStop(0.75, '#dc2626');
        foodGrad.addColorStop(1, '#5b0a0a');

        goldGrad = ctx.createRadialGradient(CELL * 0.35, CELL * 0.30, 1, CELL * 0.5, CELL * 0.5, CELL * 0.55);
        goldGrad.addColorStop(0, '#fffbe6');
        goldGrad.addColorStop(0.3, '#fde68a');
        goldGrad.addColorStop(0.7, '#f59e0b');
        goldGrad.addColorStop(1, '#7c2d12');

        wallGrad = ctx.createLinearGradient(0, 0, 0, CELL);
        wallGrad.addColorStop(0, 'rgba(255,255,255,0.12)');
        wallGrad.addColorStop(1, 'rgba(15,23,42,0.95)');
      }

      function drawCellFill(x, y, fill, radius, glow) {
        const px = x * CELL + 1, py = y * CELL + 1, w = CELL - 2;
        ctx.save();
        ctx.translate(px, py);
        if (glow) {
          ctx.shadowColor = glow;
          ctx.shadowBlur = 14;
        }
        ctx.fillStyle = fill;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(0, 0, w, w, radius); else ctx.rect(0, 0, w, w);
        ctx.fill();
        ctx.restore();
      }

      function draw() {
        if (!bodyGrad) buildGrads();
        ctx.fillStyle = 'rgba(4,10,6,0.65)';
        ctx.fillRect(0, 0, cv.width, cv.height);

        for (const o of spawnedObstacles) {
          drawCellFill(o.x, o.y, wallGrad, 5, 'rgba(239,68,68,0.20)');
          ctx.fillStyle = 'rgba(248,113,113,0.16)';
          ctx.fillRect(o.x * CELL + 5, o.y * CELL + 5, CELL - 10, CELL - 10);
        }

        const fx = food.x * CELL;
        const fy = food.y * CELL;
        ctx.save();
        ctx.translate(fx, fy);
        ctx.fillStyle = food.type === 'gold' ? goldGrad : foodGrad;
        ctx.shadowColor = food.type === 'gold' ? 'rgba(251,191,36,0.55)' : 'rgba(239,68,68,0.35)';
        ctx.shadowBlur = food.type === 'gold' ? 22 : 12;
        ctx.beginPath();
        ctx.arc(CELL / 2, CELL / 2, CELL * 0.42, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.beginPath();
        ctx.ellipse(CELL * 0.38, CELL * 0.30, CELL * 0.10, CELL * 0.05, -0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#15803d';
        ctx.fillRect(CELL * 0.48, CELL * 0.06, CELL * 0.05, CELL * 0.10);
        ctx.restore();

        snake.forEach((s, i) => {
          const isHead = i === 0;
          ctx.save();
          ctx.translate(s.x * CELL + 1, s.y * CELL + 1);
          ctx.fillStyle = isHead ? headGrad : bodyGrad;
          ctx.shadowColor = isHead ? 'rgba(134,239,172,0.40)' : 'rgba(34,197,94,0.18)';
          ctx.shadowBlur = isHead ? 14 : 8;
          const r = isHead ? 7 : 4;
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(0, 0, CELL - 2, CELL - 2, r); else ctx.rect(0, 0, CELL - 2, CELL - 2);
          ctx.fill();
          ctx.fillStyle = isHead ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.22)';
          ctx.fillRect(2, 1.5, CELL - 6, 2);
          ctx.fillStyle = 'rgba(0,0,0,0.30)';
          ctx.fillRect(2, CELL - 5, CELL - 6, 2);
          if (isHead) {
            ctx.fillStyle = '#0a0a0a';
            const ex = dir.x === 0 ? [CELL * 0.30, CELL * 0.70] : (dir.x > 0 ? [CELL * 0.62, CELL * 0.62] : [CELL * 0.32, CELL * 0.32]);
            const ey = dir.y === 0 ? [CELL * 0.35, CELL * 0.35] : (dir.y > 0 ? [CELL * 0.58, CELL * 0.58] : [CELL * 0.30, CELL * 0.30]);
            ctx.beginPath(); ctx.arc(ex[0], ey[0], 1.6, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex[1], ey[1], 1.6, 0, Math.PI * 2); ctx.fill();
          }
          ctx.restore();
        });
      }

      function buildSummary(resultReason) {
        const duration = Math.max(0, Math.round((Date.now() - lastGrowAt) / 1000));
        const streakBonus = Math.min(5, bestRun);
        return {
          score,
          result: 'loss',
          metadata: {
            length: snake.length,
            level,
            combo,
            bestRun,
            speed: Math.round(180 / tickMs),
            tickMs,
            foodType: food?.type || 'normal',
            boostType: boostType || null,
            boostScore,
            streakBonus,
            reason: resultReason,
            durationSeconds: duration,
            obstacles: spawnedObstacles.length,
          },
        };
      }

      function die(reason) {
        alive = false;
        clearInterval(timer);
        timer = null;
        combo = 0;
        if (score > best) {
          best = score;
          localStorage.setItem('vex.best.snake', String(best));
        }
        $('finalScore').textContent = score;
        $('finalBest').textContent = best;
        $('finalLevel').textContent = level;
        $('finalVex').textContent = `${Math.max(0, Math.floor(score / 2) + (bestRun >= 3 ? 2 : 0))} VEX`;
        setTimeout(() => $('endOverlay').classList.add('show'), 420);
        if (typeof VexGame !== 'undefined') {
          VexGame.setBest(best);
          VexGame.endSession(buildSummary(reason));
        }
      }

      function togglePause() {
        if (!alive) return;
        paused = !paused;
        updateHud();
        if (paused) {
          clearInterval(timer);
          timer = null;
          $('pauseBtn').classList.add('vex-btn-active');
        } else {
          timer = setInterval(tick, tickMs);
          $('pauseBtn').classList.remove('vex-btn-active');
        }
        draw();
      }

      document.querySelectorAll('.pad-btn[data-dir]').forEach(b => {
        b.addEventListener('click', () => {
          const d = b.dataset.dir;
          if (d === 'up') setDir(0, -1);
          if (d === 'down') setDir(0, 1);
          if (d === 'left') setDir(-1, 0);
          if (d === 'right') setDir(1, 0);
        });
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Escape') {
          e.preventDefault();
          togglePause();
          return;
        }
        if (e.key === 'ArrowUp' || e.key === 'w') setDir(0, -1);
        if (e.key === 'ArrowDown' || e.key === 's') setDir(0, 1);
        if (e.key === 'ArrowLeft' || e.key === 'a') setDir(-1, 0);
        if (e.key === 'ArrowRight' || e.key === 'd') setDir(1, 0);
      });

      let touchStart = null;
      cv.addEventListener('touchstart', (e) => {
        if (e.touches.length) touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }, { passive: true });
      cv.addEventListener('touchend', (e) => {
        if (!touchStart || !e.changedTouches.length) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStart.x, dy = t.clientY - touchStart.y;
        if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
        if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0); else setDir(0, dy > 0 ? 1 : -1);
        touchStart = null;
      }, { passive: true });

      $('resetBtn').addEventListener('click', reset);
      $('pauseBtn').addEventListener('click', togglePause);
      $('endRestart').addEventListener('click', reset);

      if (typeof VexGame !== 'undefined') {
        VexGame.boot({
          slug: 'snake',
          onReady: function (player) {
            if (player && player.language) {
              lang = player.language === 'en' ? 'en' : 'ar';
              VexGame.setLang(lang);
            }
            applyLang();
          },
        });
      }

      applyLang();
      reset();
    })();
  </script>
</body>
