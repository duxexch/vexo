<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>VEX Memory Challenge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07060f;--surface:#0f0e1a;--surface2:#161528;--border:rgba(99,102,241,.12);--pri:#6366f1;--pri-l:#818cf8;--acc:#a78bfa;--gold:#fbbf24;--ok:#22c55e;--danger:#ef4444;--tx:#e2e8f0;--txd:#94a3b8;--glow:rgba(99,102,241,.35)}
html,body{height:100%;font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;-webkit-user-select:none;user-select:none}

/* Background */
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-fx .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.18;animation:orbFloat 16s ease-in-out infinite alternate}
.bg-fx .orb:nth-child(1){width:400px;height:400px;background:#6366f1;top:-100px;right:-100px;animation-duration:14s}
.bg-fx .orb:nth-child(2){width:300px;height:300px;background:#a855f7;bottom:-80px;left:-80px;animation-duration:18s}
.bg-fx .orb:nth-child(3){width:200px;height:200px;background:#22d3ee;top:50%;left:30%;animation-duration:20s;opacity:.1}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.1)}100%{transform:translate(-20px,20px) scale(.92)}}

/* Layout */
.app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px}

/* Header */
.header{text-align:center;margin-bottom:16px}
.logo{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#6366f1,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.subtitle{font-size:.8rem;color:var(--txd)}

/* Stats */
.stats{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.stat{background:rgba(99,102,241,.06);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;min-width:65px}
.stat .val{font-size:1.1rem;font-weight:800;color:var(--gold)}
.stat .lbl{font-size:.65rem;color:var(--txd);margin-top:2px}

/* Pads */
.pad-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(75vw,340px);aspect-ratio:1;margin-bottom:20px}
.pad{border-radius:18px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;border:2px solid rgba(255,255,255,.05)}
.pad::after{content:'';position:absolute;inset:0;border-radius:16px;opacity:0;transition:opacity .12s}
.pad.lit::after{opacity:1}
.pad[data-disabled="true"]{cursor:not-allowed;filter:brightness(.4)}

/* Pad colors — custom VEX palette */
.pad-0{background:linear-gradient(135deg,#6366f1,#4338ca);box-shadow:0 6px 30px rgba(99,102,241,.25)}
.pad-0::after{background:radial-gradient(circle at center,rgba(165,180,252,.7),transparent 70%)}
.pad-0.lit{box-shadow:0 6px 50px rgba(99,102,241,.55);transform:scale(1.04)}

.pad-1{background:linear-gradient(135deg,#22d3ee,#0891b2);box-shadow:0 6px 30px rgba(34,211,238,.2)}
.pad-1::after{background:radial-gradient(circle at center,rgba(165,243,252,.7),transparent 70%)}
.pad-1.lit{box-shadow:0 6px 50px rgba(34,211,238,.5);transform:scale(1.04)}

.pad-2{background:linear-gradient(135deg,#a855f7,#7c3aed);box-shadow:0 6px 30px rgba(168,85,247,.2)}
.pad-2::after{background:radial-gradient(circle at center,rgba(216,180,254,.7),transparent 70%)}
.pad-2.lit{box-shadow:0 6px 50px rgba(168,85,247,.5);transform:scale(1.04)}

.pad-3{background:linear-gradient(135deg,#fbbf24,#d97706);box-shadow:0 6px 30px rgba(251,191,36,.2)}
.pad-3::after{background:radial-gradient(circle at center,rgba(253,230,138,.7),transparent 70%)}
.pad-3.lit{box-shadow:0 6px 50px rgba(251,191,36,.5);transform:scale(1.04)}

/* Controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.btn{padding:10px 18px;border:1px solid rgba(99,102,241,.2);border-radius:12px;background:rgba(99,102,241,.08);color:var(--tx);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover{background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.35)}
.btn:active{transform:scale(.96)}
.btn-pri{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;box-shadow:0 3px 15px var(--glow)}
.btn-pri:hover{box-shadow:0 5px 25px var(--glow);transform:translateY(-1px)}

/* Toggles */
.toggle-row{display:flex;gap:14px;margin-bottom:12px}
.toggle{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--txd);cursor:pointer}
.toggle input{accent-color:var(--pri)}

/* Lives */
.lives{display:flex;gap:4px;margin-bottom:12px;justify-content:center}
.heart{font-size:1.2rem;transition:transform .3s,opacity .3s}
.heart.lost{opacity:.2;transform:scale(.8)}

/* Level indicator */
.level-bar{width:min(75vw,340px);height:6px;background:var(--surface2);border-radius:99px;margin-bottom:12px;overflow:hidden}
.level-fill{height:100%;background:linear-gradient(to left,#6366f1,#22d3ee);border-radius:99px;transition:width .4s ease}

/* Message */
.msg{text-align:center;font-size:.9rem;color:var(--txd);min-height:1.4em;margin-bottom:8px;transition:color .2s}
.msg.error{color:var(--danger)}
.msg.success{color:var(--ok)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(7,6,15,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:100}
.overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:min(90vw,380px);text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal h2{font-size:1.5rem;margin-bottom:8px;background:linear-gradient(135deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal p{color:var(--txd);margin-bottom:16px}
.modal .result{display:flex;justify-content:center;gap:20px;margin:16px 0}
.modal .result div{text-align:center}
.modal .result .r-val{font-size:1.5rem;font-weight:800;color:var(--gold)}
.modal .result .r-lbl{font-size:.7rem;color:var(--txd);margin-top:2px}

/* Speed selector */
.speed-sel{display:flex;gap:6px;justify-content:center;margin-bottom:10px}
.speed-btn{padding:5px 10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--txd);font-size:.72rem;cursor:pointer;font-family:inherit;transition:all .2s}
.speed-btn.active{background:rgba(99,102,241,.15);border-color:var(--pri);color:var(--tx)}

@media(max-width:450px){
  .pad-grid{width:85vw;gap:8px}
  .stats{gap:6px}.stat{padding:5px 10px;min-width:55px}
  .controls{gap:5px}.btn{padding:8px 12px;font-size:.75rem}
}
</style>
</head>
<body>
<div class="bg-fx"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<div class="app">
  <div class="header">
    <div class="logo">VEX Memory</div>
    <div class="subtitle">تذكّر التسلسل — اختبر ذاكرتك</div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="val" id="levelVal">1</div><div class="lbl">المستوى</div></div>
    <div class="stat"><div class="val" id="scoreVal">0</div><div class="lbl">النقاط</div></div>
    <div class="stat"><div class="val" id="bestVal">0</div><div class="lbl">أفضل</div></div>
    <div class="stat"><div class="val" id="seqVal">0</div><div class="lbl">تسلسل</div></div>
    <div class="stat"><div class="val" id="hintsVal">3</div><div class="lbl">تلميحات</div></div>
  </div>

  <!-- Lives -->
  <div class="lives" id="livesRow"></div>

  <!-- Level progress -->
  <div class="level-bar"><div class="level-fill" id="levelFill" style="width:0%"></div></div>

  <!-- Message -->
  <div class="msg" id="msg">اضغط ابدأ للعب</div>

  <!-- Pads -->
  <div class="pad-grid" id="padGrid">
    <div class="pad pad-0" data-idx="0" data-disabled="true"></div>
    <div class="pad pad-1" data-idx="1" data-disabled="true"></div>
    <div class="pad pad-2" data-idx="2" data-disabled="true"></div>
    <div class="pad pad-3" data-idx="3" data-disabled="true"></div>
  </div>

  <!-- Speed selector -->
  <div class="speed-sel">
    <button class="speed-btn" data-spd="600">سريع</button>
    <button class="speed-btn active" data-spd="400">عادي</button>
    <button class="speed-btn" data-spd="250">صاروخ</button>
  </div>

  <!-- Toggles -->
  <div class="toggle-row">
    <label class="toggle"><input type="checkbox" id="strictChk"> الوضع الصارم</label>
    <label class="toggle"><input type="checkbox" id="soundChk" checked> صوت</label>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-pri" id="btnStart">▶ ابدأ</button>
    <button class="btn" id="btnHint">💡 تلميح</button>
    <button class="btn" id="btnReplay">🔁 إعادة</button>
  </div>
</div>

<!-- Game Over Modal -->
<div class="overlay" id="overOverlay">
  <div class="modal">
    <h2 id="overTitle">انتهت اللعبة</h2>
    <p id="overSub">حاول مرة أخرى</p>
    <div class="result">
      <div><div class="r-val" id="oLevel">0</div><div class="r-lbl">المستوى</div></div>
      <div><div class="r-val" id="oScore">0</div><div class="r-lbl">النقاط</div></div>
      <div><div class="r-val" id="oSeq">0</div><div class="r-lbl">تسلسل</div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-pri" id="oRestart">🔄 من جديد</button>
      <button class="btn" id="oShare">مشاركة</button>
    </div>
  </div>
</div>

<script>
(()=>{
'use strict';

// ═══ STATE ═══
const G={
  seq:[],userIdx:0,level:1,score:0,best:0,
  lives:3,maxLives:3,hints:3,maxHints:3,
  strict:false,soundOn:true,
  playing:false,inputLocked:true,
  speed:400,
  longestSeq:0
};

// ═══ DOM ═══
const $=id=>document.getElementById(id);
const pads=[...document.querySelectorAll('.pad')];
const padGrid=$('padGrid');

// ═══ AUDIO ═══
let actx=null;
const TONES=[329.6,392.0,523.3,659.3]; // E4, G4, C5, E5
function initAudio(){if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)}catch{}}
function playTone(idx,dur=180){
  if(!G.soundOn||!actx)return;
  if(actx.state==='suspended')actx.resume();
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.value=TONES[idx];g.gain.value=.08;
  o.connect(g);g.connect(actx.destination);o.start();
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur/1000);
  setTimeout(()=>{o.stop();o.disconnect();g.disconnect()},dur+20);
}
function playError(){
  if(!G.soundOn||!actx)return;
  if(actx.state==='suspended')actx.resume();
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sawtooth';o.frequency.value=120;g.gain.value=.06;
  o.connect(g);g.connect(actx.destination);o.start();
  setTimeout(()=>{o.stop();o.disconnect();g.disconnect()},250);
}

// ═══ UI UPDATE ═══
function updUI(){
  $('levelVal').textContent=G.level;
  $('scoreVal').textContent=G.score;
  $('bestVal').textContent=G.best;
  $('seqVal').textContent=G.longestSeq;
  $('hintsVal').textContent=G.hints;
  $('levelFill').style.width=Math.min(100,(G.level/20)*100)+'%';
  renderLives();
}
function renderLives(){
  const row=$('livesRow');row.innerHTML='';
  for(let i=0;i<G.maxLives;i++){
    const s=document.createElement('span');s.className='heart'+(i>=G.lives?' lost':'');
    s.textContent='❤️';row.appendChild(s);
  }
}
function setMsg(txt,cls=''){
  const el=$('msg');el.textContent=txt;el.className='msg'+(cls?' '+cls:'');
}
function loadBest(){try{G.best=+(localStorage.getItem('vex-mem-best')||0)}catch{}}
function saveBest(){try{localStorage.setItem('vex-mem-best',String(G.best))}catch{}}

// ═══ PAD FLASH ═══
function flashPad(idx,dur=300){
  return new Promise(res=>{
    pads[idx].classList.add('lit');
    playTone(idx,dur*.8);
    setTimeout(()=>{pads[idx].classList.remove('lit');setTimeout(res,80)},dur);
  });
}
function errorFlash(){
  pads.forEach(p=>{p.style.border='2px solid var(--danger)';p.style.filter='brightness(.6)'});
  playError();
  setTimeout(()=>{pads.forEach(p=>{p.style.border='';p.style.filter=''})},400);
}

// ═══ SEQUENCE ═══
function addToSeq(){G.seq.push(Math.floor(Math.random()*4))}

async function playSeq(){
  G.inputLocked=true;
  setPadsDisabled(true);
  setMsg('شاهد التسلسل...');
  await sleep(400);
  for(let i=0;i<G.seq.length;i++){
    await flashPad(G.seq[i],G.speed);
  }
  G.inputLocked=false;
  setPadsDisabled(false);
  G.userIdx=0;
  setMsg('دورك — أعد التسلسل');
}

function setPadsDisabled(v){pads.forEach(p=>p.dataset.disabled=v?'true':'false')}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ═══ INPUT HANDLING ═══
function onPadClick(idx){
  if(G.inputLocked||!G.playing)return;
  initAudio();
  flashPad(idx,200);

  if(G.seq[G.userIdx]===idx){
    // Correct
    G.userIdx++;
    G.score+=10*G.level;
    G.longestSeq=Math.max(G.longestSeq,G.userIdx);
    updUI();

    if(G.userIdx===G.seq.length){
      // Round complete
      G.inputLocked=true;
      setPadsDisabled(true);
      G.level++;
      G.score+=50*G.level;
      if(G.score>G.best){G.best=G.score;saveBest()}
      updUI();
      setMsg('🎉 أحسنت! المستوى '+G.level,'success');
      setTimeout(()=>{addToSeq();playSeq()},900);
    }
  } else {
    // Wrong
    G.inputLocked=true;
    setPadsDisabled(true);
    errorFlash();

    if(G.strict){
      setMsg('❌ خطأ — الوضع الصارم!','error');
      setTimeout(gameOver,600);
      return;
    }

    G.lives--;
    updUI();

    if(G.lives<=0){
      setMsg('💔 نفدت المحاولات!','error');
      setTimeout(gameOver,600);
    }else{
      setMsg(`❌ خطأ — ${G.lives} محاولات متبقية`,'error');
      setTimeout(()=>{G.userIdx=0;playSeq()},800);
    }
  }
}

// ═══ GAME FLOW ═══
function startGame(){
  G.seq=[];G.level=1;G.score=0;G.userIdx=0;
  G.lives=G.maxLives;G.hints=G.maxHints;
  G.longestSeq=0;G.playing=true;
  loadBest();
  addToSeq();
  updUI();
  playSeq();
}

function gameOver(){
  G.playing=false;G.inputLocked=true;
  setPadsDisabled(true);
  if(G.score>G.best){G.best=G.score;saveBest()}
  $('oLevel').textContent=G.level;
  $('oScore').textContent=G.score;
  $('oSeq').textContent=G.longestSeq;
  if(G.level>=10){
    $('overTitle').textContent='🏆 رائع!';
    $('overSub').textContent='وصلت لمستوى متقدم — أداء ممتاز';
  }else{
    $('overTitle').textContent='انتهت اللعبة';
    $('overSub').textContent='حاول مرة أخرى — يمكنك التحسن';
  }
  $('overOverlay').classList.add('show');
}

function replaySeq(){
  if(!G.playing||G.inputLocked)return;
  G.score=Math.max(0,G.score-20);updUI();
  playSeq();
}

function useHint(){
  if(!G.playing||G.inputLocked||G.hints<=0)return;
  G.hints--;G.score=Math.max(0,G.score-30);
  updUI();
  const nextIdx=G.seq[G.userIdx];
  if(nextIdx!==undefined)flashPad(nextIdx,350);
}

// ═══ EVENTS ═══
pads.forEach(p=>{
  p.addEventListener('click',()=>onPadClick(+p.dataset.idx));
  p.addEventListener('touchstart',e=>{e.preventDefault();onPadClick(+p.dataset.idx)},{passive:false});
});

$('btnStart').onclick=()=>{initAudio();startGame()};
$('btnHint').onclick=useHint;
$('btnReplay').onclick=replaySeq;
$('oRestart').onclick=()=>{$('overOverlay').classList.remove('show');startGame()};
$('oShare').onclick=async()=>{
  const txt=`وصلت للمستوى ${G.level} بـ ${G.score} نقطة في VEX Memory! 🧠`;
  if(navigator.share)try{await navigator.share({text:txt,title:'VEX Memory'})}catch{}
  else try{await navigator.clipboard.writeText(txt);alert('تم النسخ!')}catch{alert(txt)}
};

$('strictChk').onchange=e=>G.strict=e.target.checked;
$('soundChk').onchange=e=>G.soundOn=e.target.checked;

document.querySelectorAll('.speed-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.speed-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    G.speed=+b.dataset.spd;
  };
});

// Keyboard: 1-4 for pads
window.addEventListener('keydown',e=>{
  const k=+e.key;
  if(k>=1&&k<=4)onPadClick(k-1);
  if(e.key==='r'||e.key==='R')replaySeq();
});

// ═══ INIT ═══
loadBest();updUI();
})();
</script>
</body>
</html>
