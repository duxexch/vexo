<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#070b14">
  <title>VEX Aim Trainer</title>
  <link rel="stylesheet" href="/games/_shared/vex-game.css">
  <style>
    .at-arena {
      width: 100%;
      max-width: 380px;
      margin: 0 auto;
      aspect-ratio: 3 / 4;
      background:
        radial-gradient(circle at center, rgba(239, 68, 68, 0.1) 0%, rgba(7, 11, 20, 0) 50%),
        radial-gradient(ellipse 100% 100% at 50% 50%, rgba(7, 11, 20, 1) 60%, rgba(0, 0, 0, 1) 100%);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 -2px 0 rgba(0, 0, 0, 0.55),
        inset 0 0 80px rgba(0, 0, 0, 0.7),
        0 14px 28px -10px rgba(0, 0, 0, 0.7);
      cursor: crosshair;
      user-select: none;
    }

    .at-arena::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        linear-gradient(transparent 49.7%, rgba(239, 68, 68, 0.18) 49.7% 50.3%, transparent 50.3%),
        linear-gradient(90deg, transparent 49.7%, rgba(239, 68, 68, 0.18) 49.7% 50.3%, transparent 50.3%);
      mask-image: radial-gradient(circle at center, transparent 8%, #000 12%, #000 80%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle at center, transparent 8%, #000 12%, #000 80%, transparent 100%);
    }

    .at-arena::after {
      content: "";
      position: absolute;
      inset: 12px;
      pointer-events: none;
      z-index: 1;
      border-radius: 12px;
      background:
        linear-gradient(135deg, #ef4444 0 14px, transparent 14px) top left/22px 22px no-repeat,
        linear-gradient(225deg, #ef4444 0 14px, transparent 14px) top right/22px 22px no-repeat,
        linear-gradient(45deg, #ef4444 0 14px, transparent 14px) bottom left/22px 22px no-repeat,
        linear-gradient(315deg, #ef4444 0 14px, transparent 14px) bottom right/22px 22px no-repeat;
      opacity: 0.35;
    }

    .at-target {
      position: absolute;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #fff 0%, #fca5a5 18%, #dc2626 55%, #7f1d1d 80%, #2a0606 100%);
      box-shadow:
        0 0 22px rgba(239, 68, 68, 0.65),
        inset 0 -6px 12px rgba(0, 0, 0, 0.5),
        inset 0 4px 8px rgba(255, 255, 255, 0.18);
      cursor: pointer;
      animation: at-pop 0.18s ease-out;
      transform: translate(-50%, -50%);
      border: 2px solid #fee2e2;
      z-index: 2;
    }

    .at-target::before {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.55);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.4);
    }

    .at-target::after {
      content: "";
      position: absolute;
      inset: 38%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff 0%, #fde68a 60%, #b07406 100%);
      box-shadow: 0 0 8px rgba(255, 182, 39, 0.55), inset 0 -1px 2px rgba(0, 0, 0, 0.4);
    }

    @keyframes at-pop {
      0% {
        transform: translate(-50%, -50%) scale(0) rotate(-30deg);
      }

      70% {
        transform: translate(-50%, -50%) scale(1.18) rotate(0deg);
      }

      100% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
    }

    .at-target.hit {
      animation: at-hit 0.28s ease-out forwards;
      pointer-events: none;
    }

    @keyframes at-hit {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.35);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, -50%) scale(1.8);
        opacity: 0;
      }
    }

    .at-miss-fx {
      position: absolute;
      width: 36px;
      height: 36px;
      border: 2px solid #ef4444;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: at-miss 0.45s ease-out forwards;
      z-index: 2;
    }

    @keyframes at-miss {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.5);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(2.4);
      }
    }

    .at-time-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: rgba(0, 0, 0, 0.5);
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.05);
      z-index: 3;
    }

    .at-time-fill {
      height: 100%;
      background: linear-gradient(to right, #22c55e, #fde68a, #ef4444);
      box-shadow: 0 0 8px rgba(255, 182, 39, 0.5);
      transition: width 0.1s linear;
    }

    .at-start-curtain {
      position: absolute;
      inset: 0;
      background: rgba(7, 11, 20, 0.94);
      backdrop-filter: blur(6px);
      display: grid;
      place-items: center;
      z-index: 5;
      transition: opacity 0.25s ease;
    }

    .at-start-curtain.hide {
      opacity: 0;
      pointer-events: none;
    }

    .at-start-text {
      text-align: center;
      padding: 16px;
    }

    .at-start-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.6rem;
      color: #ef4444;
      text-shadow: 0 0 16px rgba(239, 68, 68, 0.55);
      letter-spacing: 0.06em;
    }

    .at-start-sub {
      font-size: 0.9rem;
      color: var(--vex-text-dim);
      margin-top: 8px;
    }

    .at-mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .at-mode-btn {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      cursor: pointer;
      text-align: start;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .at-mode-btn strong {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 3px;
    }

    .at-mode-btn span {
      font-size: 0.78rem;
      color: var(--vex-text-dim);
    }

    .at-mode-btn.active {
      border-color: rgba(239, 68, 68, 0.55);
      background: rgba(239, 68, 68, 0.12);
      box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.15) inset;
    }

    .at-start-btn {
      margin-top: 14px;
      padding: 14px 30px;
      background: linear-gradient(180deg, #f87171 0%, #b91c1c 100%);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -2px 0 rgba(0, 0, 0, 0.4),
        0 5px 0 #4a0a0a,
        0 8px 18px -3px rgba(239, 68, 68, 0.55);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }

    .at-start-btn:active {
      transform: translateY(4px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        inset 0 -1px 0 rgba(0, 0, 0, 0.35),
        0 1px 0 #4a0a0a,
        0 2px 6px rgba(239, 68, 68, 0.45);
    }

    .at-live-pill {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 0.78rem;
    }
  </style>
</head>

<body class="vex-game">
  <div class="vex-shell">
    <div class="vex-header">
      <div class="vex-title">
        <div class="vex-title-badge rose">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <circle cx="12" cy="12" r="6"></circle>
            <circle cx="12" cy="12" r="2"></circle>
          </svg>
        </div>
        <span id="title">مدرّب التصويب</span>
      </div>
      <button class="vex-btn" id="resetBtn"><span id="resetBtnLabel">إعادة</span></button>
    </div>

    <div class="vex-stats">
      <div class="vex-stat">
        <div class="vex-stat-label" id="lblHits">إصابات</div>
        <div class="vex-stat-value rose" id="hits">0</div>
      </div>
      <div class="vex-stat">
        <div class="vex-stat-label" id="lblAcc">دقة</div>
        <div class="vex-stat-value" id="acc">100%</div>
      </div>
      <div class="vex-stat">
        <div class="vex-stat-label" id="lblTime">الوقت</div>
        <div class="vex-stat-value emerald" id="time">30</div>
      </div>
    </div>

    <div class="at-arena" id="arena">
      <div class="at-time-bar">
        <div class="at-time-fill" id="timeFill" style="width:100%"></div>
      </div>
      <div class="at-start-curtain" id="curtain">
        <div class="at-start-text">
          <div class="at-start-title" id="curtainTitle">جاهز؟</div>
          <div class="at-start-sub" id="curtainSub">30 ثانية، أكبر عدد من الإصابات</div>
          <div class="at-mode-row">
            <button class="at-mode-btn active" id="modeSpeed" type="button">
              <strong id="speedTitle">Speed Run</strong>
              <span id="speedDesc">اجمع أكبر عدد بأسرع إيقاع</span>
            </button>
            <button class="at-mode-btn" id="modeDuel" type="button">
              <strong id="duelTitle">Async Duel</strong>
              <span id="duelDesc">نافس أعلى نتيجة محفوظة</span>
            </button>
          </div>
          <div class="at-live-pill" id="livePill">🎯 VEX Rewards enabled</div>
          <button class="at-start-btn" id="curtainBtn">ابدأ</button>
        </div>
      </div>
    </div>

    <div class="vex-hint" id="hint">اضغط على الأهداف بأسرع وأدق ما يمكن. النقر خارج الهدف يعدّ خطأً.</div>
  </div>

  <div class="vex-overlay" id="endOverlay">
    <div class="vex-overlay-card">
      <div class="vex-overlay-icon rose">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <div class="vex-overlay-title" id="endTitle">انتهى الوقت!</div>
      <div class="vex-overlay-subtitle" id="endSub"></div>
      <div class="vex-overlay-stats">
        <div class="vex-overlay-stat">
          <div class="vex-overlay-stat-label" id="lblFinalHits">إصابات</div>
          <div class="vex-overlay-stat-value" id="finalHits">0</div>
        </div>
        <div class="vex-overlay-stat">
          <div class="vex-overlay-stat-label" id="lblFinalAcc">دقة</div>
          <div class="vex-overlay-stat-value" id="finalAcc">0%</div>
        </div>
      </div>
      <div class="vex-btn-row">
        <button class="vex-btn vex-btn-primary" id="endRestart"
          style="flex:1;background:linear-gradient(135deg,#ef4444,#7f1d1d);box-shadow:0 0 18px -3px #ef4444;">جولة
          جديدة</button>
      </div>
    </div>
  </div>

  <script src="/games/vex-sdk.js"></script>
  <script src="/games/_shared/vex-game.js"></script>
  <script>
    (function () {
      'use strict';

      const STRINGS = {
        ar: {
          title: 'مدرّب التصويب',
          reset: 'إعادة',
          hits: 'إصابات',
          acc: 'دقة',
          time: 'الوقت',
          ready: 'جاهز؟',
          readySub: '30 ثانية، أكبر عدد من الإصابات',
          start: 'ابدأ',
          end: 'انتهى الوقت!',
          endSub: 'أداء رائع!',
          newRound: 'جولة جديدة',
          speedTitle: 'Speed Run',
          speedDesc: 'اجمع أكبر عدد بأسرع إيقاع',
          duelTitle: 'مبارزة غير متزامنة',
          duelDesc: 'نافس أعلى نتيجة محفوظة',
          livePill: '🎯 مكافآت VEX مفعلة',
          hint: 'اضغط على الأهداف بأسرع وأدق ما يمكن. النقر خارج الهدف يعدّ خطأً.',
        },
        en: {
          title: 'Aim Trainer',
          reset: 'Reset',
          hits: 'Hits',
          acc: 'Acc',
          time: 'Time',
          ready: 'Ready?',
          readySub: '30 seconds, hit as many as you can',
          start: 'Start',
          end: 'Time up!',
          endSub: 'Great run!',
          newRound: 'New round',
          speedTitle: 'Speed Run',
          speedDesc: 'Rack up the most hits fast',
          duelTitle: 'Async Duel',
          duelDesc: 'Compete against the saved best score',
          livePill: '🎯 VEX rewards enabled',
          hint: 'Tap targets fast and accurately. Clicking outside counts as a miss.',
        },
      };

      let lang = 'ar';
      const $ = (id) => document.getElementById(id);
      const arena = $('arena');
      const ROUND_MS = 30000;
      let active;
      let hits;
      let misses;
      let target;
      let targetTimer;
      let endTime;
      let tickRaf;
      let best;
      let mode = 'speed';
      let combo;
      let comboMax;
      let reactionSum;
      let reactionCount;
      let scoreSubmitted;
      let targetSpawnAt;

      function applyLang() {
        const s = STRINGS[lang];
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        $('title').textContent = s.title;
        $('resetBtnLabel').textContent = s.reset;
        $('lblHits').textContent = s.hits;
        $('lblAcc').textContent = s.acc;
        $('lblTime').textContent = s.time;
        $('curtainTitle').textContent = s.ready;
        $('curtainSub').textContent = s.readySub;
        $('curtainBtn').textContent = s.start;
        $('hint').textContent = s.hint;
        $('endTitle').textContent = s.end;
        $('endSub').textContent = s.endSub;
        $('endRestart').textContent = s.newRound;
        $('lblFinalHits').textContent = s.hits;
        $('lblFinalAcc').textContent = s.acc;
        $('speedTitle').textContent = s.speedTitle;
        $('speedDesc').textContent = s.speedDesc;
        $('duelTitle').textContent = s.duelTitle;
        $('duelDesc').textContent = s.duelDesc;
        $('livePill').textContent = s.livePill;
      }

      function reset() {
        active = false;
        hits = 0;
        misses = 0;
        combo = 0;
        comboMax = 0;
        reactionSum = 0;
        reactionCount = 0;
        scoreSubmitted = false;
        if (targetTimer) {
          clearTimeout(targetTimer);
          targetTimer = null;
        }
        if (tickRaf) {
          cancelAnimationFrame(tickRaf);
          tickRaf = null;
        }
        arena.querySelectorAll('.at-target, .at-miss-fx').forEach((n) => n.remove());
        target = null;
        $('hits').textContent = '0';
        $('acc').textContent = '100%';
        $('time').textContent = '30';
        $('timeFill').style.width = '100%';
        $('curtain').classList.remove('hide');
        $('endOverlay').classList.remove('show');
        best = parseInt(localStorage.getItem('vex.best.aim-trainer') || '0', 10);
      }

      function start() {
        reset();
        $('curtain').classList.add('hide');
        active = true;
        endTime = performance.now() + ROUND_MS;
        spawnTarget();
        tickRaf = requestAnimationFrame(tick);
      }

      function tick() {
        if (!active) return;
        const remain = Math.max(0, endTime - performance.now());
        const sec = Math.ceil(remain / 1000);
        $('time').textContent = sec;
        $('timeFill').style.width = `${(remain / ROUND_MS) * 100}%`;
        if (remain <= 0) {
          end();
          return;
        }
        tickRaf = requestAnimationFrame(tick);
      }

      function spawnTarget() {
        if (!active) return;
        if (target && target.parentNode) target.parentNode.removeChild(target);
        const rect = arena.getBoundingClientRect();
        const elapsed = ROUND_MS - (endTime - performance.now());
        const t = Math.max(0, Math.min(1, elapsed / ROUND_MS));
        const size = Math.round(70 - t * 32);
        const padX = size / 2 + 6;
        const padY = size / 2 + 6;
        const cx = padX + Math.random() * (rect.width - 2 * padX);
        const cy = padY + Math.random() * (rect.height - 2 * padY);
        const el = document.createElement('div');
        el.className = 'at-target';
        el.style.width = `${size}px`;
        el.style.height = `${size}px`;
        el.style.left = `${cx}px`;
        el.style.top = `${cy}px`;
        targetSpawnAt = performance.now();

        el.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!active) return;
          hits++;
          combo++;
          comboMax = Math.max(comboMax, combo);
          reactionSum += Math.max(0, performance.now() - targetSpawnAt);
          reactionCount++;
          $('hits').textContent = String(hits);
          $('acc').textContent = `${Math.round((hits / Math.max(1, hits + misses)) * 100)}%`;
          el.classList.add('hit');
          if (typeof VexGame !== 'undefined') {
            VexGame.popScore(arena, combo >= 5 ? `x${combo}` : '+1', `${cx}px`, `${cy}px`, combo >= 5 ? 'gold' : 'rose');
          }
          setTimeout(spawnTarget, 60);
        });

        arena.appendChild(el);
        target = el;

        if (targetTimer) clearTimeout(targetTimer);
        targetTimer = setTimeout(() => {
          if (active && el.parentNode) {
            misses++;
            combo = 0;
            $('acc').textContent = `${Math.round((hits / Math.max(1, hits + misses)) * 100)}%`;
            el.parentNode.removeChild(el);
            spawnTarget();
          }
        }, Math.max(700, 1500 - t * 700));
      }

      arena.addEventListener('click', (e) => {
        if (!active) return;
        if (e.target === arena || e.target.classList.contains('at-time-bar') || e.target.classList.contains('at-time-fill')) {
          combo = 0;
          misses++;
          $('acc').textContent = `${Math.round((hits / Math.max(1, hits + misses)) * 100)}%`;
          const rect = arena.getBoundingClientRect();
          const fx = document.createElement('div');
          fx.className = 'at-miss-fx';
          fx.style.left = `${e.clientX - rect.left}px`;
          fx.style.top = `${e.clientY - rect.top}px`;
          arena.appendChild(fx);
          setTimeout(() => fx.remove(), 400);
        }
      });

      function end() {
        if (scoreSubmitted) return;
        scoreSubmitted = true;
        active = false;
        if (targetTimer) {
          clearTimeout(targetTimer);
          targetTimer = null;
        }
        if (tickRaf) {
          cancelAnimationFrame(tickRaf);
          tickRaf = null;
        }
        if (target && target.parentNode) target.parentNode.removeChild(target);

        const accPct = hits + misses > 0 ? Math.round((hits / (hits + misses)) * 100) : 0;
        const avgReaction = reactionCount > 0 ? Math.round(reactionSum / reactionCount) : 0;
        const pace = hits > 0 ? Math.max(1, Math.round((hits * 1000) / ROUND_MS)) : 0;
        const baseScore = hits * 10 + Math.max(0, 100 - avgReaction) + comboMax * 6 + Math.round(accPct * 0.5);
        const duelBonus = mode === 'duel' ? Math.max(0, best - hits) * 2 : 0;
        const finalScore = Math.max(hits, Math.round(baseScore + duelBonus));

        if (hits > best) {
          best = hits;
          localStorage.setItem('vex.best.aim-trainer', String(best));
        }

        $('finalHits').textContent = String(hits);
        $('finalAcc').textContent = `${accPct}%`;
        $('endSub').textContent = mode === 'duel'
          ? (lang === 'ar' ? 'وضع المبارزة: النتيجة تُقاس مع أفضل رقم محفوظ' : 'Duel mode: compared against your saved best')
          : (lang === 'ar' ? 'سرعة + دقة + سلسلة إصابات' : 'Speed + accuracy + hit streaks');

        setTimeout(() => $('endOverlay').classList.add('show'), 400);

        if (typeof VexGame !== 'undefined') {
          if (hits >= 20) VexGame.confetti(800);
          if (typeof VexGame.setBest === 'function') VexGame.setBest(best);
          VexGame.endSession({
            score: finalScore,
            result: hits > 0 ? 'win' : 'loss',
            metadata: {
              hits,
              misses,
              acc: accPct,
              avgReactionMs: avgReaction,
              comboMax,
              pace,
              mode,
              duelBonus,
              baseScore,
              bestScore: best,
            },
          });
        }
      }

      $('curtainBtn').addEventListener('click', start);
      $('resetBtn').addEventListener('click', reset);
      $('endRestart').addEventListener('click', start);
      $('modeSpeed').addEventListener('click', () => {
        mode = 'speed';
        $('modeSpeed').classList.add('active');
        $('modeDuel').classList.remove('active');
      });
      $('modeDuel').addEventListener('click', () => {
        mode = 'duel';
        $('modeDuel').classList.add('active');
        $('modeSpeed').classList.remove('active');
      });

      if (typeof VexGame !== 'undefined') {
        VexGame.boot({
          slug: 'aim-trainer',
          onReady: function (player) {
            if (player && player.language) {
              lang = player.language === 'en' ? 'en' : 'ar';
              VexGame.setLang(lang);
            }
            applyLang();
          },
        });
      }

      applyLang();
      reset();
    })();
  </script>
</body>

</html>
