<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1e88ff"/><stop offset="1" stop-color="#0a4d9c"/></linearGradient>
    <linearGradient id="player" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffb627"/><stop offset="1" stop-color="#a86b00"/></linearGradient>
    <linearGradient id="obs" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ef4444"/><stop offset="1" stop-color="#7f1d1d"/></linearGradient>
  </defs>
  <rect x="0" y="0" width="200" height="200" rx="32" fill="#0a1020"/>
  <!-- stars -->
  <g fill="white" opacity="0.6">
    <circle cx="30" cy="30" r="1.5"/><circle cx="70" cy="20" r="1"/><circle cx="120" cy="35" r="1.5"/>
    <circle cx="160" cy="22" r="1"/><circle cx="50" cy="60" r="1"/><circle cx="170" cy="60" r="1.5"/>
  </g>
  <!-- mountains -->
  <polygon points="0,140 40,90 80,140" fill="#1e293b"/>
  <polygon points="60,140 110,80 160,140" fill="#1e293b"/>
  <polygon points="140,140 180,100 200,140" fill="#1e293b"/>
  <!-- ground -->
  <rect x="0" y="140" width="200" height="60" fill="url(#ground)"/>
  <!-- player jumping -->
  <rect x="50" y="80" width="38" height="50" rx="6" fill="url(#player)" filter="drop-shadow(0 4px 8px rgba(0,0,0,0.5))"/>
  <rect x="56" y="92" width="26" height="10" fill="#0a1020" rx="2"/>
  <!-- obstacle -->
  <rect x="130" y="105" width="32" height="35" fill="url(#obs)" rx="3"/>
</svg>
