<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b14">
<title>VEX Air Hockey</title>
<link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>
  .ah-arena {
    width: 100%; max-width: 360px; margin: 0 auto;
    aspect-ratio: 3/4;
    background:
      radial-gradient(ellipse 80% 25% at 50% 0%, rgba(239,68,68,0.18), transparent 60%),
      radial-gradient(ellipse 80% 25% at 50% 100%, rgba(34,197,94,0.18), transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 50%, rgba(255,255,255,0.06), transparent 70%),
      linear-gradient(180deg,#0e3a72 0%,#04173a 100%);
    border: 1px solid rgba(30,136,255,0.45);
    border-radius: 18px;
    position: relative; overflow: hidden;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -2px 0 rgba(0,0,0,0.55),
      inset 0 0 30px rgba(30,136,255,0.20),
      0 14px 28px -10px rgba(0,0,0,0.7);
    touch-action: none;
  }
  /* ice-rink scratches (sweeping shimmer) */
  .ah-arena::before {
    content:""; position:absolute; inset:-8% -8%; pointer-events:none; z-index:0;
    background: linear-gradient(115deg, transparent 35%, rgba(255,255,255,0.07) 50%, transparent 65%);
    animation: vexBeamSweep 7s ease-in-out infinite;
    will-change: transform, opacity;
  }
  /* faint grid */
  .ah-arena::after {
    content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse 80% 90% at 50% 50%, #000 0%, transparent 95%);
    -webkit-mask-image: radial-gradient(ellipse 80% 90% at 50% 50%, #000 0%, transparent 95%);
  }
  .ah-canvas { position:relative; z-index:1; width:100%; height:100%; display:block; }
  .ah-mode-row {
    display: flex; gap: 10px; justify-content: center; margin-bottom: 14px;
  }
  .ah-mode-btn {
    flex: 1; max-width: 140px; padding: 11px;
    background: linear-gradient(180deg, #1a2540 0%, #0a1224 100%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    color: var(--vex-text-dim); font-family: inherit;
    font-size: 0.92rem; font-weight: 700; letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -2px 0 rgba(0,0,0,0.45),
      0 3px 0 #050912,
      0 5px 10px rgba(0,0,0,0.4);
    transition: transform 0.08s ease, box-shadow 0.08s ease, color 0.18s, background 0.18s;
  }
  .ah-mode-btn:active { transform: translateY(2px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 1px 0 #050912; }
  .ah-mode-btn.active {
    background: linear-gradient(180deg, #4a9eff 0%, #1e88ff 100%);
    color: #fff;
    border-color: rgba(255,255,255,0.18);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.40),
      inset 0 -2px 0 rgba(0,0,0,0.30),
      0 3px 0 #0a3a78,
      0 6px 16px -2px rgba(30,136,255,0.55);
  }
</style>
</head>
<body class="vex-game">
<div class="vex-shell">
  <div class="vex-header">
    <div class="vex-title">
      <div class="vex-title-badge primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
      </div>
      <span id="title">هوكي الهواء</span>
    </div>
    <button class="vex-btn" id="resetBtn"><span id="resetBtnLabel">إعادة</span></button>
  </div>

  <div class="ah-mode-row">
    <button class="ah-mode-btn active" data-mode="ai" id="modeAi">ضد الذكاء</button>
    <button class="ah-mode-btn" data-mode="2p" id="mode2p">لاعبان</button>
  </div>

  <div class="vex-stats">
    <div class="vex-stat"><div class="vex-stat-label" id="lblP1">لاعب 1</div><div class="vex-stat-value emerald" id="p1">0</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblTo">للفوز</div><div class="vex-stat-value gold">7</div></div>
    <div class="vex-stat"><div class="vex-stat-label" id="lblP2">لاعب 2</div><div class="vex-stat-value rose" id="p2">0</div></div>
  </div>

  <div class="ah-arena" id="arena">
    <canvas class="ah-canvas" id="cv" width="360" height="480"></canvas>
  </div>

  <div class="vex-hint" id="hint">اسحب المضرب الأخضر في النصف السفلي. اللاعب الثاني يتحكم بالأحمر فوق.</div>
</div>

<div class="vex-overlay" id="endOverlay">
  <div class="vex-overlay-card">
    <div class="vex-overlay-icon primary">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 9 22 10 17 15 18 22 12 19 6 22 7 15 2 10 9 9 12 2"/></svg>
    </div>
    <div class="vex-overlay-title" id="endTitle">فوز!</div>
    <div class="vex-overlay-subtitle" id="endSub"></div>
    <div class="vex-btn-row">
      <button class="vex-btn vex-btn-primary" id="endRestart" style="flex:1">جولة جديدة</button>
    </div>
  </div>
</div>

<script src="/games/vex-sdk.js"></script>
<script src="/games/_shared/vex-game.js"></script>
<script>
(function(){
  'use strict';
  const STRINGS = {
    ar:{ title:'هوكي الهواء', reset:'إعادة', vsAi:'ضد الذكاء', twoP:'لاعبان',
      p1:'لاعب 1', p2:'لاعب 2', to:'للفوز',
      win1:'فاز اللاعب 1!', win2:'فاز اللاعب 2!', winAi:'فاز الذكاء',
      newRound:'جولة جديدة',
      hint:'اسحب المضرب الأخضر في النصف السفلي. اللاعب الثاني يتحكم بالأحمر فوق.',
      hintAi:'اسحب المضرب الأخضر بالنصف السفلي. الذكاء يتحكم بالأحمر فوق.', },
    en:{ title:'Air Hockey', reset:'Reset', vsAi:'vs AI', twoP:'2 players',
      p1:'Player 1', p2:'Player 2', to:'To win',
      win1:'Player 1 wins!', win2:'Player 2 wins!', winAi:'AI wins',
      newRound:'New game',
      hint:'Drag the green striker in the bottom half. P2 controls the red one above.',
      hintAi:'Drag the green striker. AI controls the red striker.', },
  };
  let lang = 'ar', mode = 'ai';
  const $ = id => document.getElementById(id);
  const TARGET = 7;
  const cv = $('cv'), ctx = cv.getContext('2d');
  let W = cv.width, H = cv.height;
  function fitCanvas(){
    const dpr = window.devicePixelRatio || 1;
    const r = cv.getBoundingClientRect();
    cv.width = Math.round(r.width * dpr);
    cv.height = Math.round(r.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    W = r.width; H = r.height;
  }

  let p1, p2, puck, scores, gameOver, raf, lastT;
  let goalW; // width of goals
  // puck motion trail (cheap, opacity-only)
  const PUCK_TRAIL = [];
  const PUCK_TRAIL_MAX = 6;

  function applyLang(){
    const s = STRINGS[lang];
    document.documentElement.lang = lang; document.documentElement.dir = lang==='ar'?'rtl':'ltr';
    $('title').textContent = s.title; $('resetBtnLabel').textContent = s.reset;
    $('modeAi').textContent = s.vsAi; $('mode2p').textContent = s.twoP;
    $('lblP1').textContent = s.p1; $('lblP2').textContent = mode==='ai' ? 'AI' : s.p2;
    $('lblTo').textContent = s.to;
    $('hint').textContent = mode==='ai' ? s.hintAi : s.hint;
    $('endRestart').textContent = s.newRound;
  }

  function resetPuck(dir){
    puck = {
      x: W/2, y: H/2, r: Math.max(8, Math.min(W,H)*0.027),
      vx: (Math.random()*2 - 1) * 60, vy: (dir > 0 ? 1 : -1) * (140 + Math.random()*40),
    };
  }

  // Cached paint assets — built on reset, NEVER per-frame.
  let goalGradTop = null, goalGradBot = null;
  let strikerGrad1 = null, strikerGrad1Inner = null;
  let strikerGrad2 = null, strikerGrad2Inner = null;
  let puckGrad = null, puckGradR = 0;
  function buildStrikerAssets(p, lightC, darkC){
    // outer dome — radial gradient in striker-local coords centered at (0,0)
    const outer = ctx.createRadialGradient(-p.r*0.30, -p.r*0.40, 1, 0, 0, p.r);
    outer.addColorStop(0, '#ffffff'); outer.addColorStop(0.20, lightC);
    outer.addColorStop(0.85, darkC); outer.addColorStop(1, '#000');
    // inner handle — relative coords, radius p.r*0.42
    const inner = ctx.createRadialGradient(-p.r*0.10, -p.r*0.15, 1, 0, 0, p.r*0.42);
    inner.addColorStop(0, '#ffffff'); inner.addColorStop(0.4, '#e2e8f0'); inner.addColorStop(1, '#64748b');
    return { outer, inner };
  }
  function buildPuckGrad(r){
    puckGradR = r;
    puckGrad = ctx.createRadialGradient(-r*0.4, -r*0.5, 1, 0, 0, r);
    puckGrad.addColorStop(0, '#ffffff'); puckGrad.addColorStop(0.4, '#e2e8f0');
    puckGrad.addColorStop(0.85, '#475569'); puckGrad.addColorStop(1, '#1e293b');
  }
  function rebuildPaintAssets(){
    // Goals — vertical 5-px slots; coords are absolute Y (no per-instance translation needed)
    goalGradTop = ctx.createLinearGradient(0, 0, 0, 8);
    goalGradTop.addColorStop(0, 'rgba(255,182,39,0.55)');
    goalGradTop.addColorStop(1, 'rgba(255,182,39,0.10)');
    goalGradBot = ctx.createLinearGradient(0, H-8, 0, H);
    goalGradBot.addColorStop(0, 'rgba(255,182,39,0.10)');
    goalGradBot.addColorStop(1, 'rgba(255,182,39,0.55)');
    // Strikers — gradients in striker-local coords (translate before fill)
    if (p1){
      const a = buildStrikerAssets(p1, '#22c55e', '#14532d');
      strikerGrad1 = a.outer; strikerGrad1Inner = a.inner;
    }
    if (p2){
      const a = buildStrikerAssets(p2, '#ef4444', '#7f1d1d');
      strikerGrad2 = a.outer; strikerGrad2Inner = a.inner;
    }
    if (puck) buildPuckGrad(puck.r);
  }

  function reset(){
    fitCanvas();
    const r = Math.max(20, Math.min(W,H)*0.07);
    p1 = { x: W/2, y: H - 50, r, vx: 0, vy: 0, lastTouch: null };
    p2 = { x: W/2, y: 50, r, vx: 0, vy: 0, lastTouch: null };
    goalW = W * 0.45;
    scores = { p1: 0, p2: 0 };
    gameOver = false;
    $('p1').textContent = 0; $('p2').textContent = 0;
    $('endOverlay').classList.remove('show');
    resetPuck(Math.random() < 0.5 ? 1 : -1);
    rebuildPaintAssets();
    if (raf) cancelAnimationFrame(raf);
    lastT = performance.now();
    raf = requestAnimationFrame(loop);
  }

  function loop(now){
    if (gameOver) return;
    const dt = Math.min(0.033, (now - lastT) / 1000);
    lastT = now;
    update(dt);
    draw();
    raf = requestAnimationFrame(loop);
  }

  function update(dt){
    // AI for p2
    if (mode === 'ai'){
      const aiSpeed = 280;
      const tx = puck.x;
      const ty = puck.vy < 0 ? Math.max(p2.r + 6, Math.min(H/2 - p2.r - 4, puck.y + 30)) : 80;
      const dx = tx - p2.x, dy = ty - p2.y;
      const dist = Math.hypot(dx, dy);
      const step = aiSpeed * dt;
      if (dist > 1){
        const f = Math.min(1, step / dist);
        p2.vx = dx * f / dt;
        p2.vy = dy * f / dt;
        p2.x += dx * f; p2.y += dy * f;
      } else { p2.vx = 0; p2.vy = 0; }
      // clamp to top half
      p2.x = Math.max(p2.r, Math.min(W - p2.r, p2.x));
      p2.y = Math.max(p2.r, Math.min(H/2 - p2.r, p2.y));
    }

    // Puck physics
    puck.x += puck.vx * dt;
    puck.y += puck.vy * dt;
    // friction
    puck.vx *= 0.995; puck.vy *= 0.995;

    // Side walls
    if (puck.x - puck.r < 0){ puck.x = puck.r; puck.vx = Math.abs(puck.vx); }
    if (puck.x + puck.r > W){ puck.x = W - puck.r; puck.vx = -Math.abs(puck.vx); }

    // Top / bottom: goals on center, walls on sides
    const goalLeft = (W - goalW) / 2;
    const goalRight = goalLeft + goalW;
    if (puck.y - puck.r < 0){
      if (puck.x > goalLeft && puck.x < goalRight){ score('p1'); return; }
      puck.y = puck.r; puck.vy = Math.abs(puck.vy);
    }
    if (puck.y + puck.r > H){
      if (puck.x > goalLeft && puck.x < goalRight){ score('p2'); return; }
      puck.y = H - puck.r; puck.vy = -Math.abs(puck.vy);
    }

    // Striker collisions
    [p1, p2].forEach(p => {
      const dx = puck.x - p.x, dy = puck.y - p.y;
      const dist = Math.hypot(dx, dy);
      const minDist = puck.r + p.r;
      if (dist < minDist && dist > 0.001){
        const nx = dx / dist, ny = dy / dist;
        // Push puck out
        puck.x = p.x + nx * minDist;
        puck.y = p.y + ny * minDist;
        // Reflect velocity along normal
        const vRel = puck.vx * nx + puck.vy * ny;
        if (vRel < 0){
          puck.vx -= 2 * vRel * nx;
          puck.vy -= 2 * vRel * ny;
        }
        // Add striker velocity
        puck.vx += p.vx * 0.45;
        puck.vy += p.vy * 0.45;
        // Cap speed
        const sp = Math.hypot(puck.vx, puck.vy);
        if (sp > 700){ puck.vx *= 700/sp; puck.vy *= 700/sp; }
      }
    });
  }

  function score(who){
    scores[who]++;
    $('p1').textContent = scores.p1; $('p2').textContent = scores.p2;
    if (scores[who] >= TARGET){ end(who); return; }
    // Reset positions
    setTimeout(() => {
      p1.x = W/2; p1.y = H - 50; p1.vx = 0; p1.vy = 0;
      p2.x = W/2; p2.y = 50; p2.vx = 0; p2.vy = 0;
      resetPuck(who === 'p1' ? -1 : 1);
    }, 250);
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // mid line — neon stripe
    ctx.strokeStyle = 'rgba(255,255,255,0.32)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
    // center circle (double ring)
    ctx.strokeStyle = 'rgba(255,255,255,0.30)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(W/2, H/2, Math.min(W,H)*0.13, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath(); ctx.arc(W/2, H/2, Math.min(W,H)*0.04, 0, Math.PI*2); ctx.stroke();
    // goals — gold glowing slot (cached gradients)
    const gw = goalW;
    ctx.fillStyle = goalGradTop;
    ctx.fillRect((W-gw)/2, 0, gw, 5);
    ctx.fillStyle = goalGradBot;
    ctx.fillRect((W-gw)/2, H-5, gw, 5);
    ctx.strokeStyle = '#ffb627'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo((W-gw)/2, 0); ctx.lineTo((W-gw)/2, 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo((W+gw)/2, 0); ctx.lineTo((W+gw)/2, 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo((W-gw)/2, H); ctx.lineTo((W-gw)/2, H-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo((W+gw)/2, H); ctx.lineTo((W+gw)/2, H-14); ctx.stroke();

    // puck trail (oldest → newest, fading)
    for (let i = 0; i < PUCK_TRAIL.length; i++){
      const t = PUCK_TRAIL[i];
      const a = ((i + 1) / (PUCK_TRAIL.length + 1)) * 0.40;
      ctx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
      ctx.beginPath(); ctx.arc(t.x, t.y, puck.r * (0.55 + i*0.06), 0, Math.PI*2); ctx.fill();
    }

    // strikers (3D dome) — cached gradients
    drawStriker(p1, '#22c55e', strikerGrad1, strikerGrad1Inner);
    drawStriker(p2, '#ef4444', strikerGrad2, strikerGrad2Inner);

    // puck — chrome disc with rim + highlight (cached radial gradient)
    if (puck.r !== puckGradR) buildPuckGrad(puck.r);
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 10;
    ctx.save();
    ctx.translate(puck.x, puck.y);
    ctx.fillStyle = puckGrad;
    ctx.beginPath(); ctx.arc(0, 0, puck.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.shadowBlur = 0;
    // rim
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI*2); ctx.stroke();

    // record trail position
    PUCK_TRAIL.push({x: puck.x, y: puck.y});
    if (PUCK_TRAIL.length > PUCK_TRAIL_MAX) PUCK_TRAIL.shift();
  }

  function drawStriker(p, glowColor, outerGrad, innerGrad){
    // shadow on table (absolute coords)
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(p.x, p.y + p.r*0.25, p.r*0.95, p.r*0.35, 0, 0, Math.PI*2); ctx.fill();
    // translate once into striker-local space; cached gradients are local-coord
    ctx.save();
    ctx.translate(p.x, p.y);
    // body — cached radial gradient (3D dome)
    ctx.shadowColor = glowColor; ctx.shadowBlur = 14;
    ctx.fillStyle = outerGrad;
    ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // chrome ring
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, p.r * 0.78, 0, Math.PI*2); ctx.stroke();
    // center handle (inner disc) — cached
    ctx.fillStyle = innerGrad;
    ctx.beginPath(); ctx.arc(0, 0, p.r * 0.42, 0, Math.PI*2); ctx.fill();
    // top highlight dot
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(-p.r*0.2, -p.r*0.25, p.r*0.10, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function end(winner){
    gameOver = true;
    if (raf) cancelAnimationFrame(raf);
    const s = STRINGS[lang];
    let title;
    if (winner === 'p1') title = s.win1;
    else title = mode === 'ai' ? s.winAi : s.win2;
    $('endTitle').textContent = title;
    $('endSub').textContent = `${scores.p1} — ${scores.p2}`;
    setTimeout(() => $('endOverlay').classList.add('show'), 400);
    if (typeof VexGame !== 'undefined'){
      if (winner === 'p1') VexGame.confetti(700);
      VexGame.endSession({
        score: scores.p1, result: winner === 'p1' ? 'win' : 'loss',
        metadata: { mode, p1: scores.p1, p2: scores.p2, winner },
      });
    }
  }

  // Multi-touch controls
  function getRel(t){
    const r = cv.getBoundingClientRect();
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }
  function moveStriker(p, x, y, dt){
    const newX = Math.max(p.r, Math.min(W - p.r, x));
    const newY = (p === p1)
      ? Math.max(H/2 + p.r, Math.min(H - p.r, y))
      : Math.max(p.r, Math.min(H/2 - p.r, y));
    if (dt > 0){ p.vx = (newX - p.x) / dt; p.vy = (newY - p.y) / dt; }
    p.x = newX; p.y = newY;
  }
  let lastTouchT = performance.now();
  function handle(ev){
    const now = performance.now();
    const dt = Math.max(0.016, (now - lastTouchT) / 1000);
    lastTouchT = now;
    const touches = ev.touches ? Array.from(ev.touches) : [ev];
    let hadTop = false;
    touches.forEach(t => {
      const pt = getRel(t);
      if (pt.y > H/2){ moveStriker(p1, pt.x, pt.y, dt); }
      else if (mode === '2p'){ moveStriker(p2, pt.x, pt.y, dt); hadTop = true; }
    });
  }
  cv.addEventListener('touchstart', (e) => { e.preventDefault(); handle(e); }, {passive:false});
  cv.addEventListener('touchmove', (e) => { e.preventDefault(); handle(e); }, {passive:false});
  cv.addEventListener('touchend', (e) => {
    // damp velocities of strikers no longer touched (simple)
    if (!e.touches.length){ p1.vx *= 0.5; p1.vy *= 0.5; p2.vx *= 0.5; p2.vy *= 0.5; }
  });
  cv.addEventListener('mousemove', (e) => { if (e.buttons) handle(e); });
  cv.addEventListener('mousedown', handle);

  document.querySelectorAll('.ah-mode-btn').forEach(b => {
    b.addEventListener('click', () => {
      mode = b.dataset.mode;
      document.querySelectorAll('.ah-mode-btn').forEach(x => x.classList.toggle('active', x===b));
      applyLang();
      reset();
    });
  });

  $('resetBtn').addEventListener('click', reset);
  $('endRestart').addEventListener('click', reset);
  window.addEventListener('resize', () => { fitCanvas(); reset(); });

  if (typeof VexGame !== 'undefined'){
    VexGame.boot({
      slug: 'air-hockey',
      onReady: function(player){
        if (player && player.language){ lang = player.language === 'en' ? 'en' : 'ar'; VexGame.setLang(lang); }
        applyLang();
      },
    });
  }
  applyLang();
  reset();
})();
</script>
</body>
</html>
