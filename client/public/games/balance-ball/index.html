<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="theme-color" content="#070b14">
<title>VEX Balance Ball</title><link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>.bb-board{position:relative;width:100%;max-width:360px;margin:0 auto;aspect-ratio:1;background:radial-gradient(ellipse at 50% 100%,rgba(34,211,238,.18),transparent 60%),linear-gradient(180deg,#0c1f3d,#040912);border:1px solid rgba(34,211,238,.30);border-radius:18px;overflow:hidden;touch-action:none}
.bb-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:pointer}</style></head>
<body class="vex-game">
<div class="vex-shell">
<div class="vex-header"><div class="vex-title"><div class="vex-title-badge" style="background:linear-gradient(135deg,#67e8f9,#155e75);color:#002028"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="9" r="5"/><path d="M3 21h18"/></svg></div><span id="title">توازن الكرة</span></div><button class="vex-btn" id="resetBtn"><span id="resetLabel">إعادة</span></button></div>
<div class="vex-stats"><div class="vex-stat"><div class="vex-stat-label" id="lblTime">الزمن</div><div class="vex-stat-value" id="time">0</div></div><div class="vex-stat"><div class="vex-stat-label" id="lblBest">الأفضل</div><div class="vex-stat-value emerald" id="best">0</div></div><div class="vex-stat"><div class="vex-stat-label" id="lblScore">النتيجة</div><div class="vex-stat-value blue" id="score">0</div></div></div>
<div class="bb-board"><canvas class="bb-canvas" id="cv" width="360" height="360"></canvas></div>
<div class="vex-hint" id="hint">حرّك يمين/يسار لإمالة المنصة. اِبقِ الكرة فوقها أطول وقت.</div></div>
<div class="vex-overlay" id="endOverlay"><div class="vex-overlay-card"><div class="vex-overlay-icon rose"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><path d="M9 9l6 6M15 9l-6 6"/></svg></div><div class="vex-overlay-title" id="endTitle">سقطت الكرة!</div><div class="vex-overlay-subtitle" id="endSub">حاول مجدداً.</div><div class="vex-overlay-stats"><div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFT">الزمن</div><div class="vex-overlay-stat-value" id="finalT">0</div></div><div class="vex-overlay-stat"><div class="vex-overlay-stat-label" id="lblFB">الأفضل</div><div class="vex-overlay-stat-value" id="finalB">0</div></div></div><div class="vex-btn-row"><button class="vex-btn vex-btn-primary" id="endRestart" style="flex:1">جولة جديدة</button></div></div></div>
<script src="/games/vex-sdk.js"></script><script src="/games/_shared/vex-game.js"></script>
<script>(function(){'use strict';
const S={ar:{title:'توازن الكرة',reset:'إعادة',time:'الزمن',best:'الأفضل',score:'النتيجة',end:'سقطت الكرة!',endSub:'حاول مجدداً.',newRound:'جولة جديدة',hint:'حرّك يمين/يسار لإمالة المنصة.'},
en:{title:'Balance Ball',reset:'Reset',time:'Time',best:'Best',score:'Score',end:'Ball fell!',endSub:'Try again.',newRound:'New game',hint:'Move left/right to tilt the platform.'}};
let lang='ar';const $=id=>document.getElementById(id);const cv=$('cv'),ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
let ball,plat,startedAt,raf,alive,best,obstacles,nextOb;
function applyLang(){const s=S[lang];document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';
$('title').textContent=s.title;$('resetLabel').textContent=s.reset;$('lblTime').textContent=s.time;$('lblBest').textContent=s.best;$('lblScore').textContent=s.score;
$('hint').textContent=s.hint;$('endTitle').textContent=s.end;$('endSub').textContent=s.endSub;$('endRestart').textContent=s.newRound;$('lblFT').textContent=s.time;$('lblFB').textContent=s.best;}
function reset(){ball={x:W/2,y:H*.55,vx:0,vy:0,r:13};plat={x:W/2-70,y:H*.6,w:140,h:14,tilt:0,target:0};
startedAt=Date.now();alive=true;obstacles=[];nextOb=Date.now()+4000;
best=parseFloat(localStorage.getItem('vex.best.balance-ball')||'0');$('best').textContent=best?best.toFixed(1):'0';
$('time').textContent=0;$('score').textContent=0;$('endOverlay').classList.remove('show');cancelAnimationFrame(raf);loop();}
function step(){plat.tilt+=(plat.target-plat.tilt)*0.18;
const grav=0.30;ball.vy+=grav;
const onPlat=Math.abs(ball.x-(plat.x+plat.w/2))<plat.w/2&&Math.abs(ball.y-plat.y+ball.r)<8&&ball.vy>=0;
if(onPlat){const dx=ball.x-(plat.x+plat.w/2);ball.vx+=Math.tan(plat.tilt)*0.4+dx*0.0006;ball.vy=-Math.abs(plat.tilt)*1.5;ball.y=plat.y-ball.r;ball.vx*=0.985;}
ball.x+=ball.vx;ball.y+=ball.vy;
if(ball.x<ball.r){ball.x=ball.r;ball.vx*=-0.5;}if(ball.x>W-ball.r){ball.x=W-ball.r;ball.vx*=-0.5;}
if(ball.y>H+30)return die();
if(Date.now()>nextOb){const x=Math.random()<.5?-30:W+30;obstacles.push({x,y:plat.y-30,vx:x<0?2.2:-2.2,r:10});nextOb=Date.now()+3000+Math.random()*2000;}
for(const o of obstacles){o.x+=o.vx;if(Math.hypot(o.x-ball.x,o.y-ball.y)<o.r+ball.r)return die();}
obstacles=obstacles.filter(o=>o.x>-50&&o.x<W+50);
const t=(Date.now()-startedAt)/1000;$('time').textContent=t.toFixed(1);$('score').textContent=Math.floor(t*10);}
function draw(){ctx.fillStyle='rgba(7,17,40,0.18)';ctx.fillRect(0,0,W,H);
ctx.save();ctx.translate(plat.x+plat.w/2,plat.y+plat.h/2);ctx.rotate(plat.tilt);
const pg=ctx.createLinearGradient(0,-plat.h/2,0,plat.h/2);pg.addColorStop(0,'#67e8f9');pg.addColorStop(1,'#155e75');ctx.fillStyle=pg;
ctx.fillRect(-plat.w/2,-plat.h/2,plat.w,plat.h);ctx.restore();
for(const o of obstacles){const g=ctx.createRadialGradient(o.x-2,o.y-2,1,o.x,o.y,o.r);g.addColorStop(0,'#fca5a5');g.addColorStop(1,'#7f1d1d');
ctx.fillStyle=g;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();}
const bg=ctx.createRadialGradient(ball.x-3,ball.y-3,1,ball.x,ball.y,ball.r);bg.addColorStop(0,'#fde047');bg.addColorStop(1,'#a86b00');
ctx.fillStyle=bg;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();}
function loop(){if(!alive)return;step();draw();raf=requestAnimationFrame(loop);}
function die(){alive=false;const t=(Date.now()-startedAt)/1000;if(t>best){best=t;localStorage.setItem('vex.best.balance-ball',t.toFixed(1));}
$('best').textContent=best.toFixed(1);$('finalT').textContent=t.toFixed(1);$('finalB').textContent=best.toFixed(1);
setTimeout(()=>$('endOverlay').classList.add('show'),300);
if(typeof VexGame!=='undefined'){VexGame.setBest(Math.floor(best*10));VexGame.endSession({score:Math.floor(t*10),result:'loss',metadata:{seconds:t}});}}
function setTilt(x){const cx=W/2;plat.target=Math.max(-.55,Math.min(.55,(x-cx)/cx*.5));}
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();setTilt((e.clientX-r.left)*W/r.width);});
cv.addEventListener('touchmove',e=>{e.preventDefault();const r=cv.getBoundingClientRect();setTilt((e.touches[0].clientX-r.left)*W/r.width);},{passive:false});
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')plat.target=Math.max(-.55,plat.target-.1);if(e.key==='ArrowRight'||e.key==='d')plat.target=Math.min(.55,plat.target+.1);});
$('resetBtn').addEventListener('click',reset);$('endRestart').addEventListener('click',reset);
if(typeof VexGame!=='undefined'){VexGame.boot({slug:'balance-ball',onReady:p=>{if(p&&p.language){lang=p.language==='en'?'en':'ar';VexGame.setLang(lang);}applyLang();}});}
applyLang();reset();})();</script></body></html>
