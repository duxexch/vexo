<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b14">
<title>VEX Bomb Pass</title>
<link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>
  .bp-arena {
    width: 100%; max-width: 380px; margin: 0 auto;
    aspect-ratio: 3/4;
    background:
      radial-gradient(circle at 50% 38%, rgba(249,115,22,0.30), transparent 55%),
      radial-gradient(ellipse 100% 60% at 50% 100%, rgba(249,115,22,0.12), transparent 80%),
      linear-gradient(180deg, #1a0c06 0%, #060306 100%);
    border: 1px solid rgba(249,115,22,0.40);
    border-radius: 18px;
    position: relative; overflow: hidden;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -2px 0 rgba(0,0,0,0.55),
      inset 0 0 36px rgba(249,115,22,0.25),
      0 14px 28px -10px rgba(0,0,0,0.7);
  }
  /* Pulsing concentric danger rings around bomb */
  .bp-arena::before {
    content:""; position:absolute; left:50%; top:38%; width:300px; height:300px;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    background:
      radial-gradient(circle, transparent 30%, rgba(249,115,22,0.18) 32%, transparent 36%),
      radial-gradient(circle, transparent 50%, rgba(249,115,22,0.12) 52%, transparent 56%);
    pointer-events: none; z-index: 0;
    animation: bpRingPulse 1.6s ease-in-out infinite;
  }
  @keyframes bpRingPulse { 0%,100% { opacity: 0.5; transform: translate(-50%,-50%) scale(0.92); } 50% { opacity: 1; transform: translate(-50%,-50%) scale(1.08); } }
  /* Stadium floor lines fading toward horizon */
  .bp-arena::after {
    content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(249,115,22,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: linear-gradient(180deg, transparent 0%, transparent 60%, #000 100%);
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, transparent 60%, #000 100%);
  }
  .bp-bomb {
    position: absolute; left: 50%; top: 38%; transform: translate(-50%,-50%);
    width: 140px; height: 140px;
    display: grid; place-items: center;
    z-index: 2;
  }
  .bp-bomb-inner {
    width: 118px; height: 118px; border-radius: 50%;
    background:
      radial-gradient(circle at 30% 25%, #ffffff 0%, #b9c1d2 6%, #525b6e 22%, #1f2937 55%, #0a0f1c 90%);
    box-shadow:
      0 0 38px rgba(249,115,22,0.55),
      0 12px 24px rgba(0,0,0,0.55),
      inset -10px -12px 18px rgba(0,0,0,0.55),
      inset 6px 8px 14px rgba(255,255,255,0.10);
    position: relative;
    animation: bpJiggle 0.4s ease-in-out infinite;
  }
  /* Gloss highlight crescent */
  .bp-bomb-inner::before {
    content:""; position:absolute; top:8%; left:18%; width:40%; height:22%;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.55), rgba(255,255,255,0));
    filter: blur(2px);
    pointer-events: none;
  }
  @keyframes bpJiggle { 0%,100%{transform:translate(0,0) rotate(0deg)} 25%{transform:translate(-1px,2px) rotate(-1.5deg)} 75%{transform:translate(1px,-1px) rotate(1.5deg)} }
  .bp-bomb-inner::after {
    content: ''; position: absolute; top: -14px; left: 50%; width: 5px; height: 36px;
    background: linear-gradient(to top, #2a2a2a, #525b6e 30%, #737373);
    transform: translateX(-50%) rotate(22deg); transform-origin: bottom center;
    border-radius: 2px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.30) inset, 0 -1px 0 rgba(0,0,0,0.4) inset;
  }
  .bp-spark {
    position: absolute; top: -38px; left: calc(50% + 12px);
    width: 16px; height: 16px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fffbeb, #fef08a 35%, #f97316 70%, #c2410c);
    box-shadow:
      0 0 22px #f97316,
      0 0 40px #fb923c,
      0 0 60px rgba(249,115,22,0.55);
    animation: bpSpark 0.3s ease-in-out infinite alternate;
    z-index: 3;
  }
  @keyframes bpSpark { 0%{transform:scale(0.85) rotate(0deg)} 100%{transform:scale(1.30) rotate(20deg)} }
  .bp-pass-btn {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: 18px 44px;
    background: linear-gradient(180deg, #fb923c 0%, #ea580c 50%, #7c2d12 100%);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 999px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 0.20em;
    cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.40),
      inset 0 -2px 0 rgba(0,0,0,0.40),
      0 5px 0 #4a1505,
      0 8px 22px -3px rgba(249,115,22,0.65);
    text-shadow: 0 1px 0 rgba(0,0,0,0.30);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    z-index: 5;
  }
  .bp-pass-btn:active {
    transform: translateX(-50%) translateY(4px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.30),
      inset 0 -1px 0 rgba(0,0,0,0.35),
      0 1px 0 #4a1505,
      0 2px 6px rgba(249,115,22,0.50);
  }
  .bp-current-name {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 3;
    padding: 8px 24px; border-radius: 12px;
    background: linear-gradient(180deg, #fdba74, #c2410c);
    color: #1a0c06;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.14em;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.45),
      inset 0 -1px 0 rgba(0,0,0,0.30),
      0 4px 0 #4a1505,
      0 6px 14px -2px rgba(249,115,22,0.55);
    text-shadow: 0 1px 0 rgba(255,255,255,0.30);
  }
  .bp-players {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    width: 100%; margin: 12px 0;
  }
  .bp-player {
    background: linear-gradient(180deg, #1a1f3a 0%, #0a0e1c 100%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -1px 0 rgba(0,0,0,0.40),
      0 3px 0 #050912,
      0 4px 8px rgba(0,0,0,0.30);
    transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  }
  .bp-player.active {
    background: linear-gradient(180deg, #ea580c 0%, #7c2d12 100%);
    color: #fff;
    border-color: rgba(255,255,255,0.20);
    transform: translateY(-2px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.35),
      inset 0 -2px 0 rgba(0,0,0,0.30),
      0 4px 0 #4a1505,
      0 6px 16px -2px rgba(249,115,22,0.55);
  }
  .bp-player.dead {
    opacity: 0.30; filter: grayscale(0.85);
    transform: translateY(2px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 1px 0 #050912;
  }
  .bp-player-dot {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    box-shadow: inset 0 -2px 3px rgba(0,0,0,0.4), inset 0 2px 2px rgba(255,255,255,0.35);
  }
  .bp-player-name {
    flex: 1; font-weight: 800; font-size: 0.98rem;
    text-shadow: 0 1px 0 rgba(0,0,0,0.45);
  }
  .bp-lives {
    display: flex; gap: 4px;
  }
  .bp-life {
    width: 11px; height: 11px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fca5a5, #dc2626 70%, #4a0a0a);
    box-shadow: 0 0 8px rgba(239,68,68,0.7), inset 0 1px 1px rgba(255,255,255,0.30);
  }
  .bp-life.gone {
    background: rgba(0,0,0,0.40);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
  }
  .bp-explosion {
    position: absolute; inset: 0; display: grid; place-items: center;
    background: radial-gradient(circle, rgba(255,255,255,0.20) 0%, rgba(249,115,22,0.7) 25%, rgba(0,0,0,0.75) 70%);
    z-index: 8; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .bp-explosion.show { opacity: 1; }
  .bp-explosion-text {
    font-family: 'Bebas Neue', sans-serif; font-size: 4.4rem; color: #fff;
    text-shadow: 0 0 32px #f97316, 0 0 56px #ef4444, 0 4px 0 #4a1505;
    letter-spacing: 0.08em;
    animation: bpExplode 0.55s ease-out;
  }
  @keyframes bpExplode { 0%{transform:scale(0.3) rotate(-10deg); opacity: 0;} 60%{transform:scale(1.4) rotate(2deg); opacity: 1;} 100%{transform:scale(1.3) rotate(0); opacity: 1;} }
  .bp-setup-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(15,8,4,0.97), rgba(7,4,2,0.97));
    z-index: 20; padding: 18px; display: flex; flex-direction: column; gap: 10px;
    align-items: stretch; justify-content: center; border-radius: 18px;
  }
  .bp-setup-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; color: #fdba74;
    text-align: center; letter-spacing: 0.12em;
    text-shadow: 0 0 14px rgba(249,115,22,0.55), 0 3px 0 rgba(0,0,0,0.5);
  }
  .bp-setup-row { display: flex; gap: 8px; align-items: center; }
  .bp-setup-row input {
    flex: 1; padding: 11px;
    background: linear-gradient(180deg, #1a1f3a, #0a0e1c);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    color: var(--vex-text); font-family: inherit; font-size: 0.95rem;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), inset 0 2px 4px rgba(0,0,0,0.4);
  }
  .bp-setup-start {
    margin-top: 14px; padding: 16px;
    background: linear-gradient(180deg, #fb923c 0%, #ea580c 50%, #7c2d12 100%);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.20);
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.18em;
    cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.40),
      inset 0 -2px 0 rgba(0,0,0,0.30),
      0 5px 0 #4a1505,
      0 8px 22px -4px rgba(249,115,22,0.55);
    text-shadow: 0 1px 0 rgba(0,0,0,0.30);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .bp-setup-start:active {
    transform: translateY(4px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.30), 0 1px 0 #4a1505;
  }
  .bp-count-row { display: flex; gap: 8px; justify-content: center; margin: 8px 0; }
  .bp-count-btn {
    width: 46px; height: 46px; border-radius: 12px;
    background: linear-gradient(180deg, #1a1f3a, #0a0e1c);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--vex-text);
    font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
    cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.12),
      inset 0 -2px 0 rgba(0,0,0,0.40),
      0 3px 0 #050912;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .bp-count-btn:active { transform: translateY(2px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 1px 0 #050912; }
  .bp-count-btn.active {
    background: linear-gradient(180deg, #fb923c, #c2410c);
    color: #1a0c06;
    border-color: rgba(255,255,255,0.25);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.45),
      inset 0 -2px 0 rgba(0,0,0,0.30),
      0 3px 0 #4a1505,
      0 5px 12px -2px rgba(249,115,22,0.55);
  }
</style>
</head>
<body class="vex-game">
<div class="vex-shell">
  <div class="vex-header">
    <div class="vex-title">
      <div class="vex-title-badge" style="background:linear-gradient(135deg,#f97316,#7c2d12);box-shadow:0 0 18px -4px #f97316;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="14" r="7"/><path d="M12 7V4"/><path d="M14 4l3-2"/></svg>
      </div>
      <span id="title">تمرير القنبلة</span>
    </div>
    <button class="vex-btn" id="resetBtn"><span id="resetBtnLabel">إعادة</span></button>
  </div>

  <div class="bp-players" id="players"></div>

  <div class="bp-arena" id="arena">
    <div class="bp-current-name" id="currentName">—</div>
    <div class="bp-bomb">
      <div class="bp-bomb-inner">
        <div class="bp-spark" id="spark"></div>
      </div>
    </div>
    <button class="bp-pass-btn" id="passBtn">PASS</button>
    <div class="bp-explosion" id="boom">
      <div class="bp-explosion-text">💥 BOOM</div>
    </div>

    <div class="bp-setup-overlay" id="setupOverlay">
      <div class="bp-setup-title" id="setupTitle">عدد اللاعبين</div>
      <div class="bp-count-row" id="countRow">
        <button class="bp-count-btn" data-c="2">2</button>
        <button class="bp-count-btn active" data-c="3">3</button>
        <button class="bp-count-btn" data-c="4">4</button>
      </div>
      <div id="namesArea"></div>
      <button class="bp-setup-start" id="setupStart">ابدأ</button>
    </div>
  </div>

  <div class="vex-hint" id="hint">مرّر القنبلة قبل أن تنفجر! اللاعب الذي يحملها عند الانفجار يفقد حياة. آخر باقٍ يفوز.</div>
</div>

<div class="vex-overlay" id="endOverlay">
  <div class="vex-overlay-card">
    <div class="vex-overlay-icon" style="background:linear-gradient(135deg,#f97316,#7c2d12);box-shadow:0 0 18px -4px #f97316;">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 9 22 10 17 15 18 22 12 19 6 22 7 15 2 10 9 9 12 2"/></svg>
    </div>
    <div class="vex-overlay-title" id="endTitle">انتهت اللعبة!</div>
    <div class="vex-overlay-subtitle" id="endSub"></div>
    <div class="vex-btn-row">
      <button class="vex-btn vex-btn-primary" id="endRestart" style="flex:1;background:linear-gradient(135deg,#f97316,#7c2d12);box-shadow:0 0 18px -3px #f97316;">جولة جديدة</button>
    </div>
  </div>
</div>

<script src="/games/vex-sdk.js"></script>
<script src="/games/_shared/vex-game.js"></script>
<script>
(function(){
  'use strict';
  const STRINGS = {
    ar:{ title:'تمرير القنبلة', reset:'إعادة', pass:'مرّر', setupTitle:'عدد اللاعبين',
      defaultName:'لاعب', start:'ابدأ', boom:'انفجر!', winner:(n)=>`${n} فاز!`,
      newRound:'جولة جديدة', endSub:'تهانينا للناجي.',
      hint:'مرّر القنبلة قبل أن تنفجر! اللاعب الذي يحملها عند الانفجار يفقد حياة. آخر باقٍ يفوز.', },
    en:{ title:'Bomb Pass', reset:'Reset', pass:'PASS', setupTitle:'Number of players',
      defaultName:'Player', start:'Start', boom:'BOOM!', winner:(n)=>`${n} wins!`,
      newRound:'New game', endSub:'Congratulations to the survivor.',
      hint:'Pass the bomb before it explodes! The holder loses a life. Last alive wins.', },
  };
  let lang = 'ar';
  const $ = id => document.getElementById(id);

  let players;        // [{name, lives, alive}]
  let current;        // index of holder
  let bombTimer;      // setTimeout for explosion
  let nextExplodeAt;  // ms timestamp
  let running = false;
  let count = 3;
  let pendingTimers = [];
  function later(fn, ms){ const id = setTimeout(() => { pendingTimers = pendingTimers.filter(x => x !== id); fn(); }, ms); pendingTimers.push(id); return id; }
  function clearPending(){ pendingTimers.forEach(clearTimeout); pendingTimers = []; }

  function applyLang(){
    const s = STRINGS[lang];
    document.documentElement.lang = lang; document.documentElement.dir = lang==='ar'?'rtl':'ltr';
    $('title').textContent = s.title; $('resetBtnLabel').textContent = s.reset;
    $('passBtn').textContent = s.pass;
    $('setupTitle').textContent = s.setupTitle;
    $('setupStart').textContent = s.start;
    $('hint').textContent = s.hint;
    $('endRestart').textContent = s.newRound;
    rebuildSetupNames();
  }

  function rebuildSetupNames(){
    const area = $('namesArea'); area.innerHTML = '';
    const s = STRINGS[lang];
    for (let i = 0; i < count; i++){
      const row = document.createElement('div');
      row.className = 'bp-setup-row';
      const dot = document.createElement('div');
      dot.style.cssText = `width:10px;height:10px;border-radius:50%;background:${playerColor(i)};box-shadow:0 0 8px ${playerColor(i)};flex-shrink:0;`;
      const inp = document.createElement('input');
      inp.type = 'text'; inp.maxLength = 12;
      inp.placeholder = `${s.defaultName} ${i+1}`;
      inp.value = `${s.defaultName} ${i+1}`;
      inp.dataset.i = i;
      row.appendChild(dot); row.appendChild(inp);
      area.appendChild(row);
    }
  }

  function playerColor(i){
    return ['#22c55e','#ef4444','#1e88ff','#ffb627'][i % 4];
  }

  function startSetup(){
    running = false;
    if (bombTimer){ clearTimeout(bombTimer); bombTimer = null; }
    clearPending();
    $('boom').classList.remove('show');
    $('setupOverlay').style.display = 'flex';
    $('endOverlay').classList.remove('show');
    rebuildSetupNames();
  }

  function startGame(){
    const s = STRINGS[lang];
    const inputs = $('namesArea').querySelectorAll('input');
    players = Array.from(inputs).map((inp, i) => ({
      name: inp.value.trim() || `${s.defaultName} ${i+1}`,
      lives: 3, alive: true, color: playerColor(i),
    }));
    current = 0;
    $('setupOverlay').style.display = 'none';
    running = true;
    renderPlayers();
    nextRound();
  }

  function renderPlayers(){
    const root = $('players'); root.innerHTML = '';
    players.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'bp-player' + (i === current && p.alive ? ' active' : '') + (!p.alive ? ' dead' : '');
      const dot = document.createElement('div');
      dot.className = 'bp-player-dot'; dot.style.background = p.color; dot.style.boxShadow = `0 0 8px ${p.color}`;
      const name = document.createElement('div');
      name.className = 'bp-player-name'; name.textContent = p.name;
      const lives = document.createElement('div');
      lives.className = 'bp-lives';
      for (let l = 0; l < 3; l++){
        const lf = document.createElement('div');
        lf.className = 'bp-life' + (l >= p.lives ? ' gone' : '');
        lives.appendChild(lf);
      }
      row.appendChild(dot); row.appendChild(name); row.appendChild(lives);
      root.appendChild(row);
    });
    $('currentName').textContent = players[current] ? players[current].name : '—';
    $('currentName').style.color = players[current] ? players[current].color : '#fdba74';
  }

  function nextRound(){
    if (!running) return;
    // Random fuse 6-22 seconds
    const ms = 6000 + Math.random() * 16000;
    nextExplodeAt = performance.now() + ms;
    if (bombTimer) clearTimeout(bombTimer);
    bombTimer = setTimeout(explode, ms);
  }

  function pass(){
    if (!running) return;
    if (!players[current].alive) return; // safety
    // Move to next alive player
    let next = current;
    for (let i = 0; i < players.length; i++){
      next = (next + 1) % players.length;
      if (players[next].alive){ current = next; break; }
    }
    renderPlayers();
  }

  function explode(){
    if (!running) return;
    const holder = players[current];
    holder.lives--;
    $('boom').classList.add('show');
    if (typeof VexGame !== 'undefined') VexGame.toast(holder.name + (lang==='ar'?' فقد حياة!':' lost a life!'), 'danger');
    later(() => $('boom').classList.remove('show'), 800);
    if (holder.lives <= 0){
      holder.alive = false;
      // Check survivors
      const alive = players.filter(p => p.alive);
      if (alive.length === 1){
        renderPlayers();
        return endGame(alive[0]);
      }
    }
    // Move bomb to next alive player after a brief beat
    later(() => {
      if (!running) return;
      // start from next alive
      let next = current;
      for (let i = 0; i < players.length; i++){
        next = (next + 1) % players.length;
        if (players[next].alive){ current = next; break; }
      }
      renderPlayers();
      nextRound();
    }, 1100);
  }

  function endGame(winner){
    running = false;
    if (bombTimer){ clearTimeout(bombTimer); bombTimer = null; }
    const s = STRINGS[lang];
    $('endTitle').textContent = s.winner(winner.name);
    $('endSub').textContent = s.endSub;
    later(() => $('endOverlay').classList.add('show'), 700);
    if (typeof VexGame !== 'undefined'){
      VexGame.confetti(900);
      VexGame.endSession({ score: winner.lives, result: 'win', metadata: { winner: winner.name } });
    }
  }

  // Setup events
  document.querySelectorAll('.bp-count-btn').forEach(b => {
    b.addEventListener('click', () => {
      count = parseInt(b.dataset.c, 10);
      document.querySelectorAll('.bp-count-btn').forEach(x => x.classList.toggle('active', x===b));
      rebuildSetupNames();
    });
  });
  $('setupStart').addEventListener('click', startGame);
  $('passBtn').addEventListener('click', pass);
  $('resetBtn').addEventListener('click', startSetup);
  $('endRestart').addEventListener('click', startSetup);

  if (typeof VexGame !== 'undefined'){
    VexGame.boot({
      slug: 'bomb-pass',
      onReady: function(player){
        if (player && player.language){ lang = player.language === 'en' ? 'en' : 'ar'; VexGame.setLang(lang); }
        applyLang();
      },
    });
  }
  applyLang();
  startSetup();
})();
</script>
