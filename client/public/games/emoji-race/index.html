<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="theme-color" content="#070b14">
<title>VEX Emoji Race</title><link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>.er-target{padding:14px;background:linear-gradient(135deg,#fbbf24,#7c2d12);border-radius:14px;text-align:center;font-size:2rem;margin:12px 0;box-shadow:0 0 30px rgba(255,182,39,.4)}
.er-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:100%;max-width:380px;margin:0 auto;padding:8px;background:var(--vex-surface);border:1px solid var(--vex-border);border-radius:14px}
.er-cell{aspect-ratio:1;display:grid;place-items:center;font-size:1.4rem;cursor:pointer;border-radius:8px;background:rgba(255,255,255,.04);user-select:none;transition:transform .08s,background .15s}
.er-cell:active{transform:scale(.92)}
.er-cell.found{animation:vexShake .3s;background:linear-gradient(135deg,#22c55e,#14532d)}
.er-pc{display:flex;gap:6px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.er-pc button{padding:6px 14px;border-radius:99px;border:1px solid var(--vex-border);background:var(--vex-surface);color:#fff;font-family:'Bebas Neue',sans-serif;letter-spacing:.05em;cursor:pointer;font-size:.9rem}
.er-pc button.active{background:linear-gradient(135deg,#1e88ff,#0a4d9c);border-color:transparent}
.er-turn{padding:8px 16px;border-radius:99px;font-family:'Bebas Neue',sans-serif;letter-spacing:.06em;font-size:1.1rem;text-align:center;width:fit-content;margin:0 auto 6px;color:#fff}</style></head>
<body class="vex-game">
<div class="vex-shell">
<div class="vex-header"><div class="vex-title"><div class="vex-title-badge" style="background:linear-gradient(135deg,#fbbf24,#7c2d12)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="10"/><path d="M9 9h.01M15 9h.01M9 15c1 1.5 5 1.5 6 0"/></svg></div><span id="title">سباق الإيموجي</span></div><button class="vex-btn" id="resetBtn"><span id="resetLabel">جديدة</span></button></div>
<div class="er-pc" id="pCount"></div>
<div class="vex-stats" id="stats"></div>
<div class="er-turn" id="turn">دور اللاعب 1</div>
<div class="er-target" id="target">🎯</div>
<div class="er-grid" id="grid"></div>
<div class="vex-hint" id="hint">يتناوب اللاعبون على إيجاد الإيموجي المطلوب. كل إيجاد صحيح = +1 نقطة. الأعلى بعد 5 جولات يفوز.</div></div>
<div class="vex-overlay" id="endOverlay"><div class="vex-overlay-card"><div class="vex-overlay-icon gold"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 13l4 4L19 7"/></svg></div><div class="vex-overlay-title" id="endTitle">الفائز!</div><div class="vex-overlay-subtitle" id="endSub">—</div><div class="vex-btn-row"><button class="vex-btn vex-btn-primary" id="endRestart" style="flex:1">جولة جديدة</button></div></div></div>
<script src="/games/vex-sdk.js"></script><script src="/games/_shared/vex-game.js"></script>
<script>(function(){'use strict';
const POOL=['🍎','🍊','🍋','🍇','🍉','🍓','🥝','🍒','🍑','🥥','🍍','🥑','🌶️','🥕','🥦','🌽','🍕','🍔','🌮','🍩','🍪','🍰','🍦','🎂','🥨','🍯','🍷','🍺','🧃','🍵'];
const COLORS=['#ef4444','#3b82f6','#22c55e','#a855f7'];const NAMES_AR=['أحمر','أزرق','أخضر','بنفسجي'],NAMES_EN=['Red','Blue','Green','Purple'];
const S={ar:{title:'سباق الإيموجي',reset:'جديدة',hint:'يتناوب اللاعبون على إيجاد الإيموجي المطلوب.',turn:n=>'دور '+n,win:n=>'فاز '+n+'!',round:'الجولة'},
en:{title:'Emoji Race',reset:'New',hint:'Players take turns finding the target emoji.',turn:n=>n+"'s turn",win:n=>n+' wins!',round:'Round'}};
let lang='ar';const $=id=>document.getElementById(id);const ROUNDS=5;
let nP=3,scores=[0,0,0,0],turn=0,round=0,target,running;
function applyLang(){const s=S[lang];document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';
$('title').textContent=s.title;$('resetLabel').textContent=s.reset;$('hint').textContent=s.hint;renderStats();renderPCount();updateTurn();}
function renderPCount(){const wrap=$('pCount');wrap.innerHTML='';[2,3,4].forEach(n=>{const b=document.createElement('button');b.textContent=n+(lang==='ar'?' لاعبين':' players');if(n===nP)b.classList.add('active');
b.addEventListener('click',()=>{nP=n;reset();});wrap.appendChild(b);});}
function renderStats(){const wrap=$('stats');wrap.innerHTML='';const names=lang==='ar'?NAMES_AR:NAMES_EN;wrap.style.gridTemplateColumns='repeat('+(nP+1)+',1fr)';
for(let i=0;i<nP;i++){const d=document.createElement('div');d.className='vex-stat';d.innerHTML='<div class="vex-stat-label" style="color:'+COLORS[i]+'">'+names[i]+'</div><div class="vex-stat-value" style="color:'+COLORS[i]+'" id="sc'+i+'">'+scores[i]+'</div>';wrap.appendChild(d);}
const t=document.createElement('div');t.className='vex-stat';t.innerHTML='<div class="vex-stat-label">'+S[lang].round+'</div><div class="vex-stat-value" id="rd">'+round+'/'+ROUNDS*nP+'</div>';wrap.appendChild(t);}
function updateTurn(){const names=lang==='ar'?NAMES_AR:NAMES_EN;$('turn').textContent=S[lang].turn(names[turn]);$('turn').style.background='linear-gradient(135deg,'+COLORS[turn]+','+COLORS[turn]+'88)';}
function nextRound(){if(round>=ROUNDS*nP)return endGame();round++;$('rd').textContent=round+'/'+ROUNDS*nP;
const pool=POOL.slice().sort(()=>Math.random()-.5);target=pool[0];$('target').innerHTML=target;
const grid=pool.slice(0,25);grid.sort(()=>Math.random()-.5);if(!grid.includes(target))grid[Math.floor(Math.random()*25)]=target;
const g=$('grid');g.innerHTML='';grid.forEach(em=>{const c=document.createElement('div');c.className='er-cell';c.textContent=em;
c.addEventListener('click',()=>{if(em===target&&running){c.classList.add('found');scores[turn]++;$('sc'+turn).textContent=scores[turn];
turn=(turn+1)%nP;updateTurn();setTimeout(nextRound,500);}});g.appendChild(c);});}
function endGame(){running=false;const max=Math.max(...scores.slice(0,nP));const winners=scores.slice(0,nP).map((s,i)=>s===max?i:-1).filter(i=>i>=0);
const names=lang==='ar'?NAMES_AR:NAMES_EN;const winName=winners.length===1?names[winners[0]]:winners.map(i=>names[i]).join(' + ');
$('endTitle').textContent=S[lang].win(winName);$('endSub').textContent=scores.slice(0,nP).map((s,i)=>names[i]+': '+s).join(' • ');
setTimeout(()=>$('endOverlay').classList.add('show'),200);
if(typeof VexGame!=='undefined')VexGame.endSession({score:max,result:'win',metadata:{winners,scores:scores.slice(0,nP),players:nP}});}
function reset(){scores=[0,0,0,0];turn=0;round=0;running=true;$('endOverlay').classList.remove('show');renderStats();renderPCount();updateTurn();nextRound();}
$('resetBtn').addEventListener('click',reset);$('endRestart').addEventListener('click',reset);
if(typeof VexGame!=='undefined'){VexGame.boot({slug:'emoji-race',onReady:p=>{if(p&&p.language){lang=p.language==='en'?'en':'ar';VexGame.setLang(lang);}applyLang();}});}
applyLang();reset();})();</script></body></html>
