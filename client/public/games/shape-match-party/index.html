<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="theme-color" content="#070b14">
<title>VEX Shape Match Party</title><link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>.smp-target{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;padding:14px;background:var(--vex-surface);border:1px solid var(--vex-border);border-radius:14px;margin:10px 0;min-height:80px}
.smp-shape{width:42px;height:42px;display:grid;place-items:center}
.smp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px;margin:0 auto}
.smp-pblock{padding:10px;border-radius:14px;background:var(--vex-surface);border:1px solid var(--vex-border);text-align:center}
.smp-name{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.06em;margin-bottom:6px}
.smp-pad{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.smp-btn{aspect-ratio:1;display:grid;place-items:center;border:none;border-radius:8px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;transition:transform .08s,background .15s}
.smp-btn:hover{background:rgba(255,255,255,.16)}
.smp-btn:active{transform:scale(.92)}
.smp-pc{display:flex;gap:6px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.smp-pc button{padding:6px 14px;border-radius:99px;border:1px solid var(--vex-border);background:var(--vex-surface);color:#fff;font-family:'Bebas Neue',sans-serif;cursor:pointer;font-size:.9rem}
.smp-pc button.active{background:linear-gradient(135deg,#1e88ff,#0a4d9c);border-color:transparent}
.smp-watch{padding:6px 14px;border-radius:99px;background:linear-gradient(135deg,#fbbf24,#7c2d12);color:#fff;font-family:'Bebas Neue',sans-serif;letter-spacing:.06em;font-size:.95rem;text-align:center;margin:0 auto 8px;width:fit-content}</style></head>
<body class="vex-game">
<div class="vex-shell">
<div class="vex-header"><div class="vex-title"><div class="vex-title-badge"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="18" r="4"/><rect x="14" y="14" width="8" height="8"/><polygon points="12,2 16,10 8,10"/></svg></div><span id="title">حفلة مطابقة الأشكال</span></div><button class="vex-btn" id="resetBtn"><span id="resetLabel">جديدة</span></button></div>
<div class="smp-pc" id="pCount"></div>
<div class="vex-stats" id="stats"></div>
<div class="smp-watch" id="watch">احفظ الأشكال!</div>
<div class="smp-target" id="target"></div>
<div class="smp-grid" id="grid"></div>
<div class="vex-hint" id="hint">احفظ الأشكال 3 ثوانٍ، ثم انسخ التسلسل بالضغط على الأشكال بنفس الترتيب.</div></div>
<div class="vex-overlay" id="endOverlay"><div class="vex-overlay-card"><div class="vex-overlay-icon gold"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 13l4 4L19 7"/></svg></div><div class="vex-overlay-title" id="endTitle">الفائز!</div><div class="vex-overlay-subtitle" id="endSub">—</div><div class="vex-btn-row"><button class="vex-btn vex-btn-primary" id="endRestart" style="flex:1">جولة جديدة</button></div></div></div>
<script src="/games/vex-sdk.js"></script><script src="/games/_shared/vex-game.js"></script>
<script>(function(){'use strict';
const SHAPES=[
{n:'دائرة',e:'Circle',c:'#ef4444',svg:'<svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>'},
{n:'مربع',e:'Square',c:'#3b82f6',svg:'<svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>'},
{n:'مثلث',e:'Triangle',c:'#22c55e',svg:'<svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><polygon points="12,2 22,22 2,22"/></svg>'},
{n:'نجمة',e:'Star',c:'#fbbf24',svg:'<svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><polygon points="12,2 14.6,9 22,9 16,13.5 18.5,21 12,16.5 5.5,21 8,13.5 2,9 9.4,9"/></svg>'}];
const NAMES_AR=['أحمر','أزرق','أخضر','بنفسجي'],NAMES_EN=['Red','Blue','Green','Purple'];
const S={ar:{title:'حفلة مطابقة الأشكال',reset:'جديدة',hint:'احفظ الأشكال ثم انسخ التسلسل.',watch:'احفظ الأشكال!',play:n=>'دور '+n,round:'الجولة',win:n=>'فاز '+n+'!'},
en:{title:'Shape Match Party',reset:'New',hint:'Memorize the shapes then repeat them.',watch:'Memorize!',play:n=>n+"'s turn",round:'Round',win:n=>n+' wins!'}};
let lang='ar';const $=id=>document.getElementById(id);const ROUNDS=5;
let nP=4,scores=[0,0,0,0],round=0,turn=0,seq,inputIdx,running,phase='watch';
function applyLang(){const s=S[lang];document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';
$('title').textContent=s.title;$('resetLabel').textContent=s.reset;$('hint').textContent=s.hint;renderStats();renderPCount();renderGrid();}
function renderPCount(){const wrap=$('pCount');wrap.innerHTML='';[2,3,4].forEach(n=>{const b=document.createElement('button');b.textContent=n+(lang==='ar'?' لاعبين':' players');if(n===nP)b.classList.add('active');
b.addEventListener('click',()=>{nP=n;reset();});wrap.appendChild(b);});}
function renderStats(){const wrap=$('stats');wrap.innerHTML='';const names=lang==='ar'?NAMES_AR:NAMES_EN;wrap.style.gridTemplateColumns='repeat('+(nP+1)+',1fr)';
for(let i=0;i<nP;i++){const d=document.createElement('div');d.className='vex-stat';d.innerHTML='<div class="vex-stat-label">'+names[i]+'</div><div class="vex-stat-value" id="sc'+i+'">'+scores[i]+'</div>';wrap.appendChild(d);}
const t=document.createElement('div');t.className='vex-stat';t.innerHTML='<div class="vex-stat-label">'+S[lang].round+'</div><div class="vex-stat-value" id="rd">'+round+'/'+ROUNDS*nP+'</div>';wrap.appendChild(t);}
function renderTarget(show){const t=$('target');t.innerHTML='';if(show){seq.forEach(i=>{const d=document.createElement('div');d.className='smp-shape';d.style.color=SHAPES[i].c;d.innerHTML=SHAPES[i].svg;t.appendChild(d);});}else{t.textContent=lang==='ar'?'انسخ التسلسل':'Repeat the sequence';t.style.fontFamily="'Bebas Neue',sans-serif";t.style.letterSpacing='.06em';}}
function renderGrid(){const g=$('grid');g.innerHTML='';const names=lang==='ar'?NAMES_AR:NAMES_EN;
for(let p=0;p<nP;p++){const block=document.createElement('div');block.className='smp-pblock';
block.innerHTML='<div class="smp-name" style="color:'+(p===turn?'#fbbf24':'#94a3b8')+'">'+names[p]+'</div>';
const pad=document.createElement('div');pad.className='smp-pad';
SHAPES.forEach((sh,i)=>{const b=document.createElement('button');b.className='smp-btn';b.style.color=sh.c;b.innerHTML=sh.svg;
b.addEventListener('click',()=>tap(p,i));pad.appendChild(b);});block.appendChild(pad);g.appendChild(block);}}
function nextRound(){if(round>=ROUNDS*nP)return endGame();round++;$('rd').textContent=round+'/'+ROUNDS*nP;
const len=Math.min(6,2+Math.floor(round/nP));seq=Array.from({length:len},()=>Math.floor(Math.random()*4));
inputIdx=0;phase='watch';$('watch').textContent=S[lang].watch;$('watch').style.display='block';renderTarget(true);renderGrid();
setTimeout(()=>{if(!running)return;phase='play';$('watch').style.display='none';renderTarget(false);},2200+seq.length*200);}
function tap(p,i){if(!running||phase!=='play'||p!==turn)return;
if(seq[inputIdx]===i){inputIdx++;if(inputIdx>=seq.length){scores[turn]++;$('sc'+turn).textContent=scores[turn];turn=(turn+1)%nP;setTimeout(nextRound,400);}}
else{turn=(turn+1)%nP;setTimeout(nextRound,400);}}
function endGame(){running=false;const max=Math.max(...scores.slice(0,nP));const winners=scores.slice(0,nP).map((s,i)=>s===max?i:-1).filter(i=>i>=0);
const names=lang==='ar'?NAMES_AR:NAMES_EN;const wn=winners.length===1?names[winners[0]]:winners.map(i=>names[i]).join(' + ');
$('endTitle').textContent=S[lang].win(wn);$('endSub').textContent=scores.slice(0,nP).map((s,i)=>names[i]+': '+s).join(' • ');
setTimeout(()=>$('endOverlay').classList.add('show'),200);
if(typeof VexGame!=='undefined')VexGame.endSession({score:max,result:'win',metadata:{winners,scores:scores.slice(0,nP),players:nP}});}
function reset(){scores=[0,0,0,0];round=0;turn=0;running=true;$('endOverlay').classList.remove('show');renderStats();renderPCount();nextRound();}
$('resetBtn').addEventListener('click',reset);$('endRestart').addEventListener('click',reset);
if(typeof VexGame!=='undefined'){VexGame.boot({slug:'shape-match-party',onReady:p=>{if(p&&p.language){lang=p.language==='en'?'en':'ar';VexGame.setLang(lang);}applyLang();}});}
applyLang();reset();})();</script></body></html>
