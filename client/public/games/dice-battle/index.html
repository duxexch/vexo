<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#070b14">
<title>VEX Dice Battle</title>
<link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>
  .db-arena {
    width: 100%; max-width: 380px; margin: 0 auto;
    padding: 18px;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,182,39,0.20), transparent 70%),
      radial-gradient(ellipse 90% 100% at 50% 50%, rgba(20,80,30,0.18), transparent 80%),
      linear-gradient(180deg, #0a1810 0%, #04080a 100%);
    border: 1px solid rgba(255,182,39,0.40);
    border-radius: 18px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -2px 0 rgba(0,0,0,0.55),
      inset 0 0 36px rgba(34,197,94,0.10),
      0 14px 28px -10px rgba(0,0,0,0.7);
    position: relative; overflow: hidden;
  }
  /* Felt texture pattern */
  .db-arena::before {
    content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.04) 1px, transparent 2px),
      radial-gradient(circle at 70% 70%, rgba(255,255,255,0.03) 1px, transparent 2px),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.04) 1px, transparent 2px);
    background-size: 24px 24px, 32px 32px, 28px 28px;
    opacity: 0.6;
  }
  .db-arena > * { position: relative; z-index: 1; }
  .db-current {
    text-align: center; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem; letter-spacing: 0.14em;
    color: #fde68a; text-shadow: 0 0 16px rgba(255,182,39,0.55), 0 3px 0 rgba(0,0,0,0.5);
    margin-bottom: 6px;
  }
  .db-round {
    text-align: center; color: var(--vex-text-dim);
    font-size: 0.92rem; letter-spacing: 0.14em; margin-bottom: 14px;
    text-transform: uppercase;
  }
  .db-dice-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin: 16px 0;
    perspective: 600px;
  }
  .db-die {
    aspect-ratio: 1;
    background: linear-gradient(140deg, #ffffff 0%, #f1f5f9 50%, #cbd5e1 100%);
    border-radius: 16px;
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.85),
      inset 0 -4px 0 rgba(0,0,0,0.18),
      inset 4px 0 0 rgba(255,255,255,0.30),
      inset -4px 0 0 rgba(0,0,0,0.12),
      0 8px 16px rgba(0,0,0,0.55),
      0 14px 24px -6px rgba(0,0,0,0.45),
      0 0 0 1px rgba(0,0,0,0.10);
    position: relative;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: 11px;
    transition: transform 0.18s ease;
    transform-style: preserve-3d;
  }
  /* Glossy highlight on top of die */
  .db-die::before {
    content:""; position:absolute; top: 6%; left: 12%; width: 50%; height: 30%;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,255,255,0));
    filter: blur(3px);
    pointer-events: none;
  }
  .db-die.rolling { animation: dbRoll 0.6s ease-in-out; }
  @keyframes dbRoll {
    0% { transform: rotate(0) rotateY(0deg) scale(1); }
    20% { transform: rotate(-15deg) rotateY(180deg) scale(0.92); }
    40% { transform: rotate(10deg) rotateY(360deg) scale(1.08); }
    60% { transform: rotate(-8deg) rotateY(540deg) scale(1.05); }
    80% { transform: rotate(4deg) rotateY(720deg) scale(0.98); }
    100% { transform: rotate(0) rotateY(720deg) scale(1); }
  }
  .db-pip {
    width: 100%; height: 100%; display: grid; place-items: center;
  }
  .db-pip::after {
    content: ''; width: 72%; height: 72%; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #4b5563, #1f2937 60%, #0a0f1c);
    box-shadow:
      inset 0 -2px 3px rgba(255,255,255,0.18),
      inset 0 2px 3px rgba(0,0,0,0.55),
      0 1px 0 rgba(255,255,255,0.45);
    transform: scale(0); transition: transform 0.18s;
  }
  .db-pip.on::after { transform: scale(1); }
  .db-roll-btn {
    width: 100%; padding: 18px; margin-top: 10px;
    background: linear-gradient(180deg, #ffd166 0%, #ffb627 50%, #7c5300 100%);
    color: #1a0c00;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 0.20em;
    cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.55),
      inset 0 -2px 0 rgba(0,0,0,0.30),
      0 5px 0 #4a3000,
      0 8px 22px -3px rgba(255,182,39,0.65);
    text-shadow: 0 1px 0 rgba(255,255,255,0.40);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .db-roll-btn:disabled {
    opacity: 0.45; cursor: not-allowed;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), 0 1px 0 #4a3000;
    transform: none;
  }
  .db-roll-btn:not(:disabled):active {
    transform: translateY(4px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.30),
      inset 0 -1px 0 rgba(0,0,0,0.30),
      0 1px 0 #4a3000,
      0 2px 6px rgba(255,182,39,0.45);
  }
  .db-roll-result {
    text-align: center; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; color: #fff; min-height: 42px; margin-top: 10px;
    letter-spacing: 0.12em;
    text-shadow: 0 2px 0 rgba(0,0,0,0.50);
  }
  .db-roll-result.bonus { color: #fde68a; text-shadow: 0 0 14px rgba(255,182,39,0.60), 0 2px 0 rgba(0,0,0,0.5); }
  .db-roll-result.boom { color: #fca5a5; text-shadow: 0 0 16px rgba(239,68,68,0.65), 0 2px 0 rgba(0,0,0,0.5); animation: dbBoom 0.5s ease; }
  @keyframes dbBoom { 0% { transform: scale(0.7); } 60% { transform: scale(1.30); } 100% { transform: scale(1); } }
  .db-leaderboard {
    margin-top: 16px; display: flex; flex-direction: column; gap: 7px;
  }
  .db-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    background: linear-gradient(180deg, #1a1f3a 0%, #0a0e1c 100%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -2px 0 rgba(0,0,0,0.40),
      0 3px 0 #050912,
      0 4px 8px rgba(0,0,0,0.30);
    transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  }
  .db-row.active {
    background: linear-gradient(180deg, #ffd166 0%, #b07406 100%);
    color: #1a0c00;
    border-color: rgba(255,255,255,0.30);
    transform: translateY(-2px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.50),
      inset 0 -2px 0 rgba(0,0,0,0.30),
      0 4px 0 #4a3000,
      0 6px 16px -2px rgba(255,182,39,0.55);
  }
  .db-row.active .db-name { color: #1a0c00; text-shadow: 0 1px 0 rgba(255,255,255,0.40); }
  .db-row.active .db-score { color: #1a0c00; text-shadow: 0 1px 0 rgba(255,255,255,0.40); }
  .db-row .db-dot {
    width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
    box-shadow: inset 0 -2px 3px rgba(0,0,0,0.4), inset 0 2px 2px rgba(255,255,255,0.40);
  }
  .db-row .db-name {
    flex: 1; font-weight: 800; font-size: 0.98rem;
    text-shadow: 0 1px 0 rgba(0,0,0,0.45);
  }
  .db-row .db-score {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
    color: #fde68a;
    text-shadow: 0 2px 0 rgba(0,0,0,0.45), 0 0 8px rgba(255,182,39,0.30);
  }
  .db-setup-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(8,16,12,0.97), rgba(4,8,6,0.97));
    z-index: 20; padding: 18px; display: flex; flex-direction: column; gap: 12px;
    justify-content: center; border-radius: 18px;
  }
  .db-setup-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: #fde68a;
    text-align: center; letter-spacing: 0.14em;
    text-shadow: 0 0 14px rgba(255,182,39,0.55), 0 3px 0 rgba(0,0,0,0.5);
  }
  .db-count-row { display: flex; gap: 8px; justify-content: center; }
  .db-count-btn {
    width: 46px; height: 46px; border-radius: 12px;
    background: linear-gradient(180deg, #1a1f3a, #0a0e1c);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--vex-text);
    font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
    cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.15),
      inset 0 -2px 0 rgba(0,0,0,0.40),
      0 3px 0 #050912;
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .db-count-btn:active { transform: translateY(2px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 1px 0 #050912; }
  .db-count-btn.active {
    background: linear-gradient(180deg, #ffd166, #b07406);
    color: #1a0c00; border-color: rgba(255,255,255,0.25);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 3px 0 #4a3000, 0 5px 12px -2px rgba(255,182,39,0.55);
  }
  .db-setup-row { display: flex; gap: 8px; align-items: center; }
  .db-setup-row input {
    flex: 1; padding: 11px;
    background: linear-gradient(180deg, #1a1f3a, #0a0e1c);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    color: var(--vex-text); font-family: inherit; font-size: 0.95rem;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
  }
  .db-setup-start {
    margin-top: 12px; padding: 15px;
    background: linear-gradient(180deg, #ffd166 0%, #ffb627 50%, #7c5300 100%);
    color: #1a0c00;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.18em;
    cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.55),
      inset 0 -2px 0 rgba(0,0,0,0.30),
      0 5px 0 #4a3000,
      0 8px 22px -4px rgba(255,182,39,0.65);
    text-shadow: 0 1px 0 rgba(255,255,255,0.40);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .db-setup-start:active { transform: translateY(4px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.30), 0 1px 0 #4a3000; }
</style>
</head>
<body class="vex-game">
<div class="vex-shell">
  <div class="vex-header">
    <div class="vex-title">
      <div class="vex-title-badge gold">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8" cy="8" r="1"/><circle cx="16" cy="8" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="8" cy="16" r="1"/><circle cx="16" cy="16" r="1"/></svg>
      </div>
      <span id="title">معركة النرد</span>
    </div>
    <button class="vex-btn" id="resetBtn"><span id="resetBtnLabel">إعادة</span></button>
  </div>

  <div class="db-arena" id="arena">
    <div class="db-current" id="currentName">—</div>
    <div class="db-round" id="roundLbl">الجولة 1 / 5</div>

    <div class="db-dice-row" id="diceRow">
      <div class="db-die" id="die0"></div>
      <div class="db-die" id="die1"></div>
      <div class="db-die" id="die2"></div>
    </div>

    <div class="db-roll-result" id="rollResult"></div>
    <button class="db-roll-btn" id="rollBtn">ارمِ النرد</button>

    <div class="db-leaderboard" id="leaderboard"></div>

    <div class="db-setup-overlay" id="setupOverlay">
      <div class="db-setup-title" id="setupTitle">عدد اللاعبين</div>
      <div class="db-count-row" id="countRow">
        <button class="db-count-btn" data-c="2">2</button>
        <button class="db-count-btn" data-c="3">3</button>
        <button class="db-count-btn active" data-c="4">4</button>
      </div>
      <div id="namesArea"></div>
      <button class="db-setup-start" id="setupStart">ابدأ</button>
    </div>
  </div>

  <div class="vex-hint" id="hint">كل لاعب يرمي 3 نرد في دوره. التطابق ثنائي = +5، الثلاثي = +20. أعلى مجموع بعد 5 جولات يفوز.</div>
</div>

<div class="vex-overlay" id="endOverlay">
  <div class="vex-overlay-card">
    <div class="vex-overlay-icon gold">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 9 22 10 17 15 18 22 12 19 6 22 7 15 2 10 9 9 12 2"/></svg>
    </div>
    <div class="vex-overlay-title" id="endTitle">انتهت اللعبة!</div>
    <div class="vex-overlay-subtitle" id="endSub"></div>
    <div class="vex-btn-row">
      <button class="vex-btn vex-btn-gold" id="endRestart" style="flex:1">جولة جديدة</button>
    </div>
  </div>
</div>

<script src="/games/vex-sdk.js"></script>
<script src="/games/_shared/vex-game.js"></script>
<script>
(function(){
  'use strict';
  const STRINGS = {
    ar:{ title:'معركة النرد', reset:'إعادة', setupTitle:'عدد اللاعبين',
      defaultName:'لاعب', start:'ابدأ', roll:'ارمِ النرد', rolling:'يدور…',
      round:(i,n)=>`الجولة ${i} / ${n}`,
      pair:(s)=>`زوج! +5 (المجموع ${s})`,
      triple:(s)=>`ثلاثي! +20 (المجموع ${s})`,
      sum:(s)=>`المجموع ${s}`,
      end:'انتهت اللعبة!', endSub:(n,s)=>`الفائز: ${n} (${s})`,
      newRound:'جولة جديدة',
      hint:'كل لاعب يرمي 3 نرد في دوره. التطابق ثنائي = +5، الثلاثي = +20. أعلى مجموع بعد 5 جولات يفوز.', },
    en:{ title:'Dice Battle', reset:'Reset', setupTitle:'Number of players',
      defaultName:'Player', start:'Start', roll:'Roll dice', rolling:'Rolling…',
      round:(i,n)=>`Round ${i} / ${n}`,
      pair:(s)=>`Pair! +5 (sum ${s})`,
      triple:(s)=>`Triple! +20 (sum ${s})`,
      sum:(s)=>`Sum ${s}`,
      end:'Game over!', endSub:(n,s)=>`Winner: ${n} (${s})`,
      newRound:'New game',
      hint:'Each player rolls 3 dice on their turn. Pair = +5, triple = +20. Highest after 5 rounds wins.', },
  };
  const TOTAL_ROUNDS = 5;
  let lang = 'ar', count = 4;
  const $ = id => document.getElementById(id);

  let players;     // [{name, score, color}]
  let current;     // index
  let round;       // 1..TOTAL_ROUNDS
  let rolling = false;
  let gameOver = false;
  let pendingTimers = [];
  let pendingIntervals = [];
  function later(fn, ms){ const id = setTimeout(() => { pendingTimers = pendingTimers.filter(x => x !== id); fn(); }, ms); pendingTimers.push(id); return id; }
  function tick(fn, ms){ const id = setInterval(fn, ms); pendingIntervals.push(id); return id; }
  function clearPending(){ pendingTimers.forEach(clearTimeout); pendingTimers = []; pendingIntervals.forEach(clearInterval); pendingIntervals = []; }

  function applyLang(){
    const s = STRINGS[lang];
    document.documentElement.lang = lang; document.documentElement.dir = lang==='ar'?'rtl':'ltr';
    $('title').textContent = s.title; $('resetBtnLabel').textContent = s.reset;
    $('setupTitle').textContent = s.setupTitle;
    $('setupStart').textContent = s.start;
    $('rollBtn').textContent = s.roll;
    $('hint').textContent = s.hint;
    $('endRestart').textContent = s.newRound;
    rebuildSetupNames();
  }

  function rebuildSetupNames(){
    const area = $('namesArea'); area.innerHTML = '';
    const s = STRINGS[lang];
    for (let i = 0; i < count; i++){
      const row = document.createElement('div');
      row.className = 'db-setup-row';
      const dot = document.createElement('div');
      dot.style.cssText = `width:10px;height:10px;border-radius:50%;background:${playerColor(i)};box-shadow:0 0 8px ${playerColor(i)};flex-shrink:0;`;
      const inp = document.createElement('input');
      inp.type = 'text'; inp.maxLength = 12;
      inp.placeholder = `${s.defaultName} ${i+1}`;
      inp.value = `${s.defaultName} ${i+1}`;
      inp.dataset.i = i;
      row.appendChild(dot); row.appendChild(inp);
      area.appendChild(row);
    }
  }

  function playerColor(i){ return ['#22c55e','#ef4444','#1e88ff','#a855f7'][i % 4]; }

  function startSetup(){
    clearPending();
    rolling = false;
    $('setupOverlay').style.display = 'flex';
    $('endOverlay').classList.remove('show');
    $('rollResult').textContent = '';
    $('rollResult').className = 'db-roll-result';
    [0,1,2].forEach(renderDie);
  }

  function startGame(){
    const s = STRINGS[lang];
    const inputs = $('namesArea').querySelectorAll('input');
    players = Array.from(inputs).map((inp, i) => ({
      name: inp.value.trim() || `${s.defaultName} ${i+1}`,
      score: 0, color: playerColor(i),
    }));
    current = 0; round = 1; gameOver = false;
    $('setupOverlay').style.display = 'none';
    renderLeaderboard();
    updateTurn();
  }

  function updateTurn(){
    const s = STRINGS[lang];
    $('currentName').textContent = players[current].name;
    $('currentName').style.color = players[current].color;
    $('currentName').style.textShadow = `0 0 12px ${players[current].color}66`;
    $('roundLbl').textContent = s.round(round, TOTAL_ROUNDS);
    $('rollBtn').disabled = false;
    $('rollResult').textContent = '';
    $('rollResult').className = 'db-roll-result';
    renderLeaderboard();
  }

  function renderLeaderboard(){
    const root = $('leaderboard'); root.innerHTML = '';
    players.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'db-row' + (i === current && !gameOver ? ' active' : '');
      const dot = document.createElement('div');
      dot.className = 'db-dot'; dot.style.background = p.color; dot.style.boxShadow = `0 0 8px ${p.color}`;
      const name = document.createElement('div');
      name.className = 'db-name'; name.textContent = p.name;
      const sc = document.createElement('div');
      sc.className = 'db-score'; sc.textContent = p.score;
      row.appendChild(dot); row.appendChild(name); row.appendChild(sc);
      root.appendChild(row);
    });
  }

  // Pip positions per face value
  const PIPS = {
    1: [4],
    2: [0, 8],
    3: [0, 4, 8],
    4: [0, 2, 6, 8],
    5: [0, 2, 4, 6, 8],
    6: [0, 2, 3, 5, 6, 8],
  };
  function renderDie(idx, value){
    const el = $('die' + idx);
    el.innerHTML = '';
    const v = value || 1;
    const set = new Set(PIPS[v]);
    for (let i = 0; i < 9; i++){
      const p = document.createElement('div');
      p.className = 'db-pip' + (set.has(i) ? ' on' : '');
      el.appendChild(p);
    }
  }

  function roll(){
    if (rolling || gameOver) return;
    rolling = true;
    $('rollBtn').disabled = true;
    const s = STRINGS[lang];
    $('rollResult').textContent = s.rolling;
    $('rollResult').className = 'db-roll-result';
    [0,1,2].forEach(idx => {
      const el = $('die' + idx);
      el.classList.remove('rolling'); void el.offsetWidth; el.classList.add('rolling');
      // animate value changes during roll
      const ticks = 6;
      let i = 0;
      const iv = tick(() => {
        renderDie(idx, 1 + Math.floor(Math.random()*6));
        i++;
        if (i >= ticks){
          clearInterval(iv);
          pendingIntervals = pendingIntervals.filter(x => x !== iv);
        }
      }, 70);
    });
    later(() => {
      const vals = [
        1 + Math.floor(Math.random()*6),
        1 + Math.floor(Math.random()*6),
        1 + Math.floor(Math.random()*6),
      ];
      vals.forEach((v, i) => renderDie(i, v));
      finishRoll(vals);
    }, 600);
  }

  function finishRoll(vals){
    const sum = vals[0] + vals[1] + vals[2];
    const counts = {};
    vals.forEach(v => counts[v] = (counts[v]||0)+1);
    let bonus = 0, kind = 'sum';
    if (Object.values(counts).some(c => c === 3)){ bonus = 20; kind = 'triple'; }
    else if (Object.values(counts).some(c => c === 2)){ bonus = 5; kind = 'pair'; }
    const total = sum + bonus;
    players[current].score += total;
    const s = STRINGS[lang];
    if (kind === 'triple'){
      $('rollResult').textContent = s.triple(sum); $('rollResult').className = 'db-roll-result boom';
      if (typeof VexGame !== 'undefined') VexGame.confetti(700);
    } else if (kind === 'pair'){
      $('rollResult').textContent = s.pair(sum); $('rollResult').className = 'db-roll-result bonus';
    } else {
      $('rollResult').textContent = s.sum(sum); $('rollResult').className = 'db-roll-result';
    }
    if (typeof VexGame !== 'undefined'){
      VexGame.popScore(document.body, '+' + total, '50%', '40%', kind === 'triple' ? 'gold' : '');
    }
    renderLeaderboard();
    rolling = false;
    later(nextTurn, 1300);
  }

  function nextTurn(){
    current = (current + 1) % players.length;
    if (current === 0){
      round++;
      if (round > TOTAL_ROUNDS){ return endGame(); }
    }
    updateTurn();
  }

  function endGame(){
    gameOver = true;
    $('rollBtn').disabled = true;
    const winner = players.reduce((a,b) => b.score > a.score ? b : a, players[0]);
    const s = STRINGS[lang];
    $('endTitle').textContent = s.end;
    $('endSub').textContent = s.endSub(winner.name, winner.score);
    $('currentName').textContent = winner.name;
    $('currentName').style.color = winner.color;
    later(() => $('endOverlay').classList.add('show'), 600);
    if (typeof VexGame !== 'undefined'){
      VexGame.confetti(900);
      VexGame.endSession({
        score: winner.score, result: 'win',
        metadata: { winner: winner.name, scores: players.map(p => ({n:p.name,s:p.score})) },
      });
    }
  }

  document.querySelectorAll('.db-count-btn').forEach(b => {
    b.addEventListener('click', () => {
      count = parseInt(b.dataset.c, 10);
      document.querySelectorAll('.db-count-btn').forEach(x => x.classList.toggle('active', x===b));
      rebuildSetupNames();
    });
  });
  $('setupStart').addEventListener('click', startGame);
  $('rollBtn').addEventListener('click', roll);
  $('resetBtn').addEventListener('click', startSetup);
  $('endRestart').addEventListener('click', startSetup);

  if (typeof VexGame !== 'undefined'){
    VexGame.boot({
      slug: 'dice-battle',
      onReady: function(player){
        if (player && player.language){ lang = player.language === 'en' ? 'en' : 'ar'; VexGame.setLang(lang); }
        applyLang();
      },
    });
  }
  applyLang();
  // initial dice display
  [0,1,2].forEach(i => renderDie(i, 1));
  startSetup();
})();
</script>
</body>
</html>
