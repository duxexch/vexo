<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="theme-color" content="#070b14">
<title>VEX Tug Of War</title><link rel="stylesheet" href="/games/_shared/vex-game.css">
<style>.tw-arena{position:relative;width:100%;max-width:380px;margin:14px auto;height:80px;background:linear-gradient(90deg,#7f1d1d,#1f2937 40%,#1f2937 60%,#0a4d9c);border-radius:14px;border:1px solid var(--vex-border);overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.10),inset 0 -2px 0 rgba(0,0,0,.45)}
.tw-rope{position:absolute;top:50%;left:0;right:0;height:6px;background:repeating-linear-gradient(90deg,#a16207 0 8px,#451a03 8px 16px);transform:translateY(-50%)}
.tw-flag{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.6rem;transition:left .12s ease-out;text-shadow:0 0 12px rgba(255,182,39,.8);z-index:2}
.tw-marker{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.25)}
.tw-mark-l{left:25%}.tw-mark-r{right:25%}
.tw-controls{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;margin-top:14px}
.tw-side{padding:14px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.25));border:1px solid var(--vex-border);text-align:center}
.tw-side.l{border-color:rgba(239,68,68,.30)}.tw-side.r{border-color:rgba(30,136,255,.30)}
.tw-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.06em;margin-bottom:8px}
.tw-name.l{color:#fca5a5}.tw-name.r{color:#93c5fd}
.tw-pull{width:100%;padding:24px 0;font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.08em;border:none;border-radius:12px;color:#fff;cursor:pointer;
box-shadow:inset 0 1px 0 rgba(255,255,255,.18),inset 0 -2px 0 rgba(0,0,0,.4),0 6px 0 #050912;transition:transform .06s,box-shadow .06s}
.tw-pull.l{background:linear-gradient(180deg,#f87171,#7f1d1d)}.tw-pull.r{background:linear-gradient(180deg,#60a5fa,#1e3a8a)}
.tw-pull:active{transform:translateY(4px);box-shadow:inset 0 1px 0 rgba(255,255,255,.18),inset 0 -1px 0 rgba(0,0,0,.4),0 2px 0 #050912}</style></head>
<body class="vex-game">
<div class="vex-shell">
<div class="vex-header"><div class="vex-title"><div class="vex-title-badge rose"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M3 12h18M7 8l-4 4 4 4M17 8l4 4-4 4"/></svg></div><span id="title">شد الحبل</span></div><button class="vex-btn" id="resetBtn"><span id="resetLabel">جديدة</span></button></div>
<div class="vex-stats"><div class="vex-stat"><div class="vex-stat-label rose" id="lblL">اللاعب 1</div><div class="vex-stat-value rose" id="scoreL">0</div></div><div class="vex-stat"><div class="vex-stat-label" id="lblTime">الزمن</div><div class="vex-stat-value" id="time">15</div></div><div class="vex-stat"><div class="vex-stat-label blue" id="lblR">اللاعب 2</div><div class="vex-stat-value blue" id="scoreR">0</div></div></div>
<div class="tw-arena"><div class="tw-rope"></div><div class="tw-marker tw-mark-l"></div><div class="tw-marker tw-mark-r"></div><div class="tw-flag" id="flag">🏳️</div></div>
<div class="tw-controls"><div class="tw-side l"><div class="tw-name l" id="nameL">أحمر</div><button class="tw-pull l" id="pullL">اسحب!</button></div><div class="tw-side r"><div class="tw-name r" id="nameR">أزرق</div><button class="tw-pull r" id="pullR">اسحب!</button></div></div>
<div class="vex-hint" id="hint">اضغط زرّك بأقصى سرعة لتسحب الحبل لجهتك. تجاوز خط 25% لتفوز.</div></div>
<div class="vex-overlay" id="endOverlay"><div class="vex-overlay-card"><div class="vex-overlay-icon gold"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 13l4 4L19 7"/></svg></div><div class="vex-overlay-title" id="endTitle">الفائز!</div><div class="vex-overlay-subtitle" id="endSub">شدّ بقوة!</div><div class="vex-btn-row"><button class="vex-btn vex-btn-primary" id="endRestart" style="flex:1">جولة جديدة</button></div></div></div>
<script src="/games/vex-sdk.js"></script><script src="/games/_shared/vex-game.js"></script>
<script>(function(){'use strict';
const S={ar:{title:'شد الحبل',reset:'جديدة',time:'الزمن',l:'اللاعب 1',r:'اللاعب 2',nameL:'أحمر',nameR:'أزرق',pull:'اسحب!',end:'الفائز!',endSub:'شدّ بقوة!',newRound:'جولة جديدة',hint:'اضغط زرّك بأقصى سرعة. تجاوز خط 25% لتفوز.',win:lbl=>'فاز '+lbl+'!'},
en:{title:'Tug Of War',reset:'New',time:'Time',l:'Player 1',r:'Player 2',nameL:'Red',nameR:'Blue',pull:'Pull!',end:'Winner!',endSub:'Pull harder!',newRound:'New game',hint:'Tap your button as fast as you can.',win:lbl=>lbl+' wins!'}};
let lang='ar';const $=id=>document.getElementById(id);
let pos,scoreL,scoreR,timeLeft,timer,running;
function applyLang(){const s=S[lang];document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';
$('title').textContent=s.title;$('resetLabel').textContent=s.reset;$('lblTime').textContent=s.time;$('lblL').textContent=s.l;$('lblR').textContent=s.r;
$('nameL').textContent=s.nameL;$('nameR').textContent=s.nameR;$('pullL').textContent=s.pull;$('pullR').textContent=s.pull;
$('hint').textContent=s.hint;$('endTitle').textContent=s.end;$('endSub').textContent=s.endSub;$('endRestart').textContent=s.newRound;}
function updateFlag(){$('flag').style.left=(50+pos*0.4)+'%';}
function reset(){pos=0;scoreL=0;scoreR=0;timeLeft=15;running=true;updateFlag();
$('scoreL').textContent=0;$('scoreR').textContent=0;$('time').textContent=timeLeft;$('endOverlay').classList.remove('show');
clearInterval(timer);timer=setInterval(()=>{if(!running)return;timeLeft--;$('time').textContent=timeLeft;if(timeLeft<=0)endGame(pos<0?'L':pos>0?'R':null);},1000);}
function pull(side){if(!running)return;if(side==='L'){scoreL++;pos-=2;$('scoreL').textContent=scoreL;}else{scoreR++;pos+=2;$('scoreR').textContent=scoreR;}
updateFlag();if(pos<=-50)endGame('L');else if(pos>=50)endGame('R');}
function endGame(winner){if(!running)return;running=false;clearInterval(timer);const s=S[lang];
const lbl=winner==='L'?s.nameL:winner==='R'?s.nameR:'—';
$('endTitle').textContent=winner?s.win(lbl):(lang==='ar'?'تعادل':'Draw');$('endSub').textContent=winner?(lang==='ar'?lbl+' فاز بالشد!':lbl+' pulled hardest!'):(lang==='ar'?'لا فائز':'No winner');
setTimeout(()=>$('endOverlay').classList.add('show'),300);
if(typeof VexGame!=='undefined'){VexGame.endSession({score:scoreL+scoreR,result:winner?'win':'tie',metadata:{winner,scoreL,scoreR}});}}
['pullL','pullR'].forEach(id=>{const el=$(id);const side=id==='pullL'?'L':'R';
el.addEventListener('click',()=>pull(side));});
window.addEventListener('keydown',e=>{if(e.key==='a'||e.key==='A')pull('L');if(e.key==='l'||e.key==='L')pull('R');});
$('resetBtn').addEventListener('click',reset);$('endRestart').addEventListener('click',reset);
if(typeof VexGame!=='undefined'){VexGame.boot({slug:'tug-of-war',onReady:p=>{if(p&&p.language){lang=p.language==='en'?'en':'ar';VexGame.setLang(lang);}applyLang();}});}
applyLang();reset();})();</script></body></html>
